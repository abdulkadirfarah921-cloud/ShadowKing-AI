<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING AI VOICE</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold: #FFD700;
  --dark: #050505;
  --glass: rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal', sans-serif}
body{
  background: var(--dark);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* الخلفية المتحركة */
.bg-animation{
  position:absolute;
  width:100%;height:100%;
  background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.1) 0%, transparent 50%);
  animation: pulse 8s infinite ease-in-out;
}
@keyframes pulse{
 0%,100%{transform:scale(1);opacity:0.5}
 50%{transform:scale(1.3);opacity:1}
}

/* خطوط نيون */
.neon-lines{
  position:absolute;
  width:100%;height:100%;
  background-image:
    linear-gradient(transparent 95%, rgba(255,215,0,0.1) 95%),
    linear-gradient(90deg, transparent 95%, rgba(255,215,0,0.1) 95%);
  background-size: 50px 50px;
  animation: moveBg 20s linear infinite;
}
@keyframes moveBg{from{background-position:0 0} to{background-position:500px 500px}}

/* الكرت الزجاجي */
.glass-card{
  position:relative;
  z-index:2;
  width:90%;
  max-width:500px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 30px;
  padding: 40px 30px;
  box-shadow: 
    0 0 50px rgba(255,215,0,0.2),
    inset 0 0 20px rgba(255,215,0,0.1);
  animation: floatIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes floatIn{
  from{opacity:0;transform:translateY(50px) scale(0.9)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* العنوان */
.header{
  text-align:center;
  margin-bottom:30px;
}
.header h1{
  font-size:32px;
  font-weight:900;
  background: linear-gradient(90deg, #FFD700, #FFF, #FFD700);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 3s linear infinite;
  text-shadow: 0 0 30px rgba(255,215,0,0.5);
}
@keyframes shine{to{background-position:200% center}}
.header.icon{font-size:40px;animation: bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* الحقول */
.label{color:var(--gold);font-weight:700;margin-bottom:10px;text-align:center}
.input-box{
  width:100%;
  padding:18px;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,215,0,0.3);
  border-radius:15px;
  color:#fff;
  font-size:16px;
  outline:none;
  transition:0.3s;
  text-align:right;
}
.input-box:focus{
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(255,215,0,0.4);
}

/* الزر الفخم */
.btn-gold{
  width:100%;
  padding:20px;
  margin-top:20px;
  background: linear-gradient(90deg, #FFD700, #FFA500);
  border:none;
  border-radius:15px;
  color:#000;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 5px 25px rgba(255,215,0,0.4);
}
.btn-gold:hover{transform:translateY(-3px);box-shadow:0 8px 35px rgba(255,215,0,0.6)}
.btn-gold::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  transition:0.5s;
}
.btn-gold:hover::before{left:100%}

/* زر الرجوع */
.btn-back{
  width:100%;
  padding:15px;
  margin-top:15px;
  background:transparent;
  border:1px solid rgba(255,215,0,0.3);
  border-radius:15px;
  color:var(--gold);
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}
.btn-back:hover{background:rgba(255,215,0,0.1)}

/* موجات الصوت */
.wave{
  display:flex;
  justify-content:center;
  gap:4px;
  margin:20px 0;
  height:40px;
  align-items:center;
}
.wave span{
  width:4px;
  height:10px;
  background:var(--gold);
  border-radius:10px;
  animation: wave 1.2s infinite ease-in-out;
}
.wave span:nth-child(2){animation-delay:0.1s}
.wave span:nth-child(3){animation-delay:0.2s}
.wave span:nth-child(4){animation-delay:0.3s}
.wave span:nth-child(5){animation-delay:0.4s}
@keyframes wave{0%,40%,100%{height:10px}20%{height:40px}}

/* التوست */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:rgba(10,10,10,0.9);
  backdrop-filter:blur(10px);
  border:1px solid var(--gold);
  color:var(--gold);
  padding:15px 25px;
  border-radius:15px;
  opacity:0;
  transition:0.5s;
  z-index:999;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="bg-animation"></div>
<div class="neon-lines"></div>

<div class="glass-card">
  <div class="header">
    <div class="icon">🎙️</div>
    <h1>SHADOWKING AI</h1>
    <p style="color:#aaa;margin-top:5px">صنع صوت احترافي بالذكاء الاصطناعي</p>
  </div>

  <div class="wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="label">اكتب وصف الصوت</div>
  <input type="text" id="aiPrompt" class="input-box" placeholder="مثال: صوت ملكي غاضب وقوي">

  <button class="btn-gold" onclick="makeAI()">⚡ توليد الصوت</button>
  <button class="btn-back" onclick="location.href='index.html'">⬅️ الرجوع</button>
</div>

<div id="toast" class="toast"></div>

<script>
function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function makeAI(){
  const prompt = document.getElementById('aiPrompt').value;
  if(prompt.trim() == ''){showToast('اكتب وصف الصوت اول 👑'); return;}
  showToast('جاري توليد الصوت...');

  // نفس كود توليد الصوت تبعك
  const ctx = new AudioContext();
  const buffer = ctx.createBuffer(1, ctx.sampleRate * 5, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  let freq = 180;
  if(prompt.includes('غاضب')) freq = 120;
  if(prompt.includes('ملكي')) freq = 100;
  for(let i=0; i<buffer.length; i++){
    data[i] = Math.sin(2*Math.PI*freq*i/ctx.sampleRate) * 0.3;
  }
  const wav = toWav(buffer);
  const url = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}));
  const a = document.createElement('a');
  a.href = url;
  a.download = 'SHADOWKING.wav';
  a.click();
  setTimeout(()=>showToast('تم التحميل! روح للمحر'), 1000);
}

function toWav(buffer){
  const len = buffer.length * 2 + 44;
  const buf = new ArrayBuffer(len);
  const v = new DataView(buf);
  let p = 0;
  const s16 = d => {v.setInt16(p,d,true);p+=2};
  const s32 = d => {v.setInt32(p,d,true);p+=4};
  s32(0x46464952);s32(len-8);s32(0x45564157);s32(0x20746d66);s32(16);s16(1);s16(1);
  s32(buffer.sampleRate);s32(buffer.sampleRate*2);s16(2);s16(16);s32(0x61746164);s32(len-p-4);
  const d = buffer.getChannelData(0);
  for(let i=0;i<d.length;i++){let s=Math.max(-1,Math.min(1,d[i]));v.setInt16(p,s<0?s*0x8000:s*0x7FFF,true);p+=2;}
  return v;
}
</script>
</body>
</html>
