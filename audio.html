<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هندسة الصوت - Shadowking</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#FFD700;font-family:Arial;height:100vh;display:flex;flex-direction:column}
 .header{padding:15px;border-bottom:2px solid #FFD700;display:flex;justify-content:space-between;align-items:center}
 .header h1{font-size:18px}
 .back{font-size:24px;cursor:pointer}
 .container{flex:1;padding:20px;overflow-y:auto}
 .box{border:2px solid #FFD700;border-radius:20px;padding:20px;margin-bottom:15px;background:#111}
 .box h3{margin-bottom:15px;text-align:center}
  textarea{width:100%;height:120px;background:#000;border:1px solid #FFD700;color:#FFD700;padding:10px;border-radius:10px;resize:none;font-size:15px}
 .btn{background:#FFD700;color:#000;border:none;padding:15px;border-radius:15px;font-weight:bold;width:100%;cursor:pointer;font-size:16px;margin-top:10px}
 .btn:disabled{background:#555;color:#999}
 .progress{height:10px;background:#333;border-radius:10px;margin:15px 0;display:none}
 .progress-bar{height:100%;background:#FFD700;width:0%;border-radius:10px;transition:0.3s}
 .result{display:none}
  audio{width:100%;margin:10px 0;border-radius:10px;background:#000}
 .row{display:flex;gap:10px}
 .row.btn{flex:1}
  input[type=range]{width:100%}
  label{display:block;margin:10px 0}
</style>
</head>
<body>

<div class="header">
  <div class="back" onclick="window.location.href='index.html'">←</div>
  <h1>🎛️ استوديو هندسة الصوت</h1>
  <div></div>
</div>

<div class="container">

  <div class="box">
    <h3>اصنع صوت باستخدام الذكاء الاصطناعي</h3>
    <textarea id="prompt" placeholder="اكتب وصف الصوت: مثال&#10;صوت ملك رجولي عميق يقول مرحبا بكم مع صدى قاعة"></textarea>
    <button class="btn" id="genBtn" onclick="generateAudio()">🎵 صنع الصوت</button>

    <div class="progress" id="progressBox">
      <div class="progress-bar" id="progressBar"></div>
      <p style="text-align:center;margin-top:5px;font-size:12px">جاري التصنيع... متبقي <span id="timeLeft">5:00</span></p>
    </div>
  </div>

  <div class="box result" id="resultBox">
    <h3>الصوت جاهز 👑</h3>
    <audio id="audioPlayer" controls></audio>
    <div class="row">
      <button class="btn" onclick="editAudio()">✏️ تعديل الصوت</button>
      <button class="btn" onclick="downloadAudio()">📥 تحميل الصوت</button>
    </div>
  </div>

  <div class="box" id="editBox" style="display:none">
    <h3>تعديل الصوت - زي CapCut</h3>
    <label>السرعة: <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1" oninput="applyEffect()"> <span id="speedVal">1x</span></label>
    <label>الصدى Reverb: <input type="range" id="reverb" min="0" max="100" value="0" oninput="applyEffect()"> <span id="reverbVal">0%</span></label>
    <label>تضخيم Bass: <input type="range" id="bass" min="0" max="20" value="0" oninput="applyEffect()"> <span id="bassVal">0dB</span></label>
    <button class="btn" onclick="saveEdit()">💾 حفظ التعديل</button>
  </div>

</div>

<script>
let generatedBlob = null;

function generateAudio(){
  const prompt = document.getElementById('prompt').value;
  if(!prompt) return alert('اكتب وصف الصوت الاول يا ملك');

  document.getElementById('genBtn').disabled = true;
  document.getElementById('progressBox').style.display = 'block';
  let time = 300; // 5 دقايق

  const timer = setInterval(()=>{
    time--;
    let min = Math.floor(time/60);
    let sec = time%60;
    document.getElementById('timeLeft').innerText = `${min}:${sec<10?'0':''}${sec}`;
    document.getElementById('progressBar').style.width = `${((300-time)/300)*100}%`;

    if(time <= 0){
      clearInterval(timer);
      finishGenerate(prompt);
    }
  }, 1000);
}

function finishGenerate(prompt){
  // بنستخدم TTS المجاني. لو عايز API مدفوع قولي
  const utterance = new SpeechSynthesisUtterance(prompt);
  utterance.lang = 'ar-SA'; utterance.rate = 0.9; utterance.pitch = 0.8;

  speechSynthesis.speak(utterance);

  // محاكاة انشاء ملف بعد 3 ثواني
  setTimeout(()=>{
    const textBlob = new Blob([prompt], {type: 'text/plain'});
    generatedBlob = new Blob([textBlob], {type: 'audio/mp3'}); // محاكاة
    const url = URL.createObjectURL(generatedBlob);
    document.getElementById('audioPlayer').src = url;
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('progressBox').style.display = 'none';
    document.getElementById('genBtn').disabled = false;
    speak("تم تصنيع الصوت بنجاح يا ملك");
  }, 3000);
}

function editAudio(){ document.getElementById('editBox').style.display = 'block'; }

function applyEffect(){
  document.getElementById('speedVal').innerText = document.getElementById('speed').value + 'x';
  document.getElementById('reverbVal').innerText = document.getElementById('reverb').value + '%';
  document.getElementById('bassVal').innerText = document.getElementById('bass').value + 'dB';
  document.getElementById('audioPlayer').playbackRate = document.getElementById('speed').value;
}

function saveEdit(){ alert('تم حفظ التعديل'); document.getElementById('editBox').style.display = 'none'; }

function downloadAudio(){
  if(!generatedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(generatedBlob);
  a.download = `SHADOWKING_AI_${Date.now()}.mp3`;
  a.click();
  alert('تم التحميل!\nانقل الملف للمجلد:\n/storage/emulated/0/مجلد اصوات مصنوعة باستخدام SHADOWKING AI');
}
</script>
</body>
</html>
