<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>صنع صوت AI</title>
<style>
body{background:#000;color:#FFC107;text-align:center;padding:40px}
.box{border:3px solid #FFC107;border-radius:25px;padding:25px;margin:20px auto;background:rgba(20,20,20,0.9);max-width:500px}
input{width:90%;padding:15px;background:#000;border:2px solid #FFC107;border-radius:15px;color:#fff;font-size:16px}
.btn{background:#FFC107;color:#000;border:none;padding:18px;border-radius:15px;font-weight:900;width:90%;cursor:pointer;font-size:17px;margin:10px}
.back{background:#333;color:#FFC107}
</style>
</head>
<body>

<h1>🎙️ صنع صوت AI</h1>

<div class="box">
<h3>اكتب وصف الصوت</h3>
<input type="text" id="aiPrompt" placeholder="مثال: صوت ملكي غاضب قوي">
<button class="btn" onclick="makeAI()">⚡ توليد الصوت</button>
</div>

<button class="btn back" onclick="location.href='index.html'">⬅️ الرجوع</button>

<script>
function makeAI(){
  const prompt = document.getElementById('aiPrompt').value;
  if(prompt.trim() == ''){alert('اكتب وصف الصوت اول'); return;}

  const ctx = new AudioContext();
  const buffer = ctx.createBuffer(1, ctx.sampleRate * 5, ctx.sampleRate);
  const data = buffer.getChannelData(0);

  let freq = 180;
  if(prompt.includes('غاضب')) freq = 120;
  if(prompt.includes('ملكي')) freq = 100;
  if(prompt.includes('طفل')) freq = 600;

  for(let i=0; i<buffer.length; i++){
    data[i] = Math.sin(2*Math.PI*freq*i/ctx.sampleRate) * 0.3 * Math.sin(Math.PI*i/buffer.length);
  }

  const wav = toWav(buffer);
  const url = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}));

  // تحميل الملف
  const a = document.createElement('a');
  a.href = url;
  a.download = 'shadowking-voice.wav';
  a.click();

  alert('تم تحميل الصوت! هلا روح لصفحة هندسة الصوت عشان تعدله');
}

function toWav(buffer){
  const len = buffer.length * 2 + 44;
  const buf = new ArrayBuffer(len);
  const v = new DataView(buf);
  let p = 0;
  const s16 = d => {v.setInt16(p,d,true);p+=2};
  const s32 = d => {v.setInt32(p,d,true);p+=4};
  s32(0x46464952);s32(len-8);s32(0x45564157);s32(0x20746d66);s32(16);s16(1);s16(1);
  s32(buffer.sampleRate);s32(buffer.sampleRate*2);s16(2);s16(16);s32(0x61746164);s32(len-p-4);
  const d = buffer.getChannelData(0);
  for(let i=0;i<d.length;i++){let s=Math.max(-1,Math.min(1,d[i]));v.setInt16(p,s<0?s*0x8000:s*0x7FFF,true);p+=2;}
  return v;
}
</script>
</body>
</html>
