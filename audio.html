<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استوديو هندسة الصوت - Shadowking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#FFD700;font-family:Arial;min-height:100vh;padding:15px}
.header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #FFD700;padding-bottom:15px;margin-bottom:20px}
.header h1{font-size:18px;text-align:center;flex:1}
.back{font-size:24px;cursor:pointer}
.export-btn{background:#FFD700;color:#000;border:none;padding:10px 20px;border-radius:10px;font-weight:bold;cursor:pointer}
.box{border:2px solid #FFD700;border-radius:20px;padding:20px;margin-bottom:15px;background:#111;animation:fadeIn 0.5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.box h2{margin-bottom:15px;text-align:center;font-size:16px}
textarea{width:100%;height:100px;background:#000;border:2px solid #FFD700;color:#FFD700;padding:12px;border-radius:15px;resize:none;font-size:14px}
.btn{background:#FFD700;color:#000;border:none;padding:15px;border-radius:15px;font-weight:bold;width:100%;font-size:16px;cursor:pointer;margin-top:10px;transition:0.3s}
.btn:hover{transform:scale(1.03);box-shadow:0 0 20px #FFD700}
.divider{text-align:center;margin:20px 0;font-size:20px}
</style>
</head>
<body>

<div class="header">
  <div class="back" onclick="window.location.href='index.html'">←</div>
  <h1>استوديو هندسة الصوت 🎛️</h1>
  <button class="export-btn" onclick="alert('صدر من داخل المحرر')">Export</button>
</div>

<div class="box">
  <h2>اصنع صوت بالذكاء الاصطناعي</h2>
  <textarea id="prompt" placeholder="اكتب وصف الصوت: مثال صوت ملكي غاضب"></textarea>
  <button class="btn" onclick="generateAndGo()">صنع الصوت 🎵</button>
</div>

<div class="divider">او</div>

<div class="box">
  <button class="btn" onclick="document.getElementById('fileInput').click()">عندك صوت تريد تعدله 📁</button>
  <input type="file" id="fileInput" accept="audio/*" style="display:none" onchange="importAndGo(event)">
</div>

<script>
function generateAndGo(){
  const prompt = document.getElementById('prompt').value;
  if(!prompt) return alert('اكتب وصف الصوت يا ملك');
  localStorage.setItem('audioType','ai');
  localStorage.setItem('audioPrompt',prompt);
  window.location.href = 'editor.html';
}
function importAndGo(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    localStorage.setItem('audioType','import');
    localStorage.setItem('audioName',file.name);
    localStorage.setItem('audioData',evt.target.result);
    window.location.href = 'editor.html';
  }
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
