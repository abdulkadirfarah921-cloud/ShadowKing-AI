<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>SHADOWKING AUDIO PRO</title>
<script>
function forceLandscape() {
  const wrapper = document.getElementById('wrapper');
  // لو الجهاز طولي بنلفه
  if(window.innerHeight > window.innerWidth){
    wrapper.classList.add('rotate-force');
    // بنحسب الابعاد صح للموبايل
    wrapper.style.width = window.innerHeight + 'px';
    wrapper.style.height = window.innerWidth + 'px';
  } else {
    wrapper.classList.remove('rotate-force');
    wrapper.style.width = '100%';
    wrapper.style.height = '100%';
  }

  // محاولة قفل الشاشة
  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
window.addEventListener('load', forceLandscape);
window.addEventListener('resize', forceLandscape);
</script>
<style>
:root{
  --bg:#000;
  --card:#0d0d0d;
  --neon:#00e5ff;
  --neon2:#00aaff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:var(--bg);color:#fff;overflow:hidden;height:100vh;width:100vw}
#wrapper{height:100%;width:100%;background:var(--bg);position:relative}

/* لف الموبايل صح */
#wrapper.rotate-force{
  transform: rotate(90deg);
  transform-origin: center center;
  position: fixed;
  top: 50%;
  left: 50%;
  margin-top: -50vw;
  margin-left: -50vh;
}

.topbar{background:linear-gradient(90deg,#0d0d0d,#111);height:55px;display:flex;align-items:center;padding:0 15px;border-bottom:1px solid var(--neon);box-shadow:0 0 15px var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:16px;text-shadow:0 0 10px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:9px 22px;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer;box-shadow:0 0 15px var(--neon)}

.container{display:flex;height:calc(100% - 55px - 50px)}
.sidebar-right{width:70px;background:#0a0a0a;padding:10px 5px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:10px}
.tool{background:var(--card);border:1px solid #333;border-radius:10px;padding:12px 5px;text-align:center;font-size:10px;color:#aaa;cursor:pointer}
.tool.active{background:var(--neon);color:#000;border-color:var(--neon);box-shadow:0 0 15px var(--neon)}

.player-area{flex:1;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:15px;gap:12px}
.player-box{background:linear-gradient(90deg,var(--neon),var(--neon2));padding:8px 20px;border-radius:8px;color:#000;font-weight:900}
.drop-zone{width:90%;height:200px;background:var(--card);border:2px dashed #333;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#555;font-size:15px}
audio{width:85%;border-radius:30px;filter:drop-shadow(0 0 10px var(--neon))}
.file-btn{background:var(--card);color:var(--neon);border:1px solid var(--neon);padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:700}

.sidebar-left{width:120px;background:#0a0a0a;padding:12px 8px;border-right:2px solid var(--neon);overflow-y:auto}
.tab{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:10px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:12px}
.slider{margin-bottom:15px}
.slider label{color:#aaa;font-size:11px;display:block;margin-bottom:4px}
input[type=range]{width:100%;accent-color:var(--neon)}

.timeline{height:50px;background:#0a0a0a;border-top:2px solid var(--neon);padding:8px}
.track{background:linear-gradient(90deg, var(--neon) 0%, var(--neon2) 100%);height:34px;border-radius:6px;display:flex;align-items:center;padding:0 12px;color:#000;font-weight:900;font-size:12px}
</style>
</head>
<body>
<div id="wrapper">

<div class="topbar">
  <div class="logo">SHADOWKING AUDIO PRO 👑</div>
  <button class="export-btn">تصدير</button>
</div>

<div class="container">
  <div class="sidebar-right">
    <div class="tool active">📁<br>استيراد</div>
    <div class="tool">🎵<br>مكتبة</div>
    <div class="tool">✨<br>مؤثرات</div>
    <div class="tool">🎚️<br>EQ</div>
    <div class="tool">🔊<br>ضغط</div>
  </div>

  <div class="player-area">
    <div class="player-box">Player</div>
    <div class="drop-zone" id="drop">اسحب الصوت هنا</div>
    <audio id="audioPlayer" controls></audio>
    <input type="file" id="fileInput" accept="audio/*" onchange="loadAudio(this)" style="display:none">
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
  </div>

  <div class="sidebar-left">
    <div class="tab">Basic</div>
    <div class="slider"><label>الصوت</label><input type="range" min="0" max="2" step="0.01" value="1"></div>
    <div class="slider"><label>السرعة</label><input type="range" min="0.5" max="2" step="0.01" value="1"></div>
    <div class="slider"><label>الباس</label><input type="range" min="0" max="20" step="1" value="0"></div>
    <div class="slider"><label>الصدى</label><input type="range" min="0" max="100" step="1" value="0"></div>
  </div>
</div>

<div class="timeline"><div class="track">Audio Track 1</div></div>

</div>
<script>
function loadAudio(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('audioPlayer').src = e.target.result;
    document.getElementById('drop').innerText = file.name;
  }
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
