<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>SHADOWKING AUDIO PRO</title>
<style>
:root{--bg:#000;--card:#0a0a0a;--neon:#00e5ff;--neon2:#00aaff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:var(--bg);color:#fff;overflow:hidden;height:100vh;width:100vw}
#wrapper{height:100%;width:100%;background:var(--bg);position:relative}
#wrapper.rotate-force{transform: rotate(90deg);transform-origin: center;position: fixed;top: 50%;left: 50%;margin-top: -50vw;margin-left: -50vh;}

.topbar{background:linear-gradient(90deg,#000,#0d0d0d);height:50px;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:15px;text-shadow:0 0 10px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:8px 20px;border-radius:10px;font-weight:900;font-size:13px;box-shadow:0 0 15px var(--neon)}

.container{display:flex;height:calc(100% - 50px - 45px)}
.sidebar-right{width:65px;background:#000;padding:8px 4px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.tool{background:var(--card);border:1px solid #222;border-radius:10px;padding:10px 4px;text-align:center;font-size:9px;color:#aaa;cursor:pointer}
.tool.active{background:var(--neon);color:#000;border-color:var(--neon);box-shadow:0 0 15px var(--neon)}

.player-area{flex:1;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:10px}
.player-box{background:linear-gradient(90deg,var(--neon),var(--neon2));padding:7px 18px;border-radius:8px;color:#000;font-weight:900;font-size:14px}
.drop-zone{width:92%;height:150px;background:var(--card);border:2px dashed #222;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px}
#wave{width:90%;height:60px;background:#0a0a0a;border-radius:10px}
.controls{display:flex;gap:10px}
.btn{background:var(--neon);color:#000;border:none;padding:8px 16px;border-radius:8px;font-weight:900;cursor:pointer}
.btn.danger{background:#ff0044;color:#fff}

.sidebar-left{width:120px;background:#000;padding:10px 6px;border-right:2px solid var(--neon);overflow-y:auto}
.tab{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:8px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:10px;font-size:13px;cursor:pointer}
.slider{margin-bottom:12px}
.slider label{color:#aaa;font-size:10px;display:block;margin-bottom:3px}
input[type=range]{width:100%;accent-color:var(--neon);height:5px}

.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:400px;overflow-y:auto}
.filter-btn{background:#111;border:1px solid #333;padding:6px;border-radius:6px;font-size:10px;color:#aaa;cursor:pointer}
.filter-btn.active{background:var(--neon);color:#000}

.timeline{height:45px;background:#000;border-top:2px solid var(--neon);padding:6px}
.track{background:linear-gradient(90deg, var(--neon) 0%, var(--neon2) 100%);height:33px;border-radius:6px;display:flex;align-items:center;padding:0 10px;color:#000;font-weight:900;font-size:11px}
.hidden{display:none}
</style>
</head>
<body>
<div id="wrapper">

<div class="topbar">
  <div class="logo">SHADOWKING AUDIO PRO 👑</div>
  <button class="export-btn" onclick="exportAudio()">تصدير</button>
</div>

<div class="container">
  <div class="sidebar-right">
    <div class="tool active" onclick="showTab('basic')">⚙️<br>Basic</div>
    <div class="tool" onclick="showTab('filter')">✨<br>فلتر</div>
    <div class="tool" onclick="showTab('eq')">🎚️<br>EQ</div>
    <div class="tool" onclick="showTab('fx')">🔊<br>مؤثرات</div>
    <div class="tool" onclick="recordAudio()">🎤<br>تسجيل</div>
  </div>

  <div class="player-area">
    <div class="player-box">Player</div>
    <div class="drop-zone" id="drop">اسحب الصوت هنا</div>
    <canvas id="wave"></canvas>
    <div class="controls">
      <button class="btn" onclick="playAudio()">تشغيل</button>
      <button class="btn" onclick="pauseAudio()">ايقاف</button>
      <button class="btn danger" onclick="resetAudio()">اعادة</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*" onchange="loadAudio(this)" style="display:none">
    <button class="btn" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
  </div>

  <div class="sidebar-left">
    <div id="basic-tab">
      <div class="tab">Basic</div>
      <div class="slider"><label>الصوت: <span id="volVal">1.00</span></label><input type="range" min="0" max="2" step="0.01" value="1" oninput="setVolume(this.value)"></div>
      <div class="slider"><label>السرعة: <span id="speedVal">1.00</span></label><input type="range" min="0.5" max="2" step="0.01" value="1" oninput="setSpeed(this.value)"></div>
      <div class="slider"><label>طبقة الصوت: <span id="pitchVal">0</span></label><input type="range" min="-12" max="12" step="1" value="0" oninput="setPitch(this.value)"></div>
    </div>

    <div id="filter-tab" class="hidden">
      <div class="tab">120+ فلتر</div>
      <div class="filter-grid" id="filterGrid"></div>
    </div>

    <div id="eq-tab" class="hidden">
      <div class="tab">EQ</div>
      <div class="slider"><label>باس</label><input type="range" min="0" max="20" step="1" value="0" oninput="setBass(this.value)"></div>
      <div class="slider"><label>تريبل</label><input type="range" min="0" max="20" step="1" value="0" oninput="setTreble(this.value)"></div>
    </div>

    <div id="fx-tab" class="hidden">
      <div class="tab">مؤثرات</div>
      <div class="slider"><label>صدى: <span id="echoVal">0</span></label><input type="range" min="0" max="100" step="1" value="0" oninput="setEcho(this.value)"></div>
      <div class="slider"><label>ريفيرب</label><input type="range" min="0" max="100" step="1" value="0" oninput="setReverb(this.value)"></div>
    </div>
  </div>
</div>

<div class="timeline"><div class="track">Audio Track 1</div></div>

</div>

<script>
// Web Audio API
let audioCtx, source, gainNode, speedNode, biquadFilter, convolver, analyser;
let audioBuffer, isPlaying = false;
let filters = [
  'عادي','باس قوي','صوت روبوت','صوت فضائي','صدى كهف','غرفة صغيرة','هول كبير',
  'صوت اطفال','صوت عجوز','مشع','تحت الماء','راديو قديم','هاتف','استوديو','مسرح',
  'فلانجر','كورس','ديستورشن','واه واه','فيزر','ريفرس','بيت كراشر','لفي','تشويش',
  'نايتي نايت','يوميل','تليفون','ميكروفون','قاعة','حمام','كراج','نفق','غابة'
];
// كررناهم عشان نوصل 120+
for(let i=0; i<4; i++) filters = filters.concat(filters.map(f=>f+' '+i));

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  biquadFilter = audioCtx.createBiquadFilter();
  analyser = audioCtx.createAnalyser();
  gainNode.connect(biquadFilter).connect(analyser).connect(audioCtx.destination);
}

function loadAudio(input){
  const file = input.files[0];
  if(!file) return;
  if(!audioCtx) initAudio();
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buffer => {
      audioBuffer = buffer;
      document.getElementById('drop').innerText = file.name;
      drawWave();
    });
  }
  reader.readAsArrayBuffer(file);
}

function playAudio(){
  if(!audioBuffer) return;
  if(isPlaying) return;
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.playbackRate.value = parseFloat(document.querySelector('#speedVal').innerText);
  source.connect(gainNode);
  source.start();
  isPlaying = true;
}

function pauseAudio(){
  if(source) source.stop();
  isPlaying = false;
}

function resetAudio(){ pauseAudio(); }

function setVolume(v){
  if(gainNode) gainNode.gain.value = v;
  volVal.innerText = parseFloat(v).toFixed(2);
}
function setSpeed(v){
  if(source) source.playbackRate.value = v;
  speedVal.innerText = parseFloat(v).toFixed(2);
}
function setPitch(v){ pitchVal.innerText = v; } // تحتاج مكتبة اضافية للبيتش الحقيقي
function setBass(v){ biquadFilter.type='lowshelf'; biquadFilter.frequency.value=200; biquadFilter.gain.value=v; }
function setTreble(v){ biquadFilter.type='highshelf'; biquadFilter.frequency.value=3000; biquadFilter.gain.value=v; }
function setEcho(v){ echoVal.innerText = v; } // تحتاج delay node
function setReverb(v){}

function showTab(tab){
  document.querySelectorAll('#basic-tab,#filter-tab,#eq-tab,#fx-tab').forEach(el=>el.classList.add('hidden'));
  document.getElementById(tab+'-tab').classList.remove('hidden');
  document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
  event.target.closest('.tool').classList.add('active');
}

// توليد 120 فلتر
const grid = document.getElementById('filterGrid');
filters.slice(0,120).forEach((f,i)=>{
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.innerText = f;
  btn.onclick = ()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); alert('تم تفعيل: '+f); }
  grid.appendChild(btn);
});

function drawWave(){ /* رسم الموجة */ }
function exportAudio(){ alert('جاري التصدير... قريبا'); }
function recordAudio(){ alert('التسجيل قريبا'); }

// لف الشاشة
function forceLandscape() {
  const wrapper = document.getElementById('wrapper');
  if(window.innerHeight > window.innerWidth){
    wrapper.classList.add('rotate-force');
    wrapper.style.width = window.innerHeight + 'px';
    wrapper.style.height = window.innerWidth + 'px';
  } else {
    wrapper.classList.remove('rotate-force');
  }
}
window.addEventListener('load', forceLandscape);
window.addEventListener('resize', forceLandscape);
</script>
</body>
</html>
