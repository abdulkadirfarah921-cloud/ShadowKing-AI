<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>SHADOWKING AUDIO PRO</title>
<script>
// طلب ملئ الشاشة اول ما يفتح
function goFullScreen(){
  const elem = document.documentElement;
  if(elem.requestFullscreen) elem.requestFullscreen().catch(()=>{});
  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
  forceLandscape();
}

function forceLandscape() {
  const wrapper = document.getElementById('wrapper');
  if(window.innerHeight > window.innerWidth){
    wrapper.classList.add('rotate-force');
    wrapper.style.width = window.innerHeight + 'px';
    wrapper.style.height = window.innerWidth + 'px';
  } else {
    wrapper.classList.remove('rotate-force');
    wrapper.style.width = '100%';
    wrapper.style.height = '100%';
  }
}
window.addEventListener('load', ()=>{goFullScreen(); setTimeout(goFullScreen,1000)});
window.addEventListener('resize', forceLandscape);
</script>
<style>
:root{--bg:#000;--card:#0a0a0a;--neon:#00e5ff;--neon2:#00aaff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:var(--bg);color:#fff;overflow:hidden;height:100vh;width:100vw}
#wrapper{height:100%;width:100%;background:var(--bg);position:relative}

#wrapper.rotate-force{
  transform: rotate(90deg);
  transform-origin: center;
  position: fixed;
  top: 50%;left: 50%;
  margin-top: -50vw;margin-left: -50vh;
}

.topbar{background:linear-gradient(90deg,#000,#0d0d0d);height:50px;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:15px;text-shadow:0 0 10px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:8px 20px;border-radius:10px;font-weight:900;font-size:13px;box-shadow:0 0 15px var(--neon)}

.container{display:flex;height:calc(100% - 50px - 45px)}
.sidebar-right{width:65px;background:#000;padding:8px 4px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:8px}
.tool{background:var(--card);border:1px solid #222;border-radius:10px;padding:10px 4px;text-align:center;font-size:9px;color:#aaa}
.tool.active{background:var(--neon);color:#000;border-color:var(--neon);box-shadow:0 0 15px var(--neon)}

.player-area{flex:1;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:10px}
.player-box{background:linear-gradient(90deg,var(--neon),var(--neon2));padding:7px 18px;border-radius:8px;color:#000;font-weight:900;font-size:14px}
.drop-zone{width:92%;height:180px;background:var(--card);border:2px dashed #222;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#444;font-size:14px}
audio{width:90%;height:35px;border-radius:20px;filter:drop-shadow(0 0 10px var(--neon))}
.file-btn{background:var(--card);color:var(--neon);border:1px solid var(--neon);padding:8px 18px;border-radius:8px;font-weight:700;font-size:12px}

.sidebar-left{width:110px;background:#000;padding:10px 6px;border-right:2px solid var(--neon);overflow-y:auto}
.tab{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:8px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:10px;font-size:13px}
.slider{margin-bottom:12px}
.slider label{color:#aaa;font-size:10px;display:block;margin-bottom:3px}
input[type=range]{width:100%;accent-color:var(--neon);height:5px}

.timeline{height:45px;background:#000;border-top:2px solid var(--neon);padding:6px}
.track{background:linear-gradient(90deg, var(--neon) 0%, var(--neon2) 100%);height:33px;border-radius:6px;display:flex;align-items:center;padding:0 10px;color:#000;font-weight:900;font-size:11px}
</style>
</head>
<body>
<div id="wrapper">

<div class="topbar">
  <div class="logo">SHADOWKING AUDIO PRO 👑</div>
  <button class="export-btn" onclick="goFullScreen()">تصدير</button>
</div>

<div class="container">
  <div class="sidebar-right">
    <div class="tool active">📁<br>استيراد</div>
    <div class="tool">🎵<br>مكتبة</div>
    <div class="tool">✨<br>مؤثرات</div>
    <div class="tool">🎚️<br>EQ</div>
    <div class="tool">🔊<br>ضغط</div>
  </div>

  <div class="player-area">
    <div class="player-box">Player</div>
    <div class="drop-zone" id="drop">اسحب الصوت هنا</div>
    <audio id="audioPlayer" controls></audio>
    <input type="file" id="fileInput" accept="audio/*" onchange="loadAudio(this)" style="display:none">
    <button class="file-btn" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
  </div>

  <div class="sidebar-left">
    <div class="tab">Basic</div>
    <div class="slider"><label>الصوت</label><input type="range" min="0" max="2" step="0.01" value="1"></div>
    <div class="slider"><label>السرعة</label><input type="range" min="0.5" max="2" step="0.01" value="1"></div>
    <div class="slider"><label>الباس</label><input type="range" min="0" max="20" step="1" value="0"></div>
    <div class="slider"><label>الصدى</label><input type="range" min="0" max="100" step="1" value="0"></div>
  </div>
</div>

<div class="timeline"><div class="track">Audio Track 1</div></div>

</div>
<script>
function loadAudio(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('audioPlayer').src = e.target.result;
    document.getElementById('drop').innerText = file.name;
  }
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
