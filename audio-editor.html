<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SHADOWKING AUDIO PRO</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--neon:#00e5ff;--neon2:#00aaff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:#000;color:#fff;height:100vh;width:100vw;overflow:hidden}
.topbar{background:#000;height:50px;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:15px}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:8px 20px;border-radius:10px;font-weight:900;cursor:pointer}
.container{display:flex;height:calc(100vh - 95px)}
.sidebar-right{width:70px;background:#000;padding:8px 4px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:8px}
.tool{background:#0a0a0a;border:1px solid #222;border-radius:10px;padding:10px 4px;text-align:center;font-size:9px;color:#aaa;cursor:pointer}
.tool.active{background:var(--neon);color:#000}
.player-area{flex:1;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:10px}
.drop-zone{width:90%;height:120px;background:#0a0a0a;border:2px dashed #333;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#666;font-size:13px;cursor:pointer}
.controls{display:flex;gap:10px}
.btn{background:var(--neon);color:#000;border:none;padding:10px 18px;border-radius:8px;font-weight:900;cursor:pointer;font-size:14px}
.btn.danger{background:#ff0044;color:#fff}
.sidebar-left{width:160px;background:#000;padding:10px 6px;border-right:2px solid var(--neon);overflow-y:auto}
.tab{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:8px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:10px;font-size:13px}
input[type=range], textarea{width:100%;background:#111;border:1px solid #333;color:#fff;border-radius:6px;padding:6px}
.filter-btn{background:#111;border:1px solid #333;padding:8px;border-radius:6px;font-size:11px;color:#aaa;cursor:pointer;text-align:right;width:100%;margin-bottom:5px}
.filter-btn.active{background:var(--neon);color:#000;font-weight:900}
.timeline{height:45px;background:#000;border-top:2px solid var(--neon);padding:6px}
.track{background:linear-gradient(90deg, var(--neon) 0%, var(--neon2) 100%);height:33px;border-radius:6px;display:flex;align-items:center;padding:0 10px;color:#000;font-weight:900;font-size:11px}
.hidden{display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">👑 SHADOWKING AUDIO PRO</div>
  <button type="button" class="export-btn" onclick="alert('التصدير قريبا')">تصدير</button>
</div>

<div class="container">
  <div class="sidebar-right">
    <button type="button" class="tool active" onclick="showTab('basic')">⚙️<br>Basic</button>
    <button type="button" class="tool" onclick="showTab('filter')">✨<br>فلتر</button>
    <button type="button" class="tool" onclick="showTab('ai')">🤖<br>AI</button>
  </div>

  <div class="player-area">
    <div class="drop-zone" id="drop" onclick="document.getElementById('fileInput').click()">اضغط لاختيار ملف صوتي</div>
    <div class="controls">
      <button type="button" class="btn" onclick="playAudio()">تشغيل</button>
      <button type="button" class="btn" onclick="pauseAudio()">ايقاف</button>
      <button type="button" class="btn danger" onclick="resetAudio()">اعادة</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*" onchange="loadAudio(this)" style="display:none">
  </div>

  <div class="sidebar-left">
    <div id="basic-tab">
      <div class="tab">Basic</div>
      <label>الصوت: <span id="volVal">1.00</span></label><input type="range" min="0" max="2" step="0.01" value="1" oninput="setVolume(this.value)">
      <label>السرعة: <span id="speedVal">1.00</span></label><input type="range" min="0.5" max="2" step="0.01" value="1" oninput="setSpeed(this.value)">
    </div>
    <div id="filter-tab" class="hidden"><div class="tab">10 فلاتر</div><div id="filterGrid"></div></div>
    <div id="ai-tab" class="hidden"><div class="tab">AI صوت</div><textarea id="aiText" placeholder="اكتب وصف الصوت"></textarea><button type="button" class="btn" onclick="generateAIvoice()">توليد ⚡</button></div>
  </div>
</div>

<div class="timeline"><div class="track">Audio Track 1</div></div>

<script>
let audioCtx, source, gainNode, audioBuffer;
const filters = [{name:"صدى"},{name:"روبوت"},{name:"باس"},{name:"SHADOWKING"}];
function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination); }
function loadAudio(input){ const file = input.files[0]; if(!file) return; initAudio(); const reader = new FileReader(); reader.onload = e => { audioCtx.decodeAudioData(e.target.result, buffer => { audioBuffer = buffer; document.getElementById('drop').innerText = file.name; }); } reader.readAsArrayBuffer(file); }
function playAudio(){ if(!audioBuffer) return alert('اختار ملف اول'); initAudio(); source = audioCtx.createBufferSource(); source.buffer = audioBuffer; source.connect(gainNode); source.start(0); }
function pauseAudio(){ if(source) source.stop(); }
function resetAudio(){ pauseAudio(); }
function setVolume(v){ if(gainNode) gainNode.gain.value = v; document.getElementById('volVal').innerText = parseFloat(v).toFixed(2); }
function setSpeed(v){ if(source) source.playbackRate.value = v; document.getElementById('speedVal').innerText = parseFloat(v).toFixed(2); }
function showTab(tab){ document.querySelectorAll('#basic-tab,#filter-tab,#ai-tab').forEach(el=>el.classList.add('hidden')); document.getElementById(tab+'-tab').classList.remove('hidden'); document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active')); event.currentTarget.classList.add('active'); }
filters.forEach((f)=>{ const btn = document.createElement('button'); btn.type="button"; btn.className = 'filter-btn'; btn.innerText = f.name; btn.onclick = ()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); alert('تم: '+f.name); } document.getElementById('filterGrid').appendChild(btn); });
function generateAIvoice(){ const text = document.getElementById('aiText').value; if(!text){ alert('اكتب النص اول'); return; } speechSynthesis.cancel(); const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'ar-SA'; speechSynthesis.speak(utterance); }
</script>
</body>
</html>
