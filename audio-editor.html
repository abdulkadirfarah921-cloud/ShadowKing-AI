<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هندسة الصوت</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#FFC107;padding:20px;text-align:center}
h1{text-align:center;text-shadow:0 0 20px #FFC107;margin-bottom:20px}
.panel{border:2px solid #FFC107;border-radius:15px;padding:20px;margin:20px auto;background:rgba(20,20,20,0.9);max-width:500px}
.btn{background:#FFC107;color:#000;border:none;padding:12px 20px;border-radius:10px;font-weight:900;cursor:pointer;margin:5px}
.btn:hover{background:#FFD700}
input[type=range]{width:80%}
audio{width:100%;margin:15px 0}
input[type=file]{color:#fff}
#fileName{color:#aaa;margin-top:10px}
</style>
</head>
<body>

<h1>🎚️ استوديو هندسة الصوت</h1>
<button class="btn" onclick="location.href='index.html'">⬅️ الرجوع</button>

<div class="panel">
  <h3>📁 استيراد صوت</h3>
  <input type="file" id="fileInput" accept="audio/*" onchange="loadAudio(this)">
  <p id="fileName"></p>
</div>

<div class="panel">
  <h3>▶️ التشغيل</h3>
  <audio id="audioPlayer" controls></audio>
</div>

<div class="panel">
  <h3>🎛️ المؤثرات</h3>
  <label>الصوت: <input type="range" id="volume" min="0" max="2" step="0.1" value="1" oninput="setVolume(this.value)"> <span id="volVal">1</span></label><br><br>
  <label>السرعة: <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" oninput="setRate(this.value)"> <span id="rateVal">1</span></label><br><br>
  <button class="btn" onclick="addReverb()">اضافة صدى</button>
  <button class="btn" onclick="addRobot()">صوت روبوت</button>
</div>

<div class="panel">
  <h3>💾 التصدير</h3>
  <button class="btn" onclick="exportAudio()">تصدير الصوت</button>
</div>

<script>
window.onload = function(){
  const savedAudio = localStorage.getItem('audioData');
  const savedName = localStorage.getItem('audioName');
  if(savedAudio){
    document.getElementById('audioPlayer').src = savedAudio;
    document.getElementById('fileName').innerText = 'الصوت: ' + savedName;
  }
}

function loadAudio(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('audioPlayer').src = e.target.result;
    document.getElementById('fileName').innerText = 'الصوت: ' + file.name;
  }
  reader.readAsDataURL(file);
}

function setVolume(v){
  document.getElementById('volVal').innerText = v;
  document.getElementById('audioPlayer').volume = v;
}

function setRate(r){
  document.getElementById('rateVal').innerText = r;
  document.getElementById('audioPlayer').playbackRate = r;
}

function addReverb(){
  alert('تم اضافة صدى!');
}

function addRobot(){
  alert('تم تفعيل صوت الروبوت!');
}

function exportAudio(){
  const a = document.getElementById('audioPlayer');
  if(!a.src){alert('ارفع صوت اول'); return;}
  const link = document.createElement('a');
  link.href = a.src;
  link.download = 'SHADOWKING-Edited.wav';
  link.click();
}
</script>
</body>
</html>
