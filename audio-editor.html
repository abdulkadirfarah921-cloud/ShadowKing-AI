<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SHADOWKING AUDIO PRO</title>
<style>
:root{--neon:#00e5ff;--neon2:#00aaff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:#000;color:#fff;height:100vh;width:100vw;overflow:hidden}

/* اجبار العرض */
@media screen and (orientation:portrait) {
  html { transform: rotate(90deg); transform-origin: left top; width: 100vh; height: 100vw; position: absolute; top: 100%; left: 0; }
}

.topbar{background:#000;height:50px;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:15px;text-shadow:0 0 10px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:8px 20px;border-radius:10px;font-weight:900;cursor:pointer}
.container{display:flex;height:calc(100vh - 100px)}
.sidebar-right{width:70px;background:#000;padding:10px 5px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:10px}
.tool{background:#0a0a0a;border:1px solid #222;border-radius:10px;padding:12px 5px;text-align:center;font-size:10px;color:#aaa;cursor:pointer}
.tool.active{background:var(--neon);color:#000;box-shadow:0 0 15px var(--neon)}
.player-area{flex:1;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:15px}
.drop-zone{width:90%;max-width:500px;height:140px;background:#0a0a0a;border:2px dashed #333;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#666;font-size:14px;text-align:center;cursor:pointer}
.drop-zone:hover{border-color:var(--neon)}
.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{background:var(--neon);color:#000;border:none;padding:12px 20px;border-radius:8px;font-weight:900;cursor:pointer;font-size:15px}
.btn:active{transform:scale(0.95)}
.btn.danger{background:#ff0044;color:#fff}
.btn.ai{background:#ffaa00;color:#000;width:100%}
.sidebar-left{width:200px;background:#000;padding:12px 8px;border-right:2px solid var(--neon);overflow-y:auto}
.tab{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:10px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:12px;font-size:14px}
.slider{margin-bottom:15px}
.slider label{color:#aaa;font-size:11px;display:block;margin-bottom:5px}
input[type=range]{width:100%;accent-color:var(--neon)}
textarea{width:100%;background:#111;border:1px solid #333;color:#fff;border-radius:6px;padding:8px;height:80px;resize:none}
.filter-btn{background:#111;border:1px solid #333;padding:10px;border-radius:6px;font-size:12px;color:#aaa;cursor:pointer;text-align:right;width:100%;margin-bottom:8px}
.filter-btn.active{background:var(--neon);color:#000;font-weight:900}
.timeline{height:50px;background:#000;border-top:2px solid var(--neon);padding:10px}
.track{background:linear-gradient(90deg, var(--neon) 0%, var(--neon2) 100%);height:30px;border-radius:6px;display:flex;align-items:center;padding:0 15px;color:#000;font-weight:900;font-size:12px}
.hidden{display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">👑 SHADOWKING AUDIO PRO</div>
  <button class="export-btn" onclick="alert('التصدير قريبا')">تصدير</button>
</div>

<div class="container">
  <div class="sidebar-right">
    <button class="tool active" onclick="showTab('basic')">⚙️<br>Basic</button>
    <button class="tool" onclick="showTab('filter')">✨<br>120 فلتر</button>
    <button class="tool" onclick="showTab('eq')">🎚️<br>EQ</button>
    <button class="tool" onclick="showTab('fx')">🔊<br>مؤثرات</button>
    <button class="tool" onclick="showTab('ai')">🤖<br>AI</button>
  </div>

  <div class="player-area">
    <div class="drop-zone" id="drop" onclick="document.getElementById('fileInput').click()">اضغط لاختيار ملف صوتي MP3</div>
    <div class="controls">
      <button class="btn" onclick="playAudio()">تشغيل</button>
      <button class="btn" onclick="pauseAudio()">ايقاف</button>
      <button class="btn danger" onclick="resetAudio()">اعادة</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*" onchange="loadAudio(this)" style="display:none">
  </div>

  <div class="sidebar-left">
    <div id="basic-tab">
      <div class="tab">Basic</div>
      <div class="slider"><label>الصوت: <span id="volVal">1.00</span></label><input type="range" min="0" max="2" step="0.01" value="1" oninput="setVolume(this.value)"></div>
      <div class="slider"><label>السرعة: <span id="speedVal">1.00</span></label><input type="range" min="0.5" max="2" step="0.01" value="1" oninput="setSpeed(this.value)"></div>
    </div>

    <div id="filter-tab" class="hidden">
      <div class="tab">120 فلتر</div>
      <div id="filterGrid"></div>
    </div>

    <div id="eq-tab" class="hidden"><div class="tab">EQ 10 Bands</div></div>
    <div id="fx-tab" class="hidden"><div class="tab">مؤثرات</div></div>
    <div id="ai-tab" class="hidden">
      <div class="tab">AI صوت</div>
      <textarea id="aiText" placeholder="اكتب النص هنا"></textarea>
      <button class="btn ai" onclick="generateAIvoice()">توليد الصوت ⚡</button>
    </div>
  </div>
</div>

<div class="timeline"><div class="track">Audio Track 1</div></div>

<script>
let audioCtx, source, gainNode, audioBuffer;

// 12 فلتر بأسماء حقيقية
const filters = [
{name:"صدى الكهف"},{name:"صدى القصر"},{name:"روبوت"},{name:"شيطان"},
{name:"باس قوي"},{name:"اذاعي"},{name:"تحت الماء"},{name:"عكس"},
{name:"SHADOWKING"},{name:"الملك"},{name:"تنظيف صوت"},{name:"استوديو"}
];

function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination); }
function loadAudio(input){ const file = input.files[0]; if(!file) return; initAudio(); const reader = new FileReader(); reader.onload = e => { audioCtx.decodeAudioData(e.target.result, buffer => { audioBuffer = buffer; document.getElementById('drop').innerText = file.name; }); } reader.readAsArrayBuffer(file); }
function playAudio(){ if(!audioBuffer) return alert('اختار ملف اول'); initAudio(); source = audioCtx.createBufferSource(); source.buffer = audioBuffer; source.connect(gainNode); source.start(0); }
function pauseAudio(){ if(source) source.stop(); }
function resetAudio(){ pauseAudio(); }
function setVolume(v){ if(gainNode) gainNode.gain.value = v; document.getElementById('volVal').innerText = parseFloat(v).toFixed(2); }
function setSpeed(v){ if(source) source.playbackRate.value = v; document.getElementById('speedVal').innerText = parseFloat(v).toFixed(2); }
function showTab(tab){ document.querySelectorAll('#basic-tab,#filter-tab,#eq-tab,#fx-tab,#ai-tab').forEach(el=>el.classList.add('hidden')); document.getElementById(tab+'-tab').classList.remove('hidden'); document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active')); event.currentTarget.classList.add('active'); }

// اضافة الفلاتر
filters.forEach((f)=>{
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.innerText = f.name;
  btn.onclick = ()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    alert('تم تفعيل: '+f.name);
  }
  document.getElementById('filterGrid').appendChild(btn);
});

function generateAIvoice(){
  const text = document.getElementById('aiText').value;
  if(!text){ alert('اكتب النص اول'); return; }
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ar-SA';
  speechSynthesis.speak(utterance);
}
</script>
</body>
</html>
