<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000">
<meta name="mobile-web-app-capable" content="yes">
<title>SHADOWKING AUDIO PRO</title>
<style>
:root{--bg:#000;--card:#0a0a0a;--neon:#00e5ff;--neon2:#00aaff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:var(--bg);color:#fff;overflow:hidden;height:100vh;width:100vw}
#wrapper{height:100%;width:100%;background:var(--bg);position:relative}
#wrapper.rotate-force{transform: rotate(90deg);transform-origin: center;position: fixed;top: 50%;left: 50%;margin-top: -50vw;margin-left: -50vh;}

.topbar{background:linear-gradient(90deg,#000,#0d0d0d);height:50px;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:15px;text-shadow:0 0 10px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:8px 20px;border-radius:10px;font-weight:900;font-size:13px;box-shadow:0 0 15px var(--neon);cursor:pointer}

.container{display:flex;height:calc(100% - 50px - 45px)}
.sidebar-right{width:65px;background:#000;padding:8px 4px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.tool{background:var(--card);border:1px solid #222;border-radius:10px;padding:10px 4px;text-align:center;font-size:9px;color:#aaa;cursor:pointer}
.tool.active{background:var(--neon);color:#000;border-color:var(--neon);box-shadow:0 0 15px var(--neon)}

.player-area{flex:1;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:10px}
.player-box{background:linear-gradient(90deg,var(--neon),var(--neon2));padding:7px 18px;border-radius:8px;color:#000;font-weight:900;font-size:14px}
.drop-zone{width:92%;height:130px;background:var(--card);border:2px dashed #222;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#444;font-size:13px;text-align:center;padding:10px}
#wave{width:90%;height:50px;background:#0a0a0a;border-radius:10px}
.controls{display:flex;gap:10px}
.btn{background:var(--neon);color:#000;border:none;padding:8px 16px;border-radius:8px;font-weight:900;cursor:pointer}
.btn.danger{background:#ff0044;color:#fff}
.btn.ai{background:#ffaa00;color:#000;width:100%}

.sidebar-left{width:130px;background:#000;padding:10px 6px;border-right:2px solid var(--neon);overflow-y:auto}
.tab{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:8px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:10px;font-size:13px}
.slider{margin-bottom:12px}
.slider label{color:#aaa;font-size:10px;display:block;margin-bottom:3px}
input[type=range], select, textarea{width:100%;background:#111;border:1px solid #333;color:#fff;border-radius:6px;padding:6px;font-size:11px;accent-color:var(--neon)}
textarea{height:70px;resize:none}

.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:350px;overflow-y:auto}
.filter-btn{background:#111;border:1px solid #333;padding:6px;border-radius:6px;font-size:10px;color:#aaa;cursor:pointer}
.filter-btn.active{background:var(--neon);color:#000}

.timeline{height:45px;background:#000;border-top:2px solid var(--neon);padding:6px}
.track{background:linear-gradient(90deg, var(--neon) 0%, var(--neon2) 100%);height:33px;border-radius:6px;display:flex;align-items:center;padding:0 10px;color:#000;font-weight:900;font-size:11px}
.hidden{display:none}
</style>
</head>
<body>
<div id="wrapper">

<div class="topbar">
  <div class="logo">SHADOWKING AUDIO PRO 👑</div>
  <button class="export-btn" onclick="alert('التصدير قريبا')">تصدير</button>
</div>

<div class="container">
  <div class="sidebar-right">
    <div class="tool active" onclick="showTab('basic')">⚙️<br>Basic</div>
    <div class="tool" onclick="showTab('filter')">✨<br>فلتر</div>
    <div class="tool" onclick="showTab('eq')">🎚️<br>EQ</div>
    <div class="tool" onclick="showTab('fx')">🔊<br>مؤثرات</div>
    <div class="tool" onclick="showTab('ai')">🤖<br>AI صوت</div>
  </div>

  <div class="player-area">
    <div class="player-box">Player</div>
    <div class="drop-zone" id="drop" onclick="document.getElementById('fileInput').click()">اضغط لاختيار ملف صوتي<br>او اسحبه هنا</div>
    <canvas id="wave"></canvas>
    <div class="controls">
      <button class="btn" onclick="playAudio()">تشغيل</button>
      <button class="btn" onclick="pauseAudio()">ايقاف</button>
      <button class="btn danger" onclick="resetAudio()">اعادة</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*" onchange="loadAudio(this)" style="display:none">
  </div>

  <div class="sidebar-left">
    <div id="basic-tab">
      <div class="tab">Basic</div>
      <div class="slider"><label>الصوت: <span id="volVal">1.00</span></label><input type="range" min="0" max="2" step="0.01" value="1" oninput="setVolume(this.value)"></div>
      <div class="slider"><label>السرعة: <span id="speedVal">1.00</span></label><input type="range" min="0.5" max="2" step="0.01" value="1" oninput="setSpeed(this.value)"></div>
    </div>

    <div id="filter-tab" class="hidden">
      <div class="tab">120 فلتر</div>
      <div class="filter-grid" id="filterGrid"></div>
    </div>

    <div id="eq-tab" class="hidden">
      <div class="tab">EQ</div>
      <div class="slider"><label>باس</label><input type="range" min="0" max="20" value="0" oninput="setBass(this.value)"></div>
      <div class="slider"><label>تريبل</label><input type="range" min="0" max="20" value="0" oninput="setTreble(this.value)"></div>
    </div>

    <div id="fx-tab" class="hidden">
      <div class="tab">مؤثرات</div>
      <div class="slider"><label>صدى: <span id="echoVal">0</span></label><input type="range" min="0" max="100" value="0" oninput="echoVal.innerText=this.value"></div>
    </div>

    <div id="ai-tab" class="hidden">
      <div class="tab">AI صوت مجاني</div>
      <select id="aiVoice">
        <option value="auto">تلقائي - حسب اللغة</option>
      </select>
      <textarea id="aiText" placeholder="اكتب اي نص هنا... مثال: مرحبا انا الملك ShadowKing"></textarea>
      <button class="btn ai" onclick="generateAIvoice()">توليد الصوت ⚡</button>
      <button class="btn ai" style="background:#ff0044;margin-top:5px" onclick="speechSynthesis.cancel()">ايقاف الكلام</button>
    </div>
  </div>
</div>

<div class="timeline"><div class="track">Audio Track 1</div></div>
</div>

<script>
// Web Audio
let audioCtx, source, gainNode, biquadFilter;
let audioBuffer, isPlaying = false;

// 120 فلتر
let filters = [];
for(let i=1; i<=120; i++) filters.push(`فلتر ${i}`);

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  biquadFilter = audioCtx.createBiquadFilter();
  gainNode.connect(biquadFilter).connect(audioCtx.destination);
}

function loadAudio(input){
  const file = input.files[0]; if(!file) return;
  initAudio();
  const reader = new FileReader();
  reader.onload = e => {
    audioCtx.decodeAudioData(e.target.result, buffer => {
      audioBuffer = buffer; document.getElementById('drop').innerText = file.name;
    });
  }
  reader.readAsArrayBuffer(file);
}
function playAudio(){ if(!audioBuffer) return alert('اختار ملف اول'); source = audioCtx.createBufferSource(); source.buffer = audioBuffer; source.connect(gainNode); source.start(); isPlaying=true; }
function pauseAudio(){ if(source) source.stop(); isPlaying=false; }
function resetAudio(){ pauseAudio(); }
function setVolume(v){ if(gainNode) gainNode.gain.value = v; volVal.innerText = parseFloat(v).toFixed(2); }
function setSpeed(v){ if(source) source.playbackRate.value = v; speedVal.innerText = parseFloat(v).toFixed(2); }
function setBass(v){ biquadFilter.type='lowshelf'; biquadFilter.frequency.value=200; biquadFilter.gain.value=v; }
function setTreble(v){ biquadFilter.type='highshelf'; biquadFilter.frequency.value=3000; biquadFilter.gain.value=v; }

function showTab(tab){
  document.querySelectorAll('#basic-tab,#filter-tab,#eq-tab,#fx-tab,#ai-tab').forEach(el=>el.classList.add('hidden'));
  document.getElementById(tab+'-tab').classList.remove('hidden');
  document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
  event.target.closest('.tool').classList.add('active');
}

// توليد 120 فلتر
filters.forEach((f,i)=>{
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.innerText = f;
  btn.onclick = ()=>{ document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); alert('تم تفعيل: '+f); }
  filterGrid.appendChild(btn);
});

// AI صوت مجاني بدون API
function detectLanguage(text) {
  if(/[\u0600-\u06FF]/.test(text)) return 'ar-SA';
  if(/[a-zA-Z]/.test(text)) return 'en-US';
  return 'en-US';
}

function loadVoices(){
  const voices = speechSynthesis.getVoices();
  const select = document.getElementById('aiVoice');
  voices.forEach(v=>{
    if(v.lang.includes('ar') || v.lang.includes('en')){
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.text = v.name + ' - ' + v.lang;
      select.appendChild(opt);
    }
  });
}
loadVoices();
window.speechSynthesis.onvoiceschanged = loadVoices;

function generateAIvoice(){
  const text = document.getElementById('aiText').value;
  if(!text){ alert('اكتب النص اول'); return; }

  speechSynthesis.cancel(); // وقف اي كلام شغال
  const utterance = new SpeechSynthesisUtterance(text);

  // كشف اللغة تلقائي
  utterance.lang = detectLanguage(text);
  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.volume = 1;

  // اختار الصوت المحدد
  const selectedVoice = document.getElementById('aiVoice').value;
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.name === selectedVoice);
  if(voice) utterance.voice = voice;

  speechSynthesis.speak(utterance);
  alert('جاري تشغيل الصوت...');
}

// لف الشاشة اجباري
function forceLandscape() {
  const wrapper = document.getElementById('wrapper');
  if(window.innerHeight > window.innerWidth){
    wrapper.classList.add('rotate-force');
    wrapper.style.width = window.innerHeight + 'px';
    wrapper.style.height = window.innerWidth + 'px';
  } else { wrapper.classList.remove('rotate-force'); }
}
window.addEventListener('load', forceLandscape);
window.addEventListener('resize', forceLandscape);
</script>
</body>
</html>
