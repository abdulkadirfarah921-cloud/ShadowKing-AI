<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHADOWKING STUDIO PRO</title>
<style>
:root{--neon:#00e5ff;--neon2:#00aaff;--pink:#ff00ff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:#000;color:#fff;height:100vh;width:100vw;overflow:hidden}

#app{width:100vw;height:100vh;display:flex;flex-direction:column;position:absolute;top:0;left:0}
@media (orientation: portrait) {
  #app {transform: rotate(90deg) translate(-50%, -50%);transform-origin: top left;width: 100vh;height: 100vw;top: 50%;left: 50%;}
}

.topbar{background:linear-gradient(90deg,#000,#0a0a0a);height:55px;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon);flex-shrink:0}
.logo{color:var(--neon);font-weight:900;font-size:16px;text-shadow:0 0 15px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;border:none;padding:9px 22px;border-radius:12px;font-weight:900;cursor:pointer;box-shadow:0 0 15px var(--neon)}

.container{display:flex;flex:1;overflow:hidden}
.sidebar-right{width:90px;background:#050505;padding:10px 5px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.tool{background:linear-gradient(180deg,#111,#000);border:1px solid #222;border-radius:12px;padding:10px 5px;text-align:center;font-size:10px;color:#aaa;cursor:pointer;transition:0.2s}
.tool.active{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;box-shadow:0 0 20px var(--neon);font-weight:900}

/* المنطقة الحمرا صارت ستوديو احترافي */
.player-area{flex:1;background:#000;display:flex;flex-direction:column;padding:10px;gap:10px;overflow:hidden}
.studio-header{height:40px;background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;font-weight:900;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:14px}
.studio-body{display:flex;flex:1;gap:10px}
.drop-zone{flex:1;background:linear-gradient(135deg,#0a0a0a,#000);border:2px dashed var(--neon);border-radius:15px;display:flex;align-items:center;justify-content:center;color:#666;font-size:14px;text-align:center;cursor:pointer;position:relative;overflow:hidden}
.drop-zone:hover{border-color:var(--pink); box-shadow:0 0 20px var(--neon)}
.controls{display:flex;flex-direction:column;gap:8px;width:100px}
.btn{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:14px;border-radius:10px;font-weight:900;cursor:pointer;font-size:12px;min-height:50px}
.btn:active{transform:scale(0.9)}
.btn.danger{background:linear-gradient(90deg,#ff0044,#ff0066)}

.sidebar-left{width:260px;background:#050505;padding:10px 8px;border-right:2px solid var(--neon);overflow-y:auto;flex-shrink:0}
.tab{background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;padding:10px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:10px;font-size:13px}
.slider{margin-bottom:12px}
.slider label{color:#aaa;font-size:11px;display:flex;justify-content:space-between;margin-bottom:5px}

/* شبكة الفلاتر والمؤثرات */
.grid-scroll{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:400px;overflow-y:auto;padding-right:5px}
.grid-item{background:#111;border:1px solid #333;padding:8px;border-radius:8px;font-size:10px;color:#aaa;cursor:pointer;text-align:center;position:relative;transition:0.2s}
.grid-item:hover{border-color:var(--neon); transform:scale(1.05)}
.grid-item.active{background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;font-weight:900}
/* انيميشن الملصق */
.grid-item.active::after{content:"✨"; position:absolute; top:-5px; right:-5px; animation:pop 0.5s infinite alternate}
@keyframes pop{from{transform:scale(1)} to{transform:scale(1.3)}}

/* EQ 30 باند */
.eq-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}
.eq-band{display:flex;flex-direction:column;align-items:center}
.eq-band input[type=range]{writing-mode: bt-lr; -webkit-appearance: slider-vertical; width:20px; height:80px}

.timeline{height:55px;background:#000;border-top:2px solid var(--neon);padding:10px;flex-shrink:0}
.track{background:linear-gradient(90deg, var(--neon) 0%, var(--pink) 100%);height:35px;border-radius:8px;display:flex;align-items:center;padding:0 15px;color:#000;font-weight:900;font-size:12px}
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="logo">👑 SHADOWKING STUDIO PRO</div>
    <button class="export-btn" id="exportBtn">تصدير 4K</button>
  </div>

  <div class="container">
    <div class="sidebar-right">
      <div class="tool active" data-tab="basic">⚙️<br>Basic</div>
      <div class="tool" data-tab="filter">✨<br>1000 فلتر</div>
      <div class="tool" data-tab="eq">🎚️<br>30 EQ</div>
      <div class="tool" data-tab="fx">🔊<br>100 مؤثر</div>
      <div class="tool" data-tab="ai">🤖<br>AI</div>
    </div>

    <!-- المنطقة الحمرا صارت مصنع -->
    <div class="player-area">
      <div class="studio-header">🎬 مصنع الفيديو والصوت الاحترافي</div>
      <div class="studio-body">
        <div class="drop-zone" id="drop">
          <div>اسحب ملف MP3 / MP4 هنا<br>او اضغط للاختيار</div>
        </div>
        <div class="controls">
          <button class="btn" id="playBtn">▶️<br>تشغيل</button>
          <button class="btn" id="pauseBtn">⏸️<br>ايقاف</button>
          <button class="btn danger" id="resetBtn">🔄<br>اعادة</button>
        </div>
      </div>
      <input type="file" id="fileInput" accept="audio/*,video/*" style="display:none">
    </div>

    <div class="sidebar-left">
      <div id="basic-tab">
        <div class="tab">الاعدادات الاساسية</div>
        <div class="slider"><label><span>الصوت</span><span id="volVal">1.00</span></label><input type="range" id="vol" min="0" max="2" step="0.01" value="1"></div>
        <div class="slider"><label><span>السرعة</span><span id="speedVal">1.00</span></label><input type="range" id="speed" min="0.25" max="3" step="0.01" value="1"></div>
      </div>

      <div id="filter-tab" style="display:none">
        <div class="tab">1000+ فلتر احترافي</div>
        <div class="grid-scroll" id="filterGrid"></div>
      </div>

      <div id="eq-tab" style="display:none">
        <div class="tab">EQ 30 Band احترافي</div>
        <div class="eq-grid" id="eqGrid"></div>
      </div>

      <div id="fx-tab" style="display:none">
        <div class="tab">100+ مؤثر بأنيميشن</div>
        <div class="grid-scroll" id="fxGrid"></div>
      </div>

      <div id="ai-tab" style="display:none">
        <div class="tab">AI تحويل نص لصوت</div>
        <textarea id="aiText" placeholder="اكتب النص هنا بالعربي" style="width:100%;height:80px;background:#111;border:1px solid #333;color:#fff;border-radius:6px;padding:8px"></textarea>
        <button class="btn" id="aiBtn" style="width:100%;margin-top:8px">⚡ توليد</button>
      </div>
    </div>
  </div>

  <div class="timeline"><div class="track" id="trackName">Audio Track 1</div></div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

let audioCtx, source, gainNode, audioBuffer;
let isPlaying = false;

// توليد 1000 فلتر اوتوماتيك
const filterNames = ["صدى","ريبيرب","باس","تريبل","كورس","فلانجر","فيزر","تشويه","روبوت","شيطان","ملاك","كهف","قصر","حمام","استوديو","اذاعة","هاتف","قديم","جديد","فضاء","ماء","نار","ثلج","ملكي","SHADOWKING"];
const filterGrid = document.getElementById('filterGrid');
for(let i=1; i<=1000; i++){
  const name = filterNames[i % filterNames.length] + " " + i;
  const div = document.createElement('div');
  div.className = 'grid-item';
  div.innerText = name;
  div.onclick = () => {
    document.querySelectorAll('#filterGrid.grid-item').forEach(b=>b.classList.remove('active'));
    div.classList.add('active');
  }
  filterGrid.appendChild(div);
}

// توليد 30 باند EQ
const eqGrid = document.getElementById('eqGrid');
for(let i=1; i<=30; i++){
  const div = document.createElement('div');
  div.className = 'eq-band';
  div.innerHTML = `<input type="range" min="-12" max="12" value="0" orient="vertical"><span style="font-size:9px">${i}</span>`;
  eqGrid.appendChild(div);
}

// توليد 100 مؤثر بأنيميشن
const fxNames = ["تكرار","عكس","بطيء","سريع","تقطيع","توهج","اهتزاز","موجة","نبض","ليزر","برق","دخان","ثلج","مطر","نجوم"];
const fxGrid = document.getElementById('fxGrid');
for(let i=1; i<=100; i++){
  const name = fxNames[i % fxNames.length] + " FX" + i;
  const div = document.createElement('div');
  div.className = 'grid-item';
  div.innerText = name;
  div.onclick = () => {
    document.querySelectorAll('#fxGrid.grid-item').forEach(b=>b.classList.remove('active'));
    div.classList.add('active');
  }
  fxGrid.appendChild(div);
}

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 1;
  gainNode.connect(audioCtx.destination);
}

document.getElementById('drop').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
  const file = e.target.files[0]; if(!file) return;
  initAudio();
  const reader = new FileReader();
  reader.onload = ev => {
    audioCtx.decodeAudioData(ev.target.result, buffer => {
      audioBuffer = buffer;
      document.getElementById('drop').innerText = file.name;
      document.getElementById('trackName').innerText = file.name;
    });
  }
  reader.readAsArrayBuffer(file);
};

document.getElementById('playBtn').onclick = () => {
  if(!audioBuffer) return alert('اختار ملف اول');
  if(isPlaying) return;
  initAudio();
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(gainNode);
  source.start(0);
  isPlaying = true;
  source.onended = () => isPlaying = false;
};

document.getElementById('pauseBtn').onclick = () => {
  if(source && isPlaying) {source.stop(); isPlaying = false;}
};
document.getElementById('resetBtn').onclick = () => {
  if(source) source.stop(); isPlaying = false;
};

document.getElementById('vol').oninput = e => {
  if(gainNode) gainNode.gain.value = e.target.value;
  document.getElementById('volVal').innerText = parseFloat(e.target.value).toFixed(2);
};
document.getElementById('speed').oninput = e => {
  if(source) source.playbackRate.value = e.target.value;
  document.getElementById('speedVal').innerText = parseFloat(e.target.value).toFixed(2);
};

document.querySelectorAll('.tool').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#basic-tab,#filter-tab,#eq-tab,#fx-tab,#ai-tab').forEach(el=>el.style.display='none');
    document.getElementById(btn.dataset.tab+'-tab').style.display='block';
    document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  }
});

document.getElementById('aiBtn').onclick = () => {
  const text = document.getElementById('aiText').value;
  if(!text){ alert('اكتب النص اول'); return; }
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ar-SA';
  speechSynthesis.speak(utterance);
};

document.getElementById('exportBtn').onclick = () => alert('التصدير: سجل الشاشة بجودة 4K');
</script>
</body>
</html>
