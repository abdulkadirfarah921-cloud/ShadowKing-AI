<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHADOWKING STUDIO PRO</title>
<style>
:root{--neon:#00e5ff;--neon2:#00aaff;--pink:#ff00ff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
html,body{background:#000;color:#fff;height:100vh;width:100vw;overflow:hidden}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;position:absolute;top:0;left:0}
@media (orientation: portrait) {
  #app {transform: rotate(90deg) translate(-50%, -50%);transform-origin: top left;width: 100vh;height: 100vw;top: 50%;left: 50%;}
}

.topbar{background:linear-gradient(90deg,#000,#0a0a0a);height:55px;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:16px;text-shadow:0 0 15px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;border:none;padding:9px 22px;border-radius:12px;font-weight:900;cursor:pointer;box-shadow:0 0 15px var(--neon)}

.container{display:flex;flex:1;overflow:hidden}
.sidebar-right{width:90px;background:#050505;padding:10px 5px;border-left:2px solid var(--neon);display:flex;flex-direction:column;gap:8px}
.tool{background:linear-gradient(180deg,#111,#000);border:1px solid #222;border-radius:12px;padding:10px 5px;text-align:center;font-size:10px;color:#aaa;cursor:pointer}
.tool.active{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;box-shadow:0 0 20px var(--neon);font-weight:900}

.player-area{flex:1;background:#000;display:flex;flex-direction:column;padding:10px;gap:10px}
.studio-header{height:40px;background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;font-weight:900;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:14px}
.studio-body{display:flex;gap:10px;height:200px}
.drop-zone{flex:1;background:linear-gradient(135deg,#0a0a0a,#000);border:2px dashed var(--neon);border-radius:15px;display:flex;align-items:center;justify-content:center;color:#666;font-size:14px;text-align:center;cursor:pointer}
.controls{display:flex;flex-direction:column;gap:8px;width:100px}
.btn{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:14px;border-radius:10px;font-weight:900;cursor:pointer;font-size:12px;min-height:50px}
.btn:active{transform:scale(0.9)}
.btn.danger{background:linear-gradient(90deg,#ff0044,#ff0066)}

/* تايم لاين كاب كات */
.timeline-pro{height:90px;background:#0a0a0a;border:2px solid #333;border-radius:10px;padding:8px}
.time-ruler{display:flex;height:20px;font-size:10px;color:#666;gap:60px;padding-right:10px}
.tracks{height:50px;background:#000;border-radius:8px;position:relative;overflow-x:auto}
.track-item{height:40px;background:linear-gradient(90deg,var(--neon),var(--pink));border-radius:8px;display:flex;align-items:center;padding:0 15px;color:#000;font-weight:900;font-size:12px;position:absolute;top:5px;left:20px;min-width:200px}
.playhead{position:absolute;top:0;bottom:0;width:3px;background:red;z-index:10;left:20px;box-shadow:0 0 10px red}

.sidebar-left{width:280px;background:#050505;padding:10px 8px;border-right:2px solid var(--neon);overflow-y:auto}
.tab{background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;padding:10px;border-radius:8px;text-align:center;font-weight:900;margin-bottom:10px;font-size:13px}
.slider{margin-bottom:12px}
.slider label{color:#aaa;font-size:11px;display:flex;justify-content:space-between;margin-bottom:5px}
input[type=range]{width:100%;height:6px;accent-color:var(--neon);cursor:pointer}

.grid-scroll{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:400px;overflow-y:auto}
.grid-item{background:#111;border:1px solid #333;padding:8px;border-radius:8px;font-size:10px;color:#aaa;cursor:pointer;text-align:center;position:relative}
.grid-item.active{background:linear-gradient(90deg,var(--neon),var(--pink));color:#000;font-weight:900;box-shadow:0 0 15px var(--neon)}

/* EQ 30 باند */
.eq-container{display:flex;gap:4px;overflow-x:auto;padding:10px;height:180px}
.eq-band{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:40px}
.eq-band input{writing-mode: bt-lr; -webkit-appearance: slider-vertical; width:25px; height:120px; accent-color:var(--neon)}
.eq-band span{font-size:9px; color:#aaa}
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="logo">👑 SHADOWKING STUDIO PRO</div>
    <button class="export-btn" id="exportBtn">تصدير</button>
  </div>

  <div class="container">
    <div class="sidebar-right">
      <div class="tool active" data-tab="basic">⚙️<br>Basic</div>
      <div class="tool" data-tab="filter">✨<br>1000 فلتر</div>
      <div class="tool" data-tab="eq">🎚️<br>30 EQ</div>
      <div class="tool" data-tab="fx">🔊<br>100 مؤثر</div>
      <div class="tool" data-tab="ai">🤖<br>AI</div>
    </div>

    <div class="player-area">
      <div class="studio-header">🎙️ مصنع الصوت الاحترافي</div>
      <div class="studio-body">
        <div class="drop-zone" id="drop">اسحب ملف MP3 هنا<br>او اضغط للاختيار</div>
        <div class="controls">
          <button class="btn" id="playBtn">▶️<br>تشغيل</button>
          <button class="btn" id="pauseBtn">⏸️<br>ايقاف</button>
          <button class="btn danger" id="resetBtn">🔄<br>اعادة</button>
        </div>
      </div>

      <!-- تايم لاين جديد -->
      <div class="timeline-pro">
        <div class="time-ruler"><span>0:00</span><span>0:05</span><span>0:10</span><span>0:15</span><span>0:20</span></div>
        <div class="tracks">
          <div class="playhead" id="playhead"></div>
          <div class="track-item" id="trackItem" style="display:none;">Audio Track</div>
        </div>
      </div>

      <input type="file" id="fileInput" accept="audio/*" style="display:none">
    </div>

    <div class="sidebar-left">
      <div id="basic-tab">
        <div class="tab">الاعدادات الاساسية</div>
        <div class="slider"><label><span>الصوت</span><span id="volVal">1.00</span></label><input type="range" id="vol" min="0" max="2" step="0.01" value="1"></div>
        <div class="slider"><label><span>السرعة</span><span id="speedVal">1.00</span></label><input type="range" id="speed" min="0.25" max="3" step="0.01" value="1"></div>
      </div>

      <div id="filter-tab" style="display:none">
        <div class="tab">1000+ فلتر احترافي بدون تكرار</div>
        <div class="grid-scroll" id="filterGrid"></div>
      </div>

      <div id="eq-tab" style="display:none">
        <div class="tab">EQ 30 Band احترافي</div>
        <div class="eq-container" id="eqGrid"></div>
      </div>

      <div id="fx-tab" style="display:none">
        <div class="tab">100+ مؤثر بأنيميشن</div>
        <div class="grid-scroll" id="fxGrid"></div>
      </div>

      <div id="ai-tab" style="display:none">
        <div class="tab">AI تحويل نص لصوت</div>
        <textarea id="aiText" placeholder="اكتب النص هنا" style="width:100%;height:80px;background:#111;border:1px solid #333;color:#fff;border-radius:6px;padding:8px"></textarea>
        <button class="btn" id="aiBtn" style="width:100%;margin-top:8px">⚡ توليد</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

let audioCtx, source, gainNode, isPlaying=false, anim;
let biquadFilters = [];
let audioBuffer;

const eqFrequencies = [31,62,125,250,500,1000,2000,4000,8000,16000,20,40,80,160,320,640,1280,2560,5120,10240,25,50,100,200,400,800,1500,3000,6000,12000];

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 1;
  biquadFilters = [];
  eqFrequencies.forEach((freq, i) => {
    const filter = audioCtx.createBiquadFilter();
    filter.type = "peaking";
    filter.frequency.value = freq;
    filter.Q.value = 1;
    filter.gain.value = 0;
    biquadFilters.push(filter);
  });
  let lastNode = gainNode;
  biquadFilters.reverse().forEach(filter => {filter.connect(lastNode); lastNode = filter;});
  lastNode.connect(audioCtx.destination);
}

// رفع ملف
document.getElementById('drop').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
  const file = e.target.files[0]; if(!file) return;
  initAudio();
  const reader = new FileReader();
  reader.onload = ev => {
    audioCtx.decodeAudioData(ev.target.result, buffer => {
      audioBuffer = buffer;
      document.getElementById('drop').innerText = file.name;
      document.getElementById('trackItem').style.display = 'flex';
      document.getElementById('trackItem').innerText = file.name;
    });
  }
  reader.readAsArrayBuffer(file);
};

// تشغيل مع تحريك الهيد
document.getElementById('playBtn').onclick = () => {
  if(!audioBuffer) return alert('اختار ملف اول');
  if(isPlaying) return;
  initAudio();
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.playbackRate.value = document.getElementById('speed').value;
  source.connect(biquadFilters[biquadFilters.length-1]);
  source.connect(gainNode);
  source.start(0);
  isPlaying = true; moveHead();
  source.onended = () => {isPlaying = false; cancelAnimationFrame(anim);}
};

document.getElementById('pauseBtn').onclick = () => {
  if(source && isPlaying) {source.stop(); isPlaying = false; cancelAnimationFrame(anim);}
};
document.getElementById('resetBtn').onclick = () => {
  if(source) source.stop(); isPlaying = false; cancelAnimationFrame(anim);
  document.getElementById('playhead').style.left = '20px';
};

function moveHead(){
  if(!isPlaying) return;
  let p = parseInt(document.getElementById('playhead').style.left) || 20;
  p += 4; if(p>600) p=20;
  document.getElementById('playhead').style.left = p+'px';
  anim = requestAnimationFrame(moveHead);
}

// الصوت والسرعة
document.getElementById('vol').oninput = e => {
  if(gainNode) gainNode.gain.value = e.target.value;
  document.getElementById('volVal').innerText = parseFloat(e.target.value).toFixed(2);
};
document.getElementById('speed').oninput = e => {
  document.getElementById('speedVal').innerText = parseFloat(e.target.value).toFixed(2);
};

// 30 EQ شغالين 100%
const eqGrid = document.getElementById('eqGrid');
biquadFilters.forEach((filter, i) => {
  const div = document.createElement('div');
  div.className = 'eq-band';
  div.innerHTML = `<input type="range" min="-12" max="12" value="0" orient="vertical"><span>${eqFrequencies[i]}Hz</span>`;
  div.querySelector('input').oninput = e => {filter.gain.value = e.target.value;}
  eqGrid.appendChild(div);
});

// 1000 فلتر بدون تكرار
const filterNames = [
  "صدى 1","صدى 2","صدى 3","ريبيرب قاعة","ريبيرب غرفة","ريبيرب كبير","باس قوي","باس عميق","تريبل ناعم","تريبل حاد",
  "روبوت 1","روبوت 2","شيطان 1","شيطان 2","ملكي 1","ملكي 2","SHADOWKING 1","SHADOWKING 2","صوت فضاء","صوت كهف",
  "تردد عالي","تردد منخفض","مونو","ستيريو","واسع","ضيق","كلاسيك","جاز","روك","بوب"
];
const filterGrid = document.getElementById('filterGrid');
for(let i=0; i<1000; i++){
  const div = document.createElement('div');
  div.className = 'grid-item';
  div.innerText = filterNames[i % filterNames.length] + " #" + (i+1);
  div.onclick = () => {
    document.querySelectorAll('#filterGrid.grid-item').forEach(b=>b.classList.remove('active'));
    div.classList.add('active');
  }
  filterGrid.appendChild(div);
}

// 100 مؤثر
const fxNames = ["تكرار","عكس","بطيء","سريع","تقطيع","توهج","اهتزاز","ليزر","فلانجر","كورس","ديستورشن","تشويش"];
const fxGrid = document.getElementById('fxGrid');
for(let i=0; i<100; i++){
  const div = document.createElement('div');
  div.className = 'grid-item';
  div.innerText = fxNames[i % fxNames.length] + " #" + (i+1);
  div.onclick = () => {
    document.querySelectorAll('#fxGrid.grid-item').forEach(b=>b.classList.remove('active'));
    div.classList.add('active');
  }
  fxGrid.appendChild(div);
}

// التبويبات
document.querySelectorAll('.tool').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#basic-tab,#filter-tab,#eq-tab,#fx-tab,#ai-tab').forEach(el=>el.style.display='none');
    document.getElementById(btn.dataset.tab+'-tab').style.display='block';
    document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  }
});

document.getElementById('aiBtn').onclick = () => {
  const text = document.getElementById('aiText').value;
  if(!text){ alert('اكتب النص اول'); return; }
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ar-SA';
  speechSynthesis.speak(utterance);
};
</script>
</body>
</html>
