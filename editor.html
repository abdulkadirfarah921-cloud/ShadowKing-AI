<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>محرر الصوت - Shadowking</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden;background:#000}

  /* خدعة: نلف الصفحة كلها 90 درجة لو الموبايل بالطول */
  #wrapper{width:100vh;height:100vw;transform-origin:top left;position:absolute;top:100%;left:0;transform:rotate(-90deg);background:#0a0a0a}

  /* لما يكون عرض نخليه طبيعي */
  @media (orientation: landscape) {
    #wrapper{width:100vw;height:100vh;transform:rotate(0deg);top:0}
  }

 .topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#1a1a1a;border-bottom:1px solid #333}
 .tabs{display:flex;gap:5px;overflow-x:auto;flex:1}
 .tab{padding:7px 14px;border-radius:6px;font-size:12px;color:#aaa;background:#2a2a2a;white-space:nowrap}
 .tab.active{background:#FFC107;color:#000;font-weight:bold}
 .export-btn{background:#FFC107;color:#000;border:none;padding:8px 18px;border-radius:6px;font-weight:bold;cursor:pointer}

 .content{display:flex;flex:1}
 .left{width:20%;background:#1a1a1a;padding:10px;border-left:1px solid #333;display:flex;flex-direction:column}
 .center{width:60%;background:#000;padding:10px;display:flex;flex-direction:column;justify-content:center;align-items:center}
 .right{width:20%;background:#1a1a1a;padding:10px;border-right:1px solid #333;overflow-y:auto}

 .import-box{width:100%;height:140px;border:2px dashed #444;border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#666;background:#222;cursor:pointer;font-size:12px}
  #player{width:95%}
  #waveform{width:95%;height:100px;background:#111;border-radius:8px;margin-top:10px;position:relative;overflow:hidden}

 .timeline{height:150px;background:#1a1a1a;border-top:1px solid #333;padding:10px}
 .timeline-header{font-size:11px;color:#888}
 .timeline-track{height:80px;background:#0a0a0a;border-radius:8px;position:relative;margin-top:5px;overflow-x:auto}
 .clip{position:absolute;height:90%;top:5%;min-width:140px;background:linear-gradient(90deg,#FFC107,#FFA000);border-radius:6px;color:#000;font-weight:bold;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0 5px}

 .detail-title{color:#FFC107;font-size:13px;margin:8px 0;font-weight:bold}
 .detail-row{display:flex;justify-content:space-between;margin:6px 0;font-size:11px}
 .effect-btn{background:#2a2a2a;color:#FFC107;border:1px solid #444;padding:8px;border-radius:6px;margin:5px 0;width:100%;font-size:11px;cursor:pointer}
</style>
</head>
<body>

<div id="wrapper">
  <div class="topbar">
    <div class="tabs">
      <div class="tab active">Media</div>
      <div class="tab">Audio</div>
      <div class="tab">Effects</div>
      <div class="tab">Speed</div>
      <div class="tab" onclick="cutClip()">Cut</div>
    </div>
    <button class="export-btn" onclick="exportFile()">Export</button>
  </div>

  <div class="content">
    <div class="left">
      <div class="import-box" onclick="document.getElementById('file2').click()">
        <div style="font-size:30px">+</div><div>Import</div>
        <input type="file" id="file2" accept="audio/*" style="display:none" onchange="addClip(this.files[0].name)">
      </div>
    </div>

    <div class="center">
      <audio id="player" controls></audio>
      <div id="waveform"></div>
    </div>

    <div class="right">
      <div class="detail-title">Details</div>
      <div class="detail-row"><span>Name:</span><span id="name">AI Voice</span></div>
      <div class="detail-row"><span>Duration:</span><span id="dur">00:00</span></div>
      <div class="detail-title">Effects</div>
      <button class="effect-btn" onclick="applyEffect('reverb')">Reverb</button>
      <button class="effect-btn" onclick="applyEffect('bass')">Bass Boost</button>
      <button class="effect-btn" onclick="undo()">Undo</button>
    </div>
  </div>

  <div class="timeline">
    <div class="timeline-header">Drag material here and start to create</div>
    <div class="timeline-track" id="track"></div>
  </div>
</div>

<script>
let history = [];

window.onload = function(){
  // محاولة اجبار ملئ الشاشة
  document.documentElement.requestFullscreen().catch(()=>{});
  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }

  const type = localStorage.getItem('audioType');
  if(type == 'ai'){ addClip('AI Voice'); }
  if(type == 'import'){
    document.getElementById('name').innerText = localStorage.getItem('audioName');
    document.getElementById('player').src = localStorage.getItem('audioData');
    addClip(localStorage.getItem('audioName'));
  }
  drawWave();

  document.getElementById('player').onloadedmetadata = function(){
    let s = Math.floor(this.duration);
    document.getElementById('dur').innerText = `00:${s<10?'0':''}${s}`;
  }
}

function addClip(name){
  saveState();
  const track = document.getElementById('track');
  const clip = document.createElement('div');
  clip.className = 'clip';
  clip.style.left = track.children.length * 150 + 'px';
  clip.innerText = name;
  track.appendChild(clip);
}

function applyEffect(e){ alert(e + ' مفعل'); }
function saveState(){ history.push(document.getElementById('track').innerHTML); }
function undo(){ if(history.length>0) document.getElementById('track').innerHTML = history.pop(); }
function cutClip(){ alert('اسحب لقص'); }
function exportFile(){ alert('تم التصدير الى:\n/storage/emulated/0/مجلد اصوات مصنوعة باستخدام SHADOWKING AI'); }

function drawWave(){
  const w = document.getElementById('waveform');
  for(let i=0;i<250;i++){
    let bar = document.createElement('div');
    bar.style = `position:absolute;bottom:0;width:2px;height:${Math.random()*80+10}px;background:#FFC107;left:${i*3}px`;
    w.appendChild(bar);
  }
  setInterval(()=>{
    document.querySelectorAll('#waveform div').forEach(bar=>{
      bar.style.height = Math.random()*80 + 10 + 'px';
    });
  }, 120);
}
</script>
</body>
</html>
