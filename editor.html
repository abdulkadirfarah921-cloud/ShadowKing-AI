<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>SHADOWKING PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100dvh;width:100dvw;overflow:hidden;background:#000;font-family:'Cairo', sans-serif} /* dvh عشان ياكل الشريط */

#wrapper{width:100dvh;height:100dvw;transform-origin:top left;position:absolute;top:0;left:100%;transform:rotate(90deg);background:linear-gradient(135deg,#0a0a0a 0%,#1a001a 100%)}
@media (orientation: landscape) {#wrapper{width:100dvw;height:100dvh;transform:rotate(0deg);left:0;top:0}}

.glow{box-shadow:0 0 25px rgba(255,193,7,0.6)}
.anim{animation: pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 20px #FFC107}50%{transform:scale(1.03);box-shadow:0 0 35px #FF5722}}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:rgba(15,15,15,0.95);backdrop-filter:blur(20px);border-bottom:2px solid #FFC107;height:8vh}
.logo{font-size:16px;font-weight:900;color:#FFC107;text-shadow:0 0 15px #FFC107}
.tabs{display:flex;gap:8px}
.tab{padding:8px 16px;border-radius:20px;font-size:12px;color:#aaa;background:rgba(255,255,255,0.05);cursor:pointer;border:1px solid transparent;transition:0.3s}
.tab.active{background:linear-gradient(90deg,#FFC107,#FF9800);color:#000;font-weight:900;border-color:#FFC107;box-shadow:0 0 20px #FFC107}
.export-btn{background:linear-gradient(90deg,#FFC107,#FF5722);color:#000;border:none;padding:10px 22px;border-radius:25px;font-weight:900;cursor:pointer;font-size:13px;box-shadow:0 0 25px rgba(255,193,7,0.8)}

.content{display:flex;flex:1;gap:10px;padding:10px;height:72vh}
.glass{background:rgba(20,20,20,0.7);backdrop-filter:blur(20px);border:1px solid rgba(255,193,7,0.3);border-radius:18px}
.left{width:22%;padding:12px;display:flex;flex-direction:column;gap:10px}
.center{width:56%;padding:15px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.right{width:22%;padding:12px;overflow-y:auto}

.import-box{height:25%;border:2px dashed #FFC107;border-radius:18px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#FFC107;background:rgba(255,193,7,0.08);cursor:pointer;font-size:13px;font-weight:700;transition:0.3s}
.import-box:hover{background:rgba(255,193,7,0.2);transform:scale(1.04)}

.player-card{width:100%;background:rgba(0,0,0,0.6);border-radius:20px;padding:15px;border:2px solid #FFC107}
#player{width:100%;height:42px;filter:invert(1) hue-rotate(180deg)}
#waveform{width:100%;height:45%;background:linear-gradient(180deg,#000 0%,#1a0a00 100%);border-radius:15px;margin-top:15px;position:relative;overflow:hidden;border:2px solid #FFC107}

.timeline{height:20vh;background:rgba(15,15,15,0.95);backdrop-filter:blur(20px);border-top:2px solid #FFC107;padding:10px}
.timeline-header{font-size:11px;color:#FFC107;font-weight:700;margin-bottom:6px}
.timeline-track{height:70%;background:rgba(0,0,0,0.6);border-radius:15px;position:relative;overflow-x:auto;border:1px solid #FFC107}
.clip{position:absolute;height:88%;top:6%;min-width:120px;background:linear-gradient(90deg,#FFC107,#FF5722);border-radius:10px;color:#000;font-weight:900;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0 8px;cursor:grab;box-shadow:0 0 20px rgba(255,193,7,0.6)}

.section-title{color:#FFC107;font-size:14px;margin:10px 0 8px;font-weight:900;text-shadow:0 0 10px #FFC107}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.filter-btn{background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,193,7,0.4);padding:10px;border-radius:12px;text-align:center;cursor:pointer;font-size:10px;font-weight:700;transition:0.3s}
.filter-btn:hover{background:rgba(255,193,7,0.15);transform:translateY(-2px)}
.filter-btn.active{background:linear-gradient(135deg,#FFC107,#FF5722);color:#000;border-color:#FFC107;box-shadow:0 0 25px #FFC107}

.slider-box{margin:8px 0;padding:8px;background:rgba(0,0,0,0.4);border-radius:10px}
.slider-box label{font-size:11px;color:#FFC107;display:flex;justify-content:space-between;font-weight:700}
input[type=range]{width:100%;accent-color:#FFC107;height:5px;border-radius:10px}
</style>
</head>
<body>

<div id="wrapper">
  <div class="topbar">
    <div class="logo glow">👑 SHADOWKING PRO</div>
    <div class="tabs">
      <div class="tab active">Media</div>
      <div class="tab">Audio</div>
      <div class="tab">FX</div>
      <div class="tab">AI</div>
    </div>
    <button class="export-btn anim" onclick="exportFile()">Export ⚡</button>
  </div>

  <div class="content">
    <div class="left glass">
      <div class="import-box" onclick="document.getElementById('file2').click()">
        <div style="font-size:35px">➕</div><div>اضافة صوت</div>
        <input type="file" id="file2" accept="audio/*" style="display:none" onchange="addClip(this.files[0].name)">
      </div>
      <div class="section-title">تحكم سريع</div>
      <button class="filter-btn" onclick="undo()">↩️ تراجع</button>
      <button class="filter-btn" onclick="redo()">↪️ اعادة</button>
      <button class="filter-btn" onclick="clearAll()">🗑️ مسح</button>
    </div>

    <div class="center">
      <div class="player-card glow">
        <audio id="player" controls></audio>
        <div id="waveform"></div>
      </div>
    </div>

    <div class="right glass">
      <div class="section-title">🔥 فلاتر</div>
      <div class="filter-grid">
        <button class="filter-btn" onclick="toggleFilter('bass',this)">🔉 Bass</button>
        <button class="filter-btn" onclick="toggleFilter('treble',this)">🎵 Treble</button>
        <button class="filter-btn" onclick="toggleFilter('reverb',this)">🔊 Reverb</button>
        <button class="filter-btn" onclick="toggleFilter('echo',this)">📢 Echo</button>
        <button class="filter-btn" onclick="toggleFilter('robot',this)">🤖 Robot</button>
        <button class="filter-btn" onclick="toggleFilter('chipmunk',this)">🐿️ Chip</button>
        <button class="filter-btn" onclick="toggleFilter('deep',this)">👹 Deep</button>
        <button class="filter-btn" onclick="toggleFilter('radio',this)">📻 Radio</button>
      </div>

      <div class="section-title">⚙️ تحكم</div>
      <div class="slider-box">
        <label><span>السرعة</span><span id="speedVal">1.0x</span></label>
        <input type="range" min="0.5" max="2" step="0.1" value="1" oninput="changeSpeed(this.value)">
      </div>
      <div class="slider-box">
        <label><span>الصوت</span><span id="volVal">100%</span></label>
        <input type="range" min="0" max="100" value="100" oninput="changeVolume(this.value)">
      </div>
    </div>
  </div>

  <div class="timeline glass">
    <div class="timeline-header">🎬 التايم لاين</div>
    <div class="timeline-track" id="track"></div>
  </div>
</div>

<script>
let history = []; let future = [];

window.onload = function(){
  // اجبار ملئ الشاشة
  setTimeout(()=>{
    document.documentElement.requestFullscreen().catch(()=>{});
  }, 500);

  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }

  const type = localStorage.getItem('audioType');
  if(type == 'ai'){ addClip('AI Voice'); }
  if(type == 'import'){
    document.getElementById('player').src = localStorage.getItem('audioData');
    addClip(localStorage.getItem('audioName'));
  }
  drawWave();
}

function addClip(name){
  saveState();
  const track = document.getElementById('track');
  const clip = document.createElement('div');
  clip.className = 'clip';
  clip.style.left = track.children.length * 130 + 'px';
  clip.innerText = name;
  track.appendChild(clip);
}

function toggleFilter(type, btn){
  btn.classList.toggle('active');
  const player = document.getElementById('player');
  if(type=='chipmunk') player.playbackRate = btn.classList.contains('active')? 1.8 : 1;
  if(type=='deep') player.playbackRate = btn.classList.contains('active')? 0.6 : 1;
}

function changeSpeed(val){document.getElementById('speedVal').innerText = val + 'x';document.getElementById('player').playbackRate = val;}
function changeVolume(val){document.getElementById('volVal').innerText = val + '%';document.getElementById('player').volume = val/100;}

function saveState(){ history.push(document.getElementById('track').innerHTML); future = []; }
function undo(){ if(history.length>0){ future.push(document.getElementById('track').innerHTML); document.getElementById('track').innerHTML = history.pop(); } }
function redo(){ if(future.length>0){ history.push(document.getElementById('track').innerHTML); document.getElementById('track').innerHTML = future.pop(); } }
function clearAll(){ saveState(); document.getElementById('track').innerHTML = ''; }
function exportFile(){ alert('تم التصدير 🔥\n/storage/emulated/0/SHADOWKING_PRO'); }

function drawWave(){
  const w = document.getElementById('waveform'); w.innerHTML = '';
  for(let i=0;i<160;i++){
    let bar = document.createElement('div');
    bar.style = `position:absolute;bottom:0;width:4px;height:${Math.random()*100+10}px;background:linear-gradient(180deg,#FFC107,#FF5722);left:${i*5.5}px;border-radius:4px;box-shadow:0 0 10px #FFC107`;
    w.appendChild(bar);
  }
  setInterval(()=>{document.querySelectorAll('#waveform div').forEach(bar=>{bar.style.height = Math.random()*100 + 10 + 'px';});}, 70);
}
</script>
</body>
</html>
