<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>محرر الصوت - Shadowking</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:Arial;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* الوضع العمودي */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px;background:#1a1a1a}
.tabs{display:flex;gap:5px;overflow-x:auto;flex:1}
.tab{padding:8px 12px;border-radius:6px;font-size:12px;color:#aaa;background:#2a2a2a;white-space:nowrap}
.tab.active{background:#FFC107;color:#000;font-weight:bold}
.export-btn{background:#FFC107;color:#000;border:none;padding:8px 15px;border-radius:6px;font-weight:bold}

.content{display:flex;flex:1}
.left,.right{display:none} /* نخفيهم في الموبايل */
.center{width:100%;padding:10px;display:flex;flex-direction:column}
  #player{width:100%}
  #waveform{width:100%;height:100px;background:#111;border-radius:8px;margin-top:10px}

.timeline{height:120px;background:#1a1a1a;padding:8px}
.timeline-track{height:60px;background:#0a0a0a;border-radius:8px;position:relative}
.clip{background:linear-gradient(90deg,#FFC107,#FFA000);border-radius:6px;color:#000;font-weight:bold;font-size:10px;padding:5px}

  /* الوضع العرضي 16:9 */
@media (orientation: landscape) {
  body{background:#0a0a0a}
 .topbar{padding:5px 10px}
 .left{display:flex;width:18%;background:#1a1a1a;padding:8px;flex-direction:column}
 .right{display:flex;width:18%;background:#1a1a1a;padding:8px;flex-direction:column;overflow-y:auto}
 .center{width:64%}
 .timeline{height:140px}
 .timeline-track{height:80px}
 .import-box{height:120px;border:2px dashed #444;border-radius:8px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#666;background:#222;font-size:12px}
 .detail-title{color:#FFC107;font-size:12px;margin:5px 0}
 .detail-row{font-size:10px;margin:4px 0}
 .effect-btn{background:#2a2a2a;color:#FFC107;border:1px solid #444;padding:6px;border-radius:5px;margin:3px 0;width:100%;font-size:10px}
}

  /* زر تكبير ملئ الشاشة */
.fullscreen-btn{position:absolute;top:10px;left:10px;background:#FFC107;color:#000;border:none;padding:8px 12px;border-radius:8px;z-index:999}
</style>
</head>
<body>

<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

<div class="topbar">
  <div class="tabs">
    <div class="tab active">Media</div>
    <div class="tab">Audio</div>
    <div class="tab">Effects</div>
    <div class="tab">Speed</div>
    <div class="tab" onclick="cutClip()">Cut</div>
  </div>
  <button class="export-btn" onclick="exportFile()">Export</button>
</div>

<div class="content">
  <!-- يسار يظهر فقط بالعرض -->
  <div class="left">
    <div class="import-box" onclick="document.getElementById('file2').click()">
      <div>+</div><div>Import</div>
      <input type="file" id="file2" accept="audio/*" style="display:none" onchange="addClip(this.files[0].name)">
    </div>
  </div>

  <!-- الوسط -->
  <div class="center">
    <audio id="player" controls></audio>
    <div id="waveform"></div>
  </div>

  <!-- يمين يظهر فقط بالعرض -->
  <div class="right">
    <div class="detail-title">Details</div>
    <div class="detail-row">Name: <span id="name">AI Voice</span></div>
    <div class="detail-row">Duration: <span id="dur">00:00</span></div>
    <div class="detail-title">Effects</div>
    <button class="effect-btn" onclick="applyEffect('reverb')">Reverb</button>
    <button class="effect-btn" onclick="applyEffect('bass')">Bass</button>
    <button class="effect-btn" onclick="undo()">Undo</button>
  </div>
</div>

<div class="timeline">
  <div style="font-size:10px;color:#888">Drag material here</div>
  <div class="timeline-track" id="track"></div>
</div>

<script>
let history = [];

window.onload = function(){
  if(localStorage.getItem('audioType')=='ai'){
    addClip('AI Voice');
  }
  if(localStorage.getItem('audioType')=='import'){
    document.getElementById('name').innerText = localStorage.getItem('audioName');
    document.getElementById('player').src = localStorage.getItem('audioData');
    addClip(localStorage.getItem('audioName'));
  }
  drawWave();
}

// ملئ الشاشة
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    screen.orientation.lock('landscape'); // يجبر الشاشة تلف
  } else {
    document.exitFullscreen();
    screen.orientation.unlock();
  }
}

function addClip(name){
  saveState();
  const track = document.getElementById('track');
  const clip = document.createElement('div');
  clip.className = 'clip';
  clip.style = `position:absolute;left:${track.children.length*120}px;width:120px;height:90%`;
  clip.innerText = name;
  track.appendChild(clip);
}

function applyEffect(e){ alert(e + ' مفعل'); }
function saveState(){ history.push(document.getElementById('track').innerHTML); }
function undo(){ if(history.length>0) document.getElementById('track').innerHTML = history.pop(); }
function cutClip(){ alert('قص'); }
function exportFile(){ alert('تم التصدير'); }

function drawWave(){
  const w = document.getElementById('waveform');
  for(let i=0;i<200;i++){
    let bar = document.createElement('div');
    bar.style = `position:absolute;bottom:0;width:2px;height:${Math.random()*80+10}px;background:#FFC107;left:${i*3}px`;
    w.appendChild(bar);
  }
}
</script>
</body>
</html>
