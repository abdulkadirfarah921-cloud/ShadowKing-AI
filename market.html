<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING FAB STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0D0D; --card:#151515; --card-hover:#1E1E1E; 
  --blue:#0078F2; --green:#00FF88; --text:#FFF; --text2:#A0A0A0;
}
*{font-family:'Cairo';box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text)}

/* هيدر زي الصورة التانية */
.header{position:sticky;top:0;z-index:1000;background:var(--bg);border-bottom:1px solid #222;padding:12px 0}
.header-content{max-width:1800px;margin:auto;display:flex;justify-content:center;align-items:center;gap:20px;position:relative}
.logo{text-align:center}
.logo h1{font-size:1.8em;font-weight:900}
.logo .fab{color:var(--green);font-size:1.1em}
.header-icons{position:absolute;right:32px;display:flex;gap:20px;font-size:1.8em}
.icon-btn{background:transparent;border:none;color:var(--text);cursor:pointer;position:relative}
.badge{position:absolute;top:-8px;left:-8px;background:var(--blue);color:#fff;border-radius:50%;width:20px;height:20px;font-size:0.6em;display:flex;align-items:center;justify-content:center;font-weight:900}

/* فلترة دوائر */
.filters{max-width:1800px;margin:20px auto;padding:0 32px;display:flex;gap:10px;overflow-x:auto}
.filter-btn{background:var(--card);border:none;padding:12px 24px;border-radius:30px;color:var(--text);font-weight:800;cursor:pointer;font-size:1em}
.filter-btn.active{background:var(--blue);color:#fff}

/* شبكة FAB - 4 الى 5 اعمدة */
.container{max-width:1800px;margin:0 auto;padding:0 32px 100px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

.card{background:var(--card);border-radius:12px;overflow:hidden;transition:0.2s}
.card:hover{background:var(--card-hover)}
.card-img-wrapper{position:relative;aspect-ratio:16/9;background:#111}
.card-img{width:100%;height:100%;object-fit:cover}
.download-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);border:none;color:#fff;padding:8px;border-radius:6px;cursor:pointer;opacity:0;transition:0.2s}
.card:hover .download-btn{opacity:1}

.card-body{padding:14px}
.card-title{font-size:1em;font-weight:900;margin-bottom:6px;height:40px;overflow:hidden}
.card-author{color:var(--text2);font-size:0.85em;margin-bottom:10px}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.price{color:var(--green);font-weight:900;font-size:1.3em}
.free{color:var(--green);font-weight:900;font-size:1.1em}
.btn-buy{background:var(--blue);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:900;cursor:pointer}

/* مودال */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);justify-content:center;align-items:center;z-index:2000}
.modal-content{background:var(--card);padding:24px;border-radius:12px;width:90%;max-width:550px}
input,textarea,select{width:100%;padding:12px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;margin:8px 0}
.btn{background:var(--blue);color:#fff;border:none;padding:12px 20px;border-radius:8px;font-weight:900;cursor:pointer}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;padding:14px 20px;border-radius:8px;font-weight:900;display:none}
</style>
</head>
<body>

<!-- هيدر -->
<div class="header">
  <div class="header-content">
    <div class="logo">
      <h1>SHADOWKING</h1>
      <div class="fab">FAB STORE</div>
    </div>
    <div class="header-icons">
      <button class="icon-btn" onclick="showPage('home')">🏠</button>
      <button class="icon-btn" onclick="m.style.display='flex'">+</button>
      <button class="icon-btn" onclick="showPage('lib')">📦</button>
      <button class="icon-btn" onclick="showPage('cart')">🛒<span class="badge" id="cartCount">0</span></button>
    </div>
  </div>
</div>

<!-- فلترة -->
<div class="filters">
  <button class="filter-btn" onclick="setCat('مجا',this)">مجا</button>
  <button class="filter-btn" onclick="setCat('AI',this)">AI</button>
  <button class="filter-btn" onclick="setCat('انتقال',this)">انتقالات</button>
  <button class="filter-btn" onclick="setCat('LUT',this)">LUT</button>
  <button class="filter-btn active" onclick="setCat('الكل',this)">الكل</button>
</div>

<div class="container">
  <div id="homePage">
    <div id="grid" class="grid"></div>
  </div>
  <div id="otherPage" style="display:none"></div>
</div>

<!-- مودال اضافة -->
<div id="m" class="modal"><div class="modal-content">
  <h3>➕ اضافة منتج جديد</h3>
  <input id="n" placeholder="اسم المنتج">
  <input id="author" placeholder="اسم الاستوديو: SHADOWKING Studio">
  <textarea id="d" rows="2" placeholder="وصف"></textarea>
  <input id="i" placeholder="رابط صورة 16:9 من imgur.com">
  <input id="f" placeholder="رابط التحميل Google Drive">
  <select id="c"><option>LUT</option><option>انتقال</option><option>AI</option></select>
  <input id="p" placeholder="السعر: 19.99 او مجاني">
  <div style="display:flex;gap:10px">
    <button class="btn" onclick="add()">نشر</button>
    <button class="btn" style="background:#333" onclick="m.style.display='none'">الغاء</button>
  </div>
</div></div>

<div id="toast" class="toast"></div>

<script>
let ITEMS = JSON.parse(localStorage.getItem('sk_fab_v3')) || [];
let CART = JSON.parse(localStorage.getItem('cart_fab_v3')) || [];
let LIB = JSON.parse(localStorage.getItem('lib_fab_v3')) || [];
let CAT = 'الكل';

const DEFAULT_IMG = "https://via.placeholder.com/600x338/1A1A1A/00FF88?text=SHADOWKING+LUT";

if(ITEMS.length==0){
  ITEMS = [
    {id:1,n:"Cinematic LUT Pack 50 PRO",author:"SHADOWKING Studio",i:DEFAULT_IMG,f:"#",c:"LUT",p:"$19.99"},
    {id:2,n:"TikTok Viral Transitions",author:"SHADOWKING Studio",i:DEFAULT_IMG,f:"#",c:"انتقال",p:"مجاني"},
    {id:3,n:"AI Background Pack",author:"SHADOWKING Studio",i:DEFAULT_IMG,f:"#",c:"AI",p:"$9.99"},
    {id:4,n:"Free VFX Pack",author:"SHADOWKING Studio",i:DEFAULT_IMG,f:"#",c:"مجا",p:"مجاني"}
  ]; save();
}

function save(){
  localStorage.setItem('sk_fab_v3',JSON.stringify(ITEMS));
  localStorage.setItem('cart_fab_v3',JSON.stringify(CART));
  localStorage.setItem('lib_fab_v3',JSON.stringify(LIB));
}

function toast(msg){let t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2000)}
function setCat(c,btn){CAT=c; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render();}

function add(){
  ITEMS.unshift({
    id:Date.now(),n:n.value,author:author.value||"SHADOWKING Studio",
    i:i.value||DEFAULT_IMG,f:f.value,c:c.value,p:p.value
  });
  save(); m.style.display='none'; toast('✅ تم النشر'); render();
}

function buy(item){
  if(!CART.find(x=>x.id==item.id)) CART.push(item);
  save(); updateCounts(); toast('🛒 اضيف للسلة');
}

function download(item){
  item.downloads = (item.downloads||0)+1;
  if(!LIB.find(x=>x.id==item.id)) LIB.push(item);
  save(); toast('📦 تم التحميل');
}

function card(x){
  return `<div class="card">
    <div class="card-img-wrapper">
      <img class="card-img" src="${x.i}" onerror="this.src='${DEFAULT_IMG}'">
      <button class="download-btn" onclick='download(${x.id})'>⬇️</button>
    </div>
    <div class="card-body">
      <div class="card-title">${x.n}</div>
      <div class="card-author">${x.author}</div>
      <div class="card-footer">
        <div class="${x.p=='مجاني'?'free':'price'}">${x.p}</div>
        <button class="btn-buy" onclick='buy(${x.id})'>شراء</button>
      </div>
    </div>
  </div>`
}

function render(){
  let data = ITEMS;
  if(CAT!='الكل'){
    if(CAT=='مجا') data = data.filter(x=>x.p=='مجاني');
    else data = data.filter(x=>x.c==CAT);
  }
  grid.innerHTML = data.map(card).join('');
}

function showPage(page){
  homePage.style.display='none'; otherPage.style.display='block';
  if(page=='cart') otherPage.innerHTML = `<h2 style="margin-bottom:20px">🛒 السلة</h2><div class="grid">`+(CART.map(card).join('')||'<p>السلة فاضية</p>')+`</div>`;
  if(page=='lib') otherPage.innerHTML = `<h2 style="margin-bottom:20px">📦 مكتبتي</h2><div class="grid">`+(LIB.map(card).join('')||'<p>المكتبة فاضية</p>')+`</div>`;
  if(page=='home'){homePage.style.display='block'; otherPage.style.display='none';}
}

function updateCounts(){cartCount.innerText=CART.length;}
updateCounts(); render();
</script>
</body></html>
