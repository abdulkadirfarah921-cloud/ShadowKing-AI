<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING FAB STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A; --card:#1A1A1A; --card-hover:#222; 
  --text:#FFFFFF; --text2:#999;
}
*{font-family:'Cairo';box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);padding-bottom:100px}

/* هيدر FAB */
.header{position:sticky;top:0;z-index:1000;background:#0A0A0A;border-bottom:1px solid #1F1F1F}
.header-content{max-width:1920px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:12px 32px}
.logo{font-size:1.8em;font-weight:900}
.logo span{color:#00FF88}
.nav-right{display:flex;gap:20px;align-items:center}
.icon-btn{background:transparent;border:none;color:var(--text);font-size:1.5em;cursor:pointer;position:relative}
.badge{position:absolute;top:-5px;right:-5px;background:#0078f2;color:#fff;border-radius:50%;width:18px;height:18px;font-size:0.6em;display:flex;align-items:center;justify-content:center}

/* شبكة FAB - 4 اعمدة */
.container{max-width:1920px;margin:0 auto;padding:24px 32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

.card{background:var(--card);border-radius:8px;overflow:hidden;transition:0.2s;cursor:pointer}
.card:hover{background:var(--card-hover)}
.card:hover .download-icon{opacity:1}

.card-img-wrapper{position:relative;aspect-ratio:16/10;background:#111}
.card-img{width:100%;height:100%;object-fit:cover}
.download-icon{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);color:#fff;padding:6px;border-radius:4px;opacity:0;transition:0.2s}

.card-body{padding:12px}
.card-title{font-size:0.95em;font-weight:700;margin-bottom:4px;height:40px;overflow:hidden}
.card-author{color:var(--text2);font-size:0.8em;margin-bottom:8px}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.price{font-weight:900;font-size:1.1em;color:#00FF88}
.free{color:#00FF88;font-weight:900}

/* فلترة */
.filters{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto}
.filter-btn{background:#1A1A1A;border:none;padding:10px 20px;border-radius:20px;color:var(--text);font-weight:700;cursor:pointer}
.filter-btn.active{background:#0078f2}

/* مودال */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:2000}
.modal-content{background:var(--card);padding:24px;border-radius:12px;width:90%;max-width:500px}
input,textarea,select{width:100%;padding:12px;background:#000;border:1px solid #333;border-radius:8px;color:#fff;margin:8px 0}
.btn{background:#0078f2;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-weight:900;cursor:pointer}
.toast{position:fixed;bottom:20px;right:20px;background:#00FF88;color:#000;padding:14px 20px;border-radius:8px;font-weight:900;display:none}
</style>
</head>
<body>

<!-- هيدر -->
<div class="header">
  <div class="header-content">
    <div class="nav-right">
      <button class="icon-btn" onclick="showPage('cart')">🛒<span class="badge" id="cartCount">0</span></button>
      <button class="icon-btn" onclick="showPage('lib')">📦</button>
      <button class="icon-btn" onclick="m.style.display='flex'">➕</button>
    </div>
    <div class="logo">SHADOWKING <span>FAB STORE</span></div>
    <div class="nav-right">
      <button class="icon-btn" onclick="showPage('home')">🏠</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="filters">
    <button class="filter-btn active" onclick="setCat('الكل',this)">الكل</button>
    <button class="filter-btn" onclick="setCat('LUT',this)">LUT</button>
    <button class="filter-btn" onclick="setCat('انتقال',this)">انتقالات</button>
    <button class="filter-btn" onclick="setCat('AI',this)">AI</button>
    <button class="filter-btn" onclick="setCat('مجاني',this)">مجاني</button>
  </div>

  <div id="homePage">
    <div id="grid" class="grid"></div>
  </div>
  <div id="otherPage" style="display:none"></div>
</div>

<!-- مودال -->
<div id="m" class="modal"><div class="modal-content">
  <h3>➕ اضافة منتج</h3>
  <input id="n" placeholder="اسم المنتج">
  <input id="author" placeholder="اسمك / اسم الاستوديو">
  <textarea id="d" rows="2" placeholder="وصف قصير"></textarea>
  <input id="i" placeholder="رابط صورة الغلاف 16:10 من imgur">
  <input id="f" placeholder="رابط التحميل">
  <select id="c"><option>LUT</option><option>انتقال</option><option>AI</option></select>
  <input id="p" placeholder="السعر: 19.99 او مجاني">
  <button class="btn" onclick="add()">نشر</button>
  <button class="btn" style="background:#333" onclick="m.style.display='none'">الغاء</button>
</div></div>

<div id="toast" class="toast"></div>

<script>
let ITEMS = JSON.parse(localStorage.getItem('sk_fab_final')) || [];
let CART = JSON.parse(localStorage.getItem('cart_fab_final')) || [];
let LIB = JSON.parse(localStorage.getItem('lib_fab_final')) || [];
let CAT = 'الكل';

const DEFAULT_IMG = "https://i.imgur.com/ZKmNwYk.png";

if(ITEMS.length==0){
  ITEMS = [
    {id:1,n:"Cinematic LUT Pack 50 PRO",author:"SHADOWKING Studio",d:"",i:DEFAULT_IMG,f:"#",c:"LUT",p:"$19.99"},
    {id:2,n:"TikTok Viral Transitions",author:"SHADOWKING",d:"",i:DEFAULT_IMG,f:"#",c:"انتقال",p:"مجاني"},
    {id:3,n:"AI Background Generator",author:"SHADOWKING",d:"",i:DEFAULT_IMG,f:"#",c:"AI",p:"$9.99"},
    {id:4,n:"CapCut Template Pack",author:"SHADOWKING",d:"",i:DEFAULT_IMG,f:"#",c:"قالب",p:"مجاني"}
  ]; save();
}

function save(){
  localStorage.setItem('sk_fab_final',JSON.stringify(ITEMS));
  localStorage.setItem('cart_fab_final',JSON.stringify(CART));
  localStorage.setItem('lib_fab_final',JSON.stringify(LIB));
}

function toast(msg){let t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2000)}
function setCat(c,btn){CAT=c; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render();}

function add(){
  ITEMS.unshift({
    id:Date.now(),n:n.value,author:author.value,d:d.value,
    i:i.value||DEFAULT_IMG,f:f.value,c:c.value,p:p.value
  });
  save(); m.style.display='none'; toast('تم النشر'); render();
}

function buy(item){
  if(!CART.find(x=>x.id==item.id)) CART.push(item);
  save(); updateCounts(); toast('اضيف للسلة');
}

function card(x){
  return `<div class="card">
    <div class="card-img-wrapper">
      <img class="card-img" src="${x.i}">
      <div class="download-icon">⬇️</div>
    </div>
    <div class="card-body">
      <div class="card-title">${x.n}</div>
      <div class="card-author">${x.author}</div>
      <div class="card-footer">
        <div class="${x.p=='مجاني'?'free':'price'}">${x.p}</div>
        <button class="btn" style="padding:6px 12px;font-size:0.8em" onclick='buy(${x.id})'>شراء</button>
      </div>
    </div>
  </div>`
}

function render(){
  let data = ITEMS;
  if(CAT!='الكل'){
    if(CAT=='مجاني') data = data.filter(x=>x.p=='مجاني');
    else data = data.filter(x=>x.c==CAT);
  }
  grid.innerHTML = data.map(card).join('');
}

function showPage(page){
  homePage.style.display='none'; otherPage.style.display='block';
  if(page=='cart') otherPage.innerHTML = `<h2>السلة</h2><div class="grid">`+CART.map(card).join('')+`</div>`;
  if(page=='lib') otherPage.innerHTML = `<h2>المكتبة</h2><div class="grid">`+LIB.map(card).join('')+`</div>`;
  if(page=='home'){homePage.style.display='block'; otherPage.style.display='none';}
}

function updateCounts(){cartCount.innerText=CART.length;}
updateCounts(); render();
</script>
</body></html>
