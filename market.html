<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING FAB STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#121212; --card:#1F1F1F; --card-hover:#2A2A2A; 
  --neon:#00F5FF; --neon2:#00FF88; --blue:#0078f2;
  --text:#FFFFFF; --text2:#B3B3B3;
}
body.light{--bg:#F8F8F8;--card:#FFFFFF;--card-hover:#F0F0F0;--text:#000;--text2:#555}
*{font-family:'Cairo';box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);overflow-x:hidden}

/* هيدر FAB */
.header{position:sticky;top:0;z-index:1000;background:rgba(18,18,18,0.9);backdrop-filter:blur(20px);border-bottom:1px solid #2A2A2A}
.header-content{max-width:1600px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:14px 24px}
.logo{font-size:1.9em;font-weight:900;letter-spacing:-1px}
.logo span{color:var(--neon2)}
.nav{display:flex;gap:8px;align-items:center}
.nav-btn{background:transparent;color:var(--text);padding:10px 16px;border-radius:8px;border:none;font-weight:700;cursor:pointer;transition:all 0.2s;font-size:0.95em}
.nav-btn:hover{background:var(--card-hover)}
.count-badge{background:var(--blue);color:#fff;border-radius:50%;padding:2px 6px;font-size:0.7em;margin-right:4px}

/* بانر FAB */
.banner{max-width:1600px;margin:24px auto;padding:0 24px}
.banner-card{background:linear-gradient(90deg,#0078f2 0%, #00FF88 100%);padding:50px 40px;border-radius:16px;position:relative;overflow:hidden}
.banner-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);animation:rotate 10s linear infinite}
@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.banner h1{font-size:3em;font-weight:900;margin-bottom:12px;position:relative;z-index:2}
.banner p{font-size:1.2em;position:relative;z-index:2}
.countdown{font-size:1.8em;font-weight:900;color:#000;margin-top:15px;background:#fff;padding:8px 16px;border-radius:8px;display:inline-block;position:relative;z-index:2}

/* اقسام */
.section{max-width:1600px;margin:40px auto;padding:0 24px}
.section-title{font-size:1.9em;font-weight:900;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.see-all{color:var(--neon);cursor:pointer;font-size:0.9em;font-weight:700}
.see-all:hover{text-decoration:underline}

/* شبكة الكروت FAB */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
.card{background:var(--card);border-radius:12px;overflow:hidden;transition:transform 0.25s, background 0.25s;will-change:transform;position:relative}
.card:hover{background:var(--card-hover);transform:translateY(-6px)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;cursor:pointer}
.card-body{padding:18px}
.card-title{font-size:1.25em;font-weight:900;margin-bottom:8px;color:var(--text)}
.card-desc{color:var(--text2);font-size:0.9em;height:38px;overflow:hidden;line-height:1.4}
.tags{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.tag{background:#333;padding:5px 12px;border-radius:20px;font-size:0.8em;font-weight:700}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.price{font-size:1.6em;font-weight:900;color:var(--neon)}
.stats{font-size:0.85em;color:var(--text2)}
.btn-add{background:var(--blue);color:#fff;border:none;padding:12px 22px;border-radius:8px;font-weight:900;cursor:pointer;transition:0.2s;font-size:0.95em}
.btn-add:hover{background:#0090ff;transform:scale(1.05)}
.heart{position:absolute;top:12px;right:12px;font-size:2em;cursor:pointer;z-index:2;filter:drop-shadow(0 2px 4px #000)}
.badge-new{position:absolute;top:12px;left:12px;background:var(--neon2);color:#000;padding:5px 12px;border-radius:20px;font-size:0.8em;font-weight:900}

/* فلترة */
.filters{display:flex;gap:10px;margin-bottom:24px;overflow-x:auto;padding-bottom:5px}
.filters::-webkit-scrollbar{height:4px}
.filters::-webkit-scrollbar-thumb{background:var(--blue);border-radius:10px}
.filter-btn{background:var(--card);border:2px solid #333;padding:12px 24px;border-radius:30px;color:var(--text);font-weight:800;cursor:pointer;white-space:nowrap;transition:0.2s}
.filter-btn.active{border-color:var(--blue);background:var(--blue);color:#fff}

/* مودال */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);justify-content:center;align-items:center;z-index:2000;backdrop-filter:blur(10px)}
.modal-content{background:var(--card);padding:32px;border-radius:16px;width:90%;max-width:650px;border:1px solid #333}
input,textarea,select{width:100%;padding:14px;background:#000;border:1px solid #444;border-radius:10px;color:#fff;margin:10px 0;font-size:1em;font-family:'Cairo'}
.toast{position:fixed;bottom:30px;right:30px;background:var(--neon2);color:#000;padding:16px 28px;border-radius:12px;font-weight:900;display:none;z-index:3000;animation:slideIn 0.3s;box-shadow:0 10px 30px rgba(0,255,136,0.3)}
@keyframes slideIn{from{transform:translateX(300px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<!-- هيدر FAB -->
<div class="header">
  <div class="header-content">
    <div class="nav">
      <button class="nav-btn" onclick="showPage('cart')">🛒 <span class="count-badge" id="cartCount">0</span> السلة</button>
      <button class="nav-btn" onclick="showPage('fav')">❤️ <span class="count-badge" id="favCount">0</span></button>
      <button class="nav-btn" onclick="showPage('lib')">📦 <span class="count-badge" id="libCount">0</span></button>
    </div>
    <div class="logo">SHADOWKING <span>FAB STORE</span></div>
    <div class="nav">
      <button class="nav-btn" onclick="showPage('home')">الرئيسية</button>
      <button class="nav-btn" onclick="m.style.display='flex'">➕ انشاء</button>
      <button class="nav-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </div>
</div>

<!-- بانر العروض -->
<div class="banner">
  <div class="banner-card">
    <h1>🔥 عرض FAB الاسبوعي 🔥</h1>
    <p>خصم 50% على كل باكات LUT والانتقالات الاحترافية</p>
    <div class="countdown" id="countdown">00:23:59:59</div>
  </div>
</div>

<!-- الصفحة الرئيسية -->
<div id="homePage">
  <div class="section">
    <input id="search" onkeyup="debounce(render,300)" placeholder="🔍 ابحث عن LUT سينمائي, انتقالات تيك توك, قوالب AI..." style="width:100%;padding:16px;background:var(--card);border:2px solid #333;border-radius:12px;color:var(--text);font-size:1.1em;font-weight:700">
  </div>

  <div class="section">
    <div class="filters">
      <button class="filter-btn active" onclick="setCat('الكل',this)">الكل</button>
      <button class="filter-btn" onclick="setCat('LUT',this)">LUT سينمائي</button>
      <button class="filter-btn" onclick="setCat('انتقال',this)">انتقالات</button>
      <button class="filter-btn" onclick="setCat('AI',this)">AI</button>
      <button class="filter-btn" onclick="setCat('قالب',this)">قوالب كاب كات</button>
      <button class="filter-btn" onclick="setCat('مجاني',this)">مجاني</button>
    </div>

    <div class="section-title">🔥 الاكثر مبيعا <span class="see-all" onclick="sortBy('downloads')">عرض الكل ></span></div>
    <div id="gridTrending" class="grid"></div>

    <div class="section-title" style="margin-top:50px">✨ وصل حديثا <span class="see-all" onclick="sortBy('new')">عرض الكل ></span></div>
    <div id="gridNew" class="grid"></div>

    <div class="section-title" style="margin-top:50px">🎁 مجاني بالكامل</div>
    <div id="gridFree" class="grid"></div>
  </div>
</div>

<div id="otherPage" class="section" style="display:none"></div>

<!-- مودال انشاء -->
<div id="m" class="modal"><div class="modal-content">
  <h2 style="margin-bottom:20px">➕ اضافة منتج جديد</h2>
  <input id="n" placeholder="اسم المنتج">
  <textarea id="d" rows="3" placeholder="وصف تفصيلي للمنتج"></textarea>
  <input id="i" placeholder="رابط الصورة - ارفع على imgur.com">
  <input id="v" placeholder="رابط فيديو المعاينة Youtube Embed">
  <input id="f" placeholder="رابط التحميل Google Drive">
  <input id="tags" placeholder="تاجات: سينمائي,ترند,تيك_توك">
  <select id="c"><option>LUT</option><option>انتقال</option><option>AI</option><option>قالب</option></select>
  <input id="p" placeholder="السعر: 19.99 او مجاني">
  <div style="display:flex;gap:10px;margin-top:15px">
    <button class="btn-add" onclick="add()">نشر المنتج</button>
    <button class="nav-btn" style="background:#333" onclick="m.style.display='none'">الغاء</button>
  </div>
</div></div>

<!-- مودال تفاصيل -->
<div id="detailModal" class="modal"><div class="modal-content" id="detailContent"></div></div>
<div id="toast" class="toast"></div>

<script>
let ITEMS = JSON.parse(localStorage.getItem('sk_fab')) || [];
let LIB = JSON.parse(localStorage.getItem('lib_fab')) || [];
let FAV = JSON.parse(localStorage.getItem('fav_fab')) || [];
let CART = JSON.parse(localStorage.getItem('cart_fab')) || [];
let CAT = 'الكل';

// بيانات تجريبية
if(ITEMS.length==0){
  ITEMS = [
    {id:1,n:"Cinematic LUT Pack 50 PRO",d:"50 فلتر سينمائي احترافي لتصوير الافلام والاعلانات",i:"https://i.imgur.com/8Km9tLL.jpg",v:"",f:"#",tags:"سينمائي,ترند,احترافي",c:"LUT",p:"$19.99",views:2341,rating:5,downloads:567,new:true},
    {id:2,n:"TikTok Viral Transitions 2026",d:"30 انتقال ترند تيك توك وريلز جاهز للاستخدام",i:"https://i.imgur.com/8Km9tLL.jpg",v:"",f:"#",tags:"تيك_توك,ترند,ريلز",c:"انتقال",p:"مجاني",views:8901,rating:5,downloads:2100,new:false}
  ]; save();
}

function save(){
  localStorage.setItem('sk_fab',JSON.stringify(ITEMS));
  localStorage.setItem('lib_fab',JSON.stringify(LIB));
  localStorage.setItem('fav_fab',JSON.stringify(FAV));
  localStorage.setItem('cart_fab',JSON.stringify(CART));
}

function debounce(func, wait){let timeout; return function(...args){clearTimeout(timeout); timeout=setTimeout(()=>func.apply(this,args),wait);}}

function toast(msg){let t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500)}
function setCat(c,btn){CAT=c; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render();}
function toggleTheme(){document.body.classList.toggle('light')}

function add(){
  ITEMS.unshift({id:Date.now(),n:n.value,d:d.value,i:i.value,v:v.value,f:f.value,tags:tags.value,c:c.value,p:p.value,views:0,rating:5,downloads:0,new:true});
  save(); m.style.display='none'; toast('✅ تم نشر المنتج بنجاح'); render();
}

function buy(item){
  if(!CART.find(x=>x.id==item.id)) CART.push(item);
  save(); updateCounts(); toast('🛒 تمت الاضافة للسلة');
}

function addToLib(item){
  item.downloads++; 
  if(!LIB.find(x=>x.id==item.id)) LIB.push(item);
  save(); updateCounts(); toast('📦 تم التحميل لمكتبتك');
}

function toggleFav(id){
  let idx = FAV.findIndex(x=>x.id==id);
  if(idx>-1) FAV.splice(idx,1); else FAV.push(ITEMS.find(x=>x.id==id));
  save(); updateCounts(); render(); toast(idx>-1?'❌ حذف من المفضلة':'❤️ اضيف للمفضلة');
}

function showDetails(id){
  let x = ITEMS.find(i=>i.id==id); x.views++; save();
  detailContent.innerHTML = `
    <h2 style="font-size:2em;margin-bottom:15px">${x.n}</h2>
    <img src="${x.i}" style="width:100%;border-radius:12px;margin:15px 0">
    ${x.v?`<iframe width="100%" height="340" src="${x.v}" frameborder="0" allowfullscreen></iframe>`:''}
    <p style="color:var(--text2);margin:20px 0;line-height:1.6">${x.d}</p>
    <div class="tags">${x.tags.split(',').map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    <p class="stats" style="margin:15px 0">⭐⭐⭐⭐⭐ 👁️ ${x.views} ⬇️ ${x.downloads}</p>
    <div style="display:flex;gap:12px;margin-top:20px">
      <div class="price">${x.p}</div>
      <button class="btn-add" onclick="buy(${x.id});detailModal.style.display='none'">اضافة للسلة</button>
    </div>
  `;
  detailModal.style.display='flex';
}

function card(x){
  return `<div class="card">
    <div class="heart" onclick="toggleFav(${x.id})">${FAV.find(f=>f.id==x.id)?'❤️':'🤍'}</div>
    ${x.new?'<div class="badge-new">جديد</div>':''}
    <img class="card-img" src="${x.i}" loading="lazy" onclick="showDetails(${x.id})">
    <div class="card-body">
      <div class="card-title">${x.n}</div>
      <div class="card-desc">${x.d}</div>
      <div class="tags">${x.tags.split(',').slice(0,3).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
      <div class="card-footer">
        <div>
          <div class="price">${x.p}</div>
          <div class="stats">👁️ ${x.views} ⬇️ ${x.downloads}</div>
        </div>
        <button class="btn-add" onclick='buy(${x.id})'>اضافة للسلة</button>
      </div>
    </div>
  </div>`
}

function render(){
  let data = [...ITEMS];
  if(CAT!='الكل'){
    if(CAT=='مجاني') data = data.filter(x=>x.p=='مجاني');
    else data = data.filter(x=>x.c==CAT);
  }
  data = data.filter(x=>x.n.toLowerCase().includes(search.value.toLowerCase()));
  
  gridTrending.innerHTML = [...data].sort((a,b)=>b.downloads-a.downloads).slice(0,6).map(card).join('');
  gridNew.innerHTML = data.filter(x=>x.new).slice(0,6).map(card).join('');
  gridFree.innerHTML = data.filter(x=>x.p=='مجاني').slice(0,6).map(card).join('');
}

function showPage(page){
  homePage.style.display='none'; otherPage.style.display='block';
  if(page=='lib') otherPage.innerHTML = `<h2 class="section-title">📦 مكتبتي</h2><div class="grid">`+(LIB.map(card).join('') || '<p>مكتبتك فاضية</p>')+`</div>`;
  if(page=='fav') otherPage.innerHTML = `<h2 class="section-title">❤️ المفضلة</h2><div class="grid">`+(FAV.map(card).join('') || '<p>مافي مفضلة</p>')+`</div>`;
  if(page=='cart'){
    let total = CART.reduce((a,b)=>a+parseFloat(b.p.replace('$','')||0),0);
    otherPage.innerHTML = `<h2 class="section-title">🛒 سلة الشراء</h2><div class="grid">`+CART.map(card).join('')+`</div><h2 style="margin-top:20px">الاجمالي: $${total.toFixed(2)}</h2>`;
  }
  if(page=='home'){homePage.style.display='block'; otherPage.style.display='none';}
}

function updateCounts(){
  cartCount.innerText=CART.length; favCount.innerText=FAV.length; libCount.innerText=LIB.length;
}

// عد تنازلي
setInterval(()=>{
  let d=new Date(); let h=23-d.getHours(),m=59-d.getMinutes(),s=59-d.getSeconds();
  countdown.innerText = `00:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
},1000)

updateCounts(); render();
</script>
</body></html>
