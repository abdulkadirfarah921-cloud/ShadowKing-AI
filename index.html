<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowking AI - Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
  body{background:#050505; display:flex; justify-content:center; align-items:center; height:100vh;}
  body::before{content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 50% 50%, #FFD70022 0%, transparent 70%); animation:glow 4s ease-in-out infinite alternate; z-index:-1;}
  @keyframes glow{ from{opacity:0.3} to{opacity:0.7} }

 .box{background:#0a0a0a; border:2px solid #FFD700; padding:30px; border-radius:20px; box-shadow:0 0 30px #FFD700; width:90%; max-width:400px; text-align:center;}
  h1{color:#FFD700; text-shadow:0 0 15px #FFD700; margin-bottom:20px; font-size:28px;}
 .btn{width:100%; padding:15px; margin:10px 0; background:linear-gradient(90deg,#FFD700,#FFA500); border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; color:#000;}
 .btn:hover{box-shadow:0 0 15px #FFD700;}
  input{width:100%; padding:14px; margin:8px 0; background:#1a1a1a; border:1px solid #FFD700; border-radius:10px; color:#fff; outline:none;}

 .menu-icon{position:fixed; top:20px; right:20px; font-size:30px; color:#FFD700; cursor:pointer; z-index:200;}
 .sidebar{position:fixed; top:0; right:-320px; width:320px; height:100%; background:#0a0a0a; transition:0.4s; z-index:100; padding:20px; border-left:2px solid #FFD700; overflow-y:auto;}
 .sidebar.open{right:0;}
 .side-btn{width:100%; padding:14px; margin:8px 0; background:#111; border:1px solid #FFD700; color:#FFD700; border-radius:10px; text-align:right; cursor:pointer; font-size:15px;}
 .side-btn:hover{background:#FFD700; color:#000;}
</style>
</head>
<body>

<span class="menu-icon" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</span>

<!-- القائمة الجانبية -->
<div class="sidebar" id="sidebar">
  <h3 style="color:#FFD700; margin-bottom:15px;">القائمة الملكية</h3>
  <button class="side-btn" onclick="loginGoogle()">1. تسجيل الدخول بجوجل</button>
  <button class="side-btn" onclick="alert('الإعدادات قريبا')">2. الإعدادات</button>
  <button class="side-btn" onclick="openLangs()">3. اللغات 🌍</button>
  <div id="langBox" style="display:none; margin-top:10px;"></div>
  <button class="side-btn" onclick="logout()" style="margin-top:20px; border-color:red; color:red;">تسجيل الخروج</button>
</div>

<!-- صندوق تسجيل الدخول -->
<div class="box">
  <h1>Shadowking AI 👑</h1>
  <button class="btn" onclick="loginGoogle()">جوجل G</button>
  <button class="btn" onclick="alert('تسجيل بالايميل')">ايميل 📧</button>
  <input type="email" id="email" placeholder="الايميل">
  <input type="password" id="pass" placeholder="كلمة السر">
  <button class="btn" onclick="signup()">تسجيل جديد</button>
  <button class="btn" onclick="login()">تسجيل دخول</button>
</div>

<script>
  // اللغة التلقائية حسب الجهاز
  const userLang = navigator.language || 'ar';
  document.documentElement.lang = userLang.startsWith('ar')? 'ar' : 'en';

  // قائمة اللغات
  const languages = {"ar":"العربية","en":"English","tr":"Türkçe","fr":"Français","de":"Deutsch","es":"Español","it":"Italiano","pt":"Português","ru":"Русский","zh":"中文","ja":"日本語","ko":"한국어","hi":"हिन्दी","ur":"اردو","fa":"فارسی"};
  function openLangs(){
    let box = document.getElementById('langBox');
    box.style.display = box.style.display=='block'? 'none' : 'block';
    if(box.innerHTML==''){
      for(let code in languages){
        box.innerHTML += `<button class="side-btn" onclick="setLang('${code}')">${languages[code]}</button>`;
      }
    }
  }
  function setLang(code){ document.documentElement.lang = code; alert("تم التغيير الى: " + languages[code]); }

  function loginGoogle(){ window.location.href='chat.html'; } // هون نحط كود firebase
  function login(){ window.location.href='chat.html'; }
  function signup(){ window.location.href='chat.html'; }
  function logout(){ alert("تسجيل خروج"); }
</script>

</body>
</html>
