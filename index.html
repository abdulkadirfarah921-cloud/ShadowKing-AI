<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowKing AI - الذكاء الاصطناعي الملك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
body {
    background: radial-gradient(circle at top, #1a0033 0%, #000 100%);
    color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
}
.container {
    width: 100%; max-width: 800px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px);
    border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 30px; padding: 30px; box-shadow: 0 0 50px rgba(255,215,0,0.2);
}
.header { text-align: center; margin-bottom: 30px; }
.crown { font-size: 60px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 20px gold); }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.title {
    font-size: 32px; font-weight: 900; margin-top: 10px;
    background: linear-gradient(90deg, #FFD700, #FF00FF, #00FFFF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 200%;
    animation: gradient 3s ease infinite;
}
@keyframes gradient { 0%{background-position:0%} 50%{background-position:100%} 100%{background-position:0%} }
.subtitle { color: #aaa; font-size: 14px; margin-top: 5px; }

.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
.btn {
    background: linear-gradient(135deg, #8B00FF, #FF00FF); border: none; padding: 18px; border-radius: 15px;
    color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
    box-shadow: 0 5px 20px rgba(139,0,255,0.3); display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,0,255,0.5); }
.btn-full { grid-column: span 2; background: linear-gradient(135deg, #FFD700, #FF8C00); color: #000; }

.chat-box {
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,215,0,0.2); border-radius: 20px;
    height: 350px; overflow-y: auto; padding: 20px; margin-bottom: 20px;
}
.msg { margin-bottom: 15px; padding: 12px 18px; border-radius: 15px; max-width: 80%; animation: fadeIn 0.3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.user-msg { background: linear-gradient(135deg, #FF00FF, #8B00FF); margin-right: auto; }
.ai-msg { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); margin-left: auto; }

.input-area { display: flex; gap: 10px; }
input {
    flex: 1; padding: 15px 20px; border-radius: 15px; border: 2px solid rgba(255,215,0,0.3);
    background: rgba(0,0,0,0.5); color: white; font-size: 16px; outline: none;
}
input:focus { border-color: #FFD700; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
.send-btn {
    padding: 15px 30px; background: linear-gradient(135deg, #FFD700, #FF8C00); color: #000;
    border: none; border-radius: 15px; font-weight: 900; cursor: pointer; transition: 0.3s;
}
.send-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="crown">👑</div>
        <h1 class="title">الذكاء الاصطناعي الملك</h1>
        <p class="subtitle">خبرة 100,000 سنة | مجاني 100%</p>
    </div>

    <div class="grid">
        <button class="btn" onclick="setMode('app')">📱 صنع تطبيق</button>
        <button class="btn" onclick="setMode('chat')">💬 دردشة</button>
        <button class="btn" onclick="setMode('game')">🎮 صنع لعبة 3D</button>
        <button class="btn" onclick="setMode('website')">🌐 صنع موقع</button>
        <button class="btn" onclick="setMode('image')">🖼️ صورة 4K</button>
        <button class="btn" onclick="setMode('video')">🎬 فيديو</button>
        <button class="btn btn-full" onclick="setMode('learn')">📚 تعلم</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg ai-msg">👑 الملك: مرحبا بك في مصنعك الخاص. كيف اخدمك اليوم؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="مثال: اصنعلي موقع متجر ملابس..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">ارسال</button>
    </div>
</div>

<script>
let currentMode = 'chat';
function setMode(mode) {
    currentMode = mode;
    addMsg('ai', `👑 تم التحويل لوضع: ${mode}`);
}
function addMsg(type, text) {
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML += `<div class="msg ${type==='user'?'user-msg':'ai-msg'}">${text}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
}
async function sendMsg() {
    const input = document.getElementById('userInput');
    const prompt = input.value; if(!prompt) return;
    addMsg('user', prompt); input.value = '';
    
    const res = await fetch('https://ai-proxy-qnen.onrender.com/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt, mode: currentMode})
    });
    const data = await res.json();
    addMsg('ai', data.text);
}
</script>
</body>
</html>
