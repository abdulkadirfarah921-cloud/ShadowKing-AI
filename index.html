<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowKing AI - الملك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
body { background:#050505; color:#E5E5E5; display:flex; height:100vh; overflow:hidden; }

.sidebar {
    width: 260px; background: #0A0A0A; border-left: 1px solid #1F1F1F; padding: 20px;
    display: flex; flex-direction: column;
}
.logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 30px;
    background: linear-gradient(90deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.mode-btn {
    background: transparent; border: none; color: #aaa; padding: 12px 15px; margin-bottom: 8px;
    border-radius: 10px; text-align: right; cursor: pointer; font-size: 15px; transition: 0.2s;
    display: flex; align-items: center; gap: 10px;
}
.mode-btn:hover { background: #1A1A1A; color: white; }
.mode-btn.active { background: linear-gradient(90deg, #8B00FF, #FF00FF); color: white; }

.chat-container { flex: 1; display: flex; flex-direction: column; }
.header { padding: 20px; text-align: center; border-bottom: 1px solid #1F1F1F; }
.header h2 { font-size: 18px; color: #FFD700; }

.messages {
    flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px;
}
.msg { max-width: 700px; margin: 0 auto; width: 100%; line-height: 1.8; }
.user { background: #1A1A1A; padding: 15px 20px; border-radius: 15px; align-self: flex-end; }
.ai { padding: 15px 0; align-self: flex-start; }
.ai.label { color: #FFD700; font-weight: 800; margin-bottom: 5px; }

.input-area {
    padding: 20px; border-top: 1px solid #1F1F1F; background: #0A0A0A;
}
.input-box {
    max-width: 700px; margin: 0 auto; display: flex; gap: 10px; background: #1A1A1A;
    padding: 10px; border-radius: 15px; border: 1px solid #2A2A2A;
}
input {
    flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 5px 10px;
}
.send {
    background: linear-gradient(135deg, #FFD700, #FF8C00); border: none; color: #000;
    padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer;
}
.send:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">👑 ShadowKing AI</div>
    <button class="mode-btn active" onclick="setMode('chat')">💬 دردشة</button>
    <button class="mode-btn" onclick="setMode('website')">🌐 صنع موقع</button>
    <button class="mode-btn" onclick="setMode('app')">📱 صنع تطبيق</button>
    <button class="mode-btn" onclick="setMode('game')">🎮 صنع لعبة 3D</button>
    <button class="mode-btn" onclick="setMode('image')">🖼️ توليد صورة 4K</button>
    <button class="mode-btn" onclick="setMode('video')">🎬 توليد فيديو</button>
    <button class="mode-btn" onclick="setMode('learn')">📚 معلم شخصي</button>
</div>

<div class="chat-container">
    <div class="header">
        <h2 id="modeTitle">الذكاء الاصطناعي الملك - جاهز لخدمتك</h2>
    </div>
    <div class="messages" id="messages">
        <div class="msg ai">
            <div class="label">👑 الملك:</div>
            <div>مرحبا بك في مصنعك الخاص. انا اقوى نموذج في العالم. كيف اخدمك؟</div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="اسأل الملك اي شيء..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="send" onclick="sendMsg()">ارسال</button>
        </div>
    </div>
</div>

<script>
let currentMode = 'chat';
function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    const titles = {
        chat: 'وضع الدردشة',
        website: 'وضع صنع المواقع',
        app: 'وضع صنع التطبيقات',
        game: 'وضع صنع الالعاب',
        image: 'وضع توليد الصور',
        video: 'وضع توليد الفيديو',
        learn: 'وضع المعلم الشخصي'
    };
    document.getElementById('modeTitle').innerText = titles[mode];
    // لا رسائل مزعجة بعد الان
}

function addMsg(type, text) {
    const messages = document.getElementById('messages');
    messages.innerHTML += `
    <div class="msg ${type}">
        ${type==='ai'? '<div class="label">👑 الملك:</div>' : ''}
        <div>${text}</div>
    </div>`;
    messages.scrollTop = messages.scrollHeight;
}

async function sendMsg() {
    const input = document.getElementById('userInput');
    const prompt = input.value; if(!prompt) return;
    addMsg('user', prompt); input.value = '';

    addMsg('ai', 'جاري التفكير...');

    const res = await fetch('https://ai-proxy-qnen.onrender.com/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt, mode: currentMode})
    });
    const data = await res.json();

    // امسح "جاري التفكير"
    document.querySelectorAll('.msg.ai').pop().remove();
    addMsg('ai', data.text);
}
</script>
</body>
</html>
