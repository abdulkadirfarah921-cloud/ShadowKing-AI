<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الذكاء الاصطناعي الملك</title>

<!-- كود الملك: منع التخزين عشان يجيب اخر نسخة دايما -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
        background: linear-gradient(135deg, #1a0033, #330066, #000);
        color: white;
        min-height: 100vh;
        padding: 10px;
        text-align: center;
    }
    .crown { font-size: 50px; margin: 10px 0; }
    h1 { 
        background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 28px;
        margin-bottom: 20px;
    }
    .btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
    }
    .btn {
        background: linear-gradient(90deg, #8B00FF, #FF00FF);
        border: none;
        padding: 12px;
        border-radius: 15px;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn:hover { transform: scale(1.05); }

    /* صندوق المحادثة الكبير */
    #chatBox {
        height: 55vh; 
        max-height: 500px;
        overflow-y: auto;
        padding: 15px;
        border-radius: 20px;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
        margin: 15px 0;
        border: 2px solid rgba(255,215,0,0.4); 
        text-align: right;
    }
    .message {
        padding: 12px 16px;
        margin: 10px 0;
        border-radius: 15px;
        font-size: 16px;
        line-height: 1.7;
        white-space: pre-wrap;
    }
    .user { background: linear-gradient(90deg, #FF00FF, #8B00FF); }
    .bot { background: rgba(255,255,255,0.1); border: 1px solid #FFD700; }

    .input-area {
        display: flex;
        gap: 10px;
    }
    #userInput {
        flex: 1;
        padding: 15px;
        border-radius: 15px;
        border: 2px solid #8B00FF;
        background: rgba(0,0,0,0.5);
        color: white;
        font-size: 16px;
    }
    #sendBtn {
        padding: 15px 25px;
        border-radius: 15px;
        border: none;
        background: linear-gradient(90deg, #FF00FF, #8B00FF);
        color: white;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="crown">👑</div>
<h1>الذكاء الاصطناعي الملك</h1>

<div class="btns">
    <button class="btn" onclick="setMode('chat')">دردشة 💬</button>
    <button class="btn" onclick="setMode('app')">صنع تطبيق 📱</button>
    <button class="btn" onclick="setMode('website')">صنع موقع 🌐</button>
    <button class="btn" onclick="setMode('game3d')">اصنع لعبة 3D 🎮</button>
    <button class="btn" onclick="setMode('video')">فيديو 🎬</button>
    <button class="btn" onclick="setMode('image')">صورة 4K 🖼️</button>
    <button class="btn" style="grid-column: span 2;" onclick="setMode('learn')">تعلم 📚</button>
</div>

<div id="chatBox"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="مثال: علمني C++ من الصفر">
    <button id="sendBtn" onclick="sendMessage()">ارسال</button>
</div>

<script>
    // كود الملك رقم 1: امسح السيرفس ووركر القديم عشان ما يخزن
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }

    let currentMode = 'chat';
    const SERVER_URL = "https://ai-proxy-qnen.onrender.com"; // حط رابط السيرفر بتاعك هنا

    function setMode(mode) {
        currentMode = mode;
        addMessage('user', `تم التحويل لوضع: ${mode}`);
    }

    function addMessage(sender, text) {
        const chatBox = document.getElementById('chatBox');
        const msg = document.createElement('div');
        msg.className = `message ${sender}`;
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const prompt = input.value;
        if(!prompt) return;
        
        addMessage('user', prompt);
        input.value = "";
        addMessage('bot', '👑 جاري التفكير...');

        try {
            const res = await fetch(`${SERVER_URL}/api/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt, mode: currentMode})
            });
            const data = await res.json();
            // امسح "جاري التفكير" وحط الرد
            document.getElementById('chatBox').lastChild.remove();
            addMessage('bot', data.text);
        } catch(err) {
            document.getElementById('chatBox').lastChild.remove();
            addMessage('bot', 'عذرا يا ملك، ما قدرت ارد. تأكد السيرفر شغال');
        }
    }

    // اضغط Enter للارسال
    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
