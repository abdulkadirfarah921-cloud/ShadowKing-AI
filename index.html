<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadowking AI - Login</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #111;
      padding: 40px;
      border-radius: 15px;
      border: 2px solid #FFD700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      width: 350px;
      text-align: center;
    }
    h1 { color: #FFD700; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #FFD700;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #fff; }
    .google-btn { background: #fff; color: #000; }
    #status { margin-top: 15px; color: #4CAF50; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shadowking AI</h1>
    
    <input type="email" id="email" placeholder="الايميل">
    <input type="password" id="password" placeholder="كلمة السر">
    
    <button onclick="signUp()">تسجيل جديد</button>
    <button onclick="signIn()">تسجيل دخول</button>
    
    <hr style="border-color:#333; margin:20px 0;">
    
    <button class="google-btn" onclick="googleSignIn()">تسجيل دخول بجوجل</button>
    
    <div id="status"></div>
  </div>

  <script type="module">
    // 1. Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 2. Your Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAg9Hmv_DcMw2XdvNzr-F1B8cTC9aF-JjA",
      authDomain: "shadowking-ai.firebaseapp.com",
      projectId: "shadowking-ai",
      storageBucket: "shadowking-ai.firebasestorage.app",
      messagingSenderId: "934957850087",
      appId: "1:934957850087:web:cc4798c7fe35fb4f95b142"
    };

    // 3. Initialize
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const status = document.getElementById('status');

    // 4. Functions
    window.signUp = () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => status.innerText = "تم التسجيل بنجاح ✅")
        .catch(err => status.innerText = "خطأ: " + err.message);
    }

    window.signIn = () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      signInWithEmailAndPassword(auth, email, password)
        .then(() => status.innerText = "تم تسجيل الدخول ✅")
        .catch(err => status.innerText = "خطأ: " + err.message);
    }

    window.googleSignIn = () => {
      signInWithPopup(auth, provider)
        .then(() => status.innerText = "تم تسجيل الدخول بجوجل ✅")
        .catch(err => status.innerText = "خطأ: " + err.message);
    }
  </script>
</body>
</html>
