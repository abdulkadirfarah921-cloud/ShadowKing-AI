<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowking AI 👑</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: #000;
    color:#fff; 
    font-family: Arial, sans-serif;
    overflow:hidden;
    height:100vh;
  }
  
  /* الهيدر */
.header { 
    display:flex; justify-content:space-between; align-items:center;
    padding:20px; border-bottom:2px solid #FFD700;
  }
.header h1 { 
    font-size:24px; font-weight:bold; color:#FFD700;
    text-shadow:0 0 15px #FFD700; 
    display:flex; align-items:center; gap:8px;
    flex-direction: row-reverse; /* التاج يجي الاول */
  }
.menu-btn { font-size:30px; color:#FFD700; cursor:pointer; }

  /* صندوق الترحيب */
.welcome {
    margin:20px; padding:15px 20px;
    border: 2px solid #FFD700; border-radius: 20px;
    text-align:center; font-size:14px; line-height:1.8;
  }

  #chat { height:45vh; overflow-y:auto; padding:20px; }
.msg { background:#111; border:1px solid #FFD70055; padding:12px; 
        margin:10px 0; border-radius:15px; color:#FFD700; }

  /* صندوق الارسال */
#inputBox { 
    position:fixed; bottom:0; width:100%; background:#000; 
    padding:12px; display:flex; gap:10px; border-top:2px solid #FFD700; 
  }
#inputBox input { 
    flex:1; padding:14px; background:#111; border:2px solid #FFD700; 
    border-radius:15px; color:#FFD700; text-align:right;
  }
#inputBox button { 
    background:#FFD700; color:#000; border:none; padding:14px 20px; 
    border-radius:15px; font-weight:bold;
  }
  
  /* قائمة المودات */
#modes { 
    position:fixed; bottom:-500px; left:0; width:100%; 
    background:#0a0a0a; border-top:3px solid #FFD700;
    border-radius:30px 30px 0 0; padding:15px 20px 25px;
    transition:0.4s; z-index:100;
  }
#modes.show { bottom:0; }
.handle { 
    width:50px; height:5px; background:#FFD700; 
    border-radius:10px; margin:0 auto 15px;
  }
#modes h3 { text-align:center; color:#FFD700; margin-bottom:20px; }
.mode-btn { 
    border:2px solid #FFD700; border-radius:15px; padding:16px 20px;
    margin:12px 0; display:flex; justify-content:space-between;
    align-items:center; color:#FFD700; font-weight:bold;
    /* الافتراضي: الايقونة يمين والنص شمال */
  }
.mode-btn:active { background:#FFD700; color:#000; }

  /* قائمة الاعدادات */
#settings { 
    position:fixed; top:0; left:-300px; width:280px; height:100%;
    background:#0a0a0a; border-right:3px solid #FFD700;
    padding:20px; transition:0.4s; z-index:100;
  }
#settings.show { left:0; }
#settings h3 { color:#FFD700; border-bottom:2px solid #FFD700; padding-bottom:10px; margin-bottom:15px; }
.setting-btn { 
    background:#111; border:1px solid #FFD70055; padding:14px; 
    margin:10px 0; border-radius:12px; color:#FFD700;
  }
#overlay { 
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:#000cc; display:none; z-index:99;
  }
#overlay.show { display:block; }
</style>
</head>
<body>

<div class="header">
  <div class="menu-btn" onclick="openSettings()">☰</div>
  <h1>Shadowking AI 👑</h1>
</div>

<div class="welcome">
  مرحبا انا Shadowking AI. اسحب من اليمين للإعدادات<br>
  ومن تحت لاختيار المود
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="send()">إرسال</button>
  <input id="msg" placeholder="اكتب رسالتك...">
</div>

<!-- قائمة المودات -->
<div id="modes">
  <div class="handle"></div>
  <h3>اختر المود</h3>
  <div class="mode-btn" onclick="setMode('')"><span>💬</span> دردشة عادية</div>
  <div class="mode-btn" onclick="setMode('[app]')"><span>📱</span> صنع تطبيق</div>
  <div class="mode-btn" onclick="setMode('[game]')"><span>🎮</span> صنع لعبة</div>
  <div class="mode-btn" onclick="setMode('[code]')"><span>💻</span> كتابة كود</div>
</div>

<!-- قائمة الاعدادات -->
<div id="settings">
  <h3>الاعدادات</h3>
  <div id="loginBtn" class="setting-btn" onclick="login()">تسجيل الدخول</div>
  <div id="logoutBtn" class="setting-btn" onclick="logout()" style="display:none;">تسجيل الخروج</div>
</div>
<div id="overlay" onclick="closeAll()"></div>

<script>
let startY=0, startX=0;
let logged = localStorage.getItem('logged')==='true';

function updateBtn(){
  document.getElementById('loginBtn').style.display = logged?'none':'block';
  document.getElementById('logoutBtn').style.display = logged?'block':'none';
}
updateBtn();
function login(){logged=true;localStorage.setItem('logged','true');updateBtn();closeAll();}
function logout(){logged=false;localStorage.setItem('logged','false');updateBtn();closeAll();}
function openSettings(){document.getElementById('settings').classList.add('show');document.getElementById('overlay').classList.add('show');}

document.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;startX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  let endY=e.changedTouches[0].clientY; let endX=e.changedTouches[0].clientX;
  if(startY-endY>80 && startY>window.innerHeight-150){
    document.getElementById('modes').classList.add('show');
    document.getElementById('overlay').classList.add('show');
  }
  if(endX-startX>80 && startX<50){openSettings();}
});
function closeAll(){document.getElementById('modes').classList.remove('show');document.getElementById('settings').classList.remove('show');document.getElementById('overlay').classList.remove('show');}
function setMode(m){document.getElementById('msg').value=m+' ';closeAll();}

async function send(){
  let msg=document.getElementById('msg').value; if(!msg)return;
  document.getElementById('chat').innerHTML+=`<div class="msg"><b>انت:</b> ${msg}</div>`;
  document.getElementById('msg').value='';
  let res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
  let data=await res.json();
  document.getElementById('chat').innerHTML+=`<div class="msg"><b>الملك:</b> ${data.reply}</div>`;
}
</script>
</body>
</html>
