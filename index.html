<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowKing AI Ultra 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Tajawal', sans-serif; }
body {
  background: #010108;
  background-image: radial-gradient(circle at 30% 40%, rgba(139, 92, 246, 0.7) 0%, transparent 60%),
                    radial-gradient(circle at 70% 60%, rgba(236, 72, 153, 0.6) 0%, transparent 60%);
  color: #fff; height: 100vh; display: flex; font-size: 20px;
  overflow: hidden;
}
.container { flex: 1; display: flex; flex-direction: column; padding: 15px; max-width: 1400px; margin: 0 auto; height: 100vh; }
.header { text-align: center; padding: 10px 0; flex-shrink: 0; }
.crown { font-size: 80px; filter: drop-shadow(0 0 50px #F59E0B); }
.header h1 { font-size: 2.2em; font-weight: 900; background: linear-gradient(90deg, #8B5CF6, #EC4899, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.modes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 10px 0; flex-shrink: 0; }
.mode-btn {
  padding: 14px; border-radius: 18px; background: rgba(139, 92, 246, 0.2);
  border: 2px solid rgba(139, 92, 246, 0.5); color: #fff; font-size: 17px; font-weight: 900;
  cursor: pointer; backdrop-filter: blur(15px);
}
.mode-btn.active { background: linear-gradient(135deg, #8B5CF6, #EC4899); box-shadow: 0 0 30px rgba(139, 92, 246, 1); }

/* التعديل المهم: القائمة تطلع فوق */
.sub-modes {
  display: none; 
  grid-template-columns: repeat(3, 1fr); 
  gap: 10px; 
  margin: 10px 0; 
  padding: 15px; 
  background: rgba(5,5,15,0.95); /* اسود اقوى */
  border-radius: 20px; 
  border: 3px solid rgba(236,72,153,0.6); 
  flex-shrink: 0;
  box-shadow: 0 0 40px rgba(236,72,153,0.5);
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from {opacity:0; transform: translateY(-20px);} to {opacity:1; transform: translateY(0);} }
.sub-modes.show { display: grid; }

.chat-box { 
  flex: 1; /* يفضل كبير دايما */
  min-height: 0; /* مهم جدا عشان flex يشتغل صح */
  background: rgba(10, 10, 25, 0.85); 
  border-radius: 30px; padding: 25px; overflow-y: auto; 
  border: 3px solid rgba(139, 92, 246, 0.4); backdrop-filter: blur(20px); 
  font-size: 20px;
  margin-bottom: 10px;
}
.msg { margin: 18px 0; padding: 20px 25px; border-radius: 25px; max-width: 90%; line-height: 1.9; }
.user { background: linear-gradient(135deg, #8B5CF6, #EC4899); margin-right: auto; font-weight: 800; }
.ai { background: rgba(59, 130, 246, 0.2); border: 2px solid rgba(59, 130, 246, 0.5); margin-left: auto; }

.input-area { display: flex; gap: 15px; padding: 10px 0; flex-shrink: 0; }
input { flex: 1; padding: 20px 25px; border-radius: 20px; border: 3px solid rgba(139, 92, 246, 0.6); background: rgba(10, 10, 25, 0.95); color: #fff; font-size: 19px; font-weight: 800; }
button.send { padding: 0 45px; border-radius: 20px; border: none; background: linear-gradient(135deg, #8B5CF6, #EC4899); color: #fff; font-weight: 900; font-size: 20px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <div class="header"><div class="crown">👑</div><h1>الذكاء الاصطناعي الملك</h1></div>
  
  <div class="modes">
    <button class="mode-btn active" onclick="setMode('chat', this)">💬 دردشة</button>
    <button class="mode-btn" onclick="setMode('app', this)">📱 صنع تطبيق</button>
    <button class="mode-btn" onclick="setMode('website', this)">🌐 صنع موقع</button>
    <button class="mode-btn" onclick="setMode('game3d', this)">🎮 اصنع لعبة 3D</button>
    <button class="mode-btn" onclick="setMode('video', this)">🎬 فيديو</button>
    <button class="mode-btn" onclick="setMode('image', this)">🖼️ صورة 4K</button>
    <button class="mode-btn" onclick="toggleLearn()">📚 تعلم</button>
  </div>

  <div class="sub-modes" id="learnMenu">
    <button class="mode-btn" onclick="setLearnMode('programming')">💻 البرمجة</button>
    <button class="mode-btn" onclick="setLearnMode('languages')">🌍 اللغات</button>
    <button class="mode-btn" onclick="setLearnMode('games')">🎯 صناعة الالعاب</button>
  </div>

  <div class="sub-modes" id="programmingMenu">
    <button class="mode-btn" onclick="selectLang('C++')">C++</button>
    <button class="mode-btn" onclick="selectLang('Lua')">Lua</button>
    <button class="mode-btn" onclick="selectLang('Python')">Python</button>
    <button class="mode-btn" onclick="selectLang('JavaScript')">JavaScript</button>
    <button class="mode-btn" onclick="selectLang('GDScript')">GDScript</button>
    <button class="mode-btn" onclick="selectLang('Java')">Java</button>
  </div>

  <div class="chat-box" id="chatBox"><div class="msg ai">مرحبا يا ملك 👑 الشات هسا كبير وثابت</div></div>

  <div class="input-area">
    <button class="send" onclick="sendMsg()">ارسال</button>
    <input type="text" id="prompt" placeholder="مثال: علمني C++ من الصفر">
  </div>
</div>
<script>
const SERVER_URL = "https://ai-proxy-qnen.onrender.com";
let currentMode = 'chat';
const chatBox = document.getElementById('chatBox');

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sub-modes').forEach(m => m.classList.remove('show'));
}

function toggleLearn() {
  currentMode = 'learn';
  document.getElementById('learnMenu').classList.toggle('show');
}

function setLearnMode(type) {
  document.querySelectorAll('.sub-modes').forEach(m => m.classList.remove('show'));
  if(type === 'programming') document.getElementById('programmingMenu').classList.add('show');
}

function selectLang(lang) {
  chatBox.innerHTML += `<div class="msg ai">تم اختيار: ${lang} 💻 اكتب "علمني ${lang}"</div>`;
}

async function sendMsg() {
  const prompt = document.getElementById('prompt').value;
  if(!prompt) return;
  chatBox.innerHTML += `<div class="msg user">${prompt}</div>`;
  document.getElementById('prompt').value = '';
  chatBox.scrollTop = chatBox.scrollHeight;
  try{
    const res = await fetch(SERVER_URL + "/api/chat", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({prompt, mode: currentMode})});
    const data = await res.json();
    chatBox.innerHTML += `<div class="msg ai">${data.text}</div>`;
  }catch(e){ chatBox.innerHTML += `<div class="msg ai">خطأ في الاتصال</div>`; }
  chatBox.scrollTop = chatBox.scrollHeight;
}
document.getElementById('prompt').addEventListener('keypress', e => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
