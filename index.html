<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowKing AI 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Cairo', sans-serif; }
body {
  background: #000;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(138, 43, 226, 0.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.2) 0%, transparent 50%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 800px;
  background: rgba(20, 20, 30, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(138, 43, 226, 0.3);
  border-radius: 30px;
  padding: 30px;
  box-shadow: 0 0 50px rgba(138, 43, 226, 0.4);
}
.header {
  text-align: center;
  margin-bottom: 30px;
}
.header h1 {
  font-size: 2.5em;
  font-weight: 900;
  background: linear-gradient(90deg, #8A2BE2, #00D4FF, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
  margin-bottom: 10px;
}
.controls {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}
select {
  flex: 1;
  padding: 12px;
  border-radius: 15px;
  border: 1px solid rgba(138, 43, 226, 0.5);
  background: rgba(0,0,0,0.4);
  color: #fff;
  font-size: 16px;
  outline: none;
}
.chat-box {
  height: 400px;
  background: rgba(0,0,0,0.3);
  border-radius: 20px;
  padding: 20px;
  overflow-y: auto;
  margin-bottom: 20px;
  border: 1px solid rgba(138, 43, 226, 0.2);
}
.msg {
  margin: 15px 0;
  padding: 15px 20px;
  border-radius: 20px;
  max-width: 80%;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
.user {
  background: linear-gradient(135deg, #8A2BE2, #4B0082);
  margin-right: auto;
  border-bottom-right-radius: 5px;
}
.ai {
  background: rgba(0, 212, 255, 0.15);
  border: 1px solid rgba(0, 212, 255, 0.3);
  margin-left: auto;
  border-bottom-left-radius: 5px;
}
.input-area {
  display: flex;
  gap: 10px;
}
input {
  flex: 1;
  padding: 15px 20px;
  border-radius: 15px;
  border: 1px solid rgba(138, 43, 226, 0.5);
  background: rgba(0,0,0,0.4);
  color: #fff;
  font-size: 16px;
  outline: none;
}
button {
  padding: 15px 30px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(135deg, #8A2BE2, #00D4FF);
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(138, 43, 226, 0.8);
}
.loading { display: none; text-align: center; color: #00D4FF; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>ShadowKing AI 👑</h1>
    <p>الذكاء الاصطناعي الملك</p>
  </div>
  
  <div class="controls">
    <select id="lang">
      <option value="ar">العربية</option>
      <option value="en">English</option>
    </select>
    <select id="mode">
      <option value="chat">دردشة</option>
      <option value="code">برمجة</option>
      <option value="image">صور</option>
    </select>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg ai">مرحبا يا ملك 👑 كيف بقدر اساعدك اليوم؟</div>
  </div>

  <div class="loading" id="loading">جاري التفكير...</div>

  <div class="input-area">
    <input type="text" id="prompt" placeholder="اكتب رسالتك هنا...">
    <button onclick="sendMsg()">ارسال</button>
  </div>
</div>

<script>
const SERVER_URL = "https://ai-proxy-qnen.onrender.com"; // <<<< مهم خليه ده
const chatBox = document.getElementById('chatBox');
const loading = document.getElementById('loading');

async function sendMsg() {
  const prompt = document.getElementById('prompt').value;
  const lang = document.getElementById('lang').value;
  const mode = document.getElementById('mode').value;
  if(!prompt) return;

  chatBox.innerHTML += `<div class="msg user">${prompt}</div>`;
  document.getElementById('prompt').value = '';
  loading.style.display = 'block';
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch(SERVER_URL + "/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({prompt, mode, lang})
    });
    const data = await res.json();
    chatBox.innerHTML += `<div class="msg ai">${data.text}</div>`;
  } catch(e) {
    chatBox.innerHTML += `<div class="msg ai">خطأ في الاتصال. اتاكد السيرفر شغال</div>`;
  }
  loading.style.display = 'none';
  chatBox.scrollTop = chatBox.scrollHeight;
}

document.getElementById('prompt').addEventListener('keypress', e => {
  if(e.key === 'Enter') sendMsg();
});
</script>
</body>
</html>
