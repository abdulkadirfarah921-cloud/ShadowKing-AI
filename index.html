<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowKing AI</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070707; --bg2:#0F0F0F; --card:#111; --border:#222; 
  --gold:#FFD700; --purple:#8B5CF6; --pink:#EC4899;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
body{background:var(--bg);color:#EAEAEA;height:100vh;display:flex;overflow:hidden;}

.sidebar{
  width:280px;background:linear-gradient(180deg,#0A0A0A,#000);
  border-left:1px solid var(--border);padding:25px 15px;
  display:flex;flex-direction:column;gap:15px;
}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:900;color:var(--gold);justify-content:center;margin-bottom:10px;}
.logo span{font-size:28px;}
.mode{
  display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:12px;
  background:transparent;color:#AAA;cursor:pointer;font-weight:700;transition:0.2s;
}
.mode:hover{background:#1A1A1A;color:white;}
.mode.active{
  background:linear-gradient(90deg,var(--purple),var(--pink));
  color:white;box-shadow:0 0 20px rgba(139,92,246,0.4);
}

.chat{
  flex:1;display:flex;flex-direction:column;
}
.topbar{
  padding:18px 30px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
}
.topbar h3{color:var(--gold);font-weight:800;}

.messages{
  flex:1;overflow-y:auto;padding:30px;
  background:radial-gradient(circle at 50% 0%, #1a0033 0%, var(--bg) 50%);
}
.msg-wrap{max-width:800px;margin:0 auto;width:100%;}
.msg{
  display:flex;gap:15px;margin-bottom:25px;align-items:flex-start;
}
.avatar{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),#FF8C00);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.ai .avatar{background:linear-gradient(135deg,var(--purple),var(--pink));}
.bubble{
  background:var(--card);padding:16px 20px;border-radius:15px;
  border:1px solid var(--border);line-height:1.9;font-size:16px;
}
.user .bubble{background:linear-gradient(135deg,#1a1a1a,#222);}

.input-area{
  padding:20px 30px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
}
.input-box{
  max-width:800px;margin:0 auto;display:flex;gap:12px;
  background:var(--card);padding:8px;border-radius:16px;border:1px solid var(--border);
}
input{
  flex:1;background:transparent;border:none;color:white;font-size:16px;outline:none;padding:10px 15px;
}
.send{
  background:linear-gradient(135deg,var(--gold),#FF8C00);color:#000;
  border:none;padding:12px 24px;border-radius:12px;font-weight:900;cursor:pointer;
  transition:0.2s;
}
.send:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,215,0,0.4);}

/* للموبايل */
@media(max-width:768px){
  .sidebar{position:absolute;z-index:10;height:100%;transform:translateX(100%);}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><span>👑</span> ShadowKing AI</div>
  <div class="mode active" onclick="setMode('chat')">💬 دردشة</div>
  <div class="mode" onclick="setMode('website')">🌐 صنع موقع</div>
  <div class="mode" onclick="setMode('app')">📱 صنع تطبيق</div>
  <div class="mode" onclick="setMode('game')">🎮 لعبة 3D</div>
  <div class="mode" onclick="setMode('image')">🖼️ صورة 4K</div>
  <div class="mode" onclick="setMode('video')">🎬 فيديو</div>
  <div class="mode" onclick="setMode('learn')">📚 معلم</div>
</div>

<div class="chat">
  <div class="topbar"><h3 id="modeTitle">الذكاء الاصطناعي الملك</h3></div>
  <div class="messages" id="messages">
    <div class="msg-wrap">
      <div class="msg ai">
        <div class="avatar">👑</div>
        <div class="bubble">
          مرحبا بك يا ملك <br>
          انا ShadowKing AI. اقوى نموذج في العالم. <br>
          كيف اخدمك اليوم؟
        </div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <input type="text" id="userInput" placeholder="اسأل الملك عن اي شيء..." onkeypress="if(event.key==='Enter') sendMsg()">
      <button class="send" onclick="sendMsg()">ارسال</button>
    </div>
  </div>
</div>

<script>
let currentMode = 'chat';
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode').forEach(m=>m.classList.remove('active'));
  event.target.classList.add('active');
  const titles={chat:'الدردشة',website:'صنع المواقع',app:'صنع التطبيقات',game:'صنع الالعاب',image:'توليد الصور',video:'توليد الفيديو',learn:'المعلم الشخصي'};
  document.getElementById('modeTitle').innerText = 'وضع: ' + titles;
}

function addMsg(type,text){
  const box=document.getElementById('messages');
  box.innerHTML += `
  <div class="msg-wrap">
    <div class="msg ${type}">
      <div class="avatar">${type==='ai'?'👑':'😎'}</div>
      <div class="bubble">${text}</div>
    </div>
  </div>`;
  box.scrollTop = box.scrollHeight;
}

async function sendMsg(){
  const input=document.getElementById('userInput');
  const prompt=input.value; if(!prompt) return;
  addMsg('user',prompt); input.value='';
  addMsg('ai','جاري التفكير...');

  const res=await fetch('https://ai-proxy-qnen.onrender.com/api/chat',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt,mode:currentMode})
  });
  const data=await res.json();
  document.querySelectorAll('.msg.ai .bubble').pop().innerText = data.text;
}
</script>
</body>
</html>
