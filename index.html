<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowking AI 👑</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family: Arial; overflow:hidden; height:100vh; }
.header { display:flex; justify-content:space-between; align-items:center; padding:20px; border-bottom:2px solid #FFD700; }
.header h1 { font-size:24px; font-weight:bold; color:#FFD700; text-shadow:0 0 15px #FFD700; }
.menu-btn { font-size:30px; color:#FFD700; cursor:pointer; }
.welcome { margin:20px; padding:15px 20px; border: 2px solid #FFD700; border-radius: 20px; text-align:center; font-size:14px; line-height:1.8; }
  #chat { height:45vh; overflow-y:auto; padding:20px; }
.msg { background:#111; border:1px solid #FFD70055; padding:12px; margin:10px 0; border-radius:15px; color:#FFD700; display:flex; justify-content:space-between; align-items:center; }
.play-btn { background:#FFD700; color:#000; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer; font-size:16px; }
  #inputBox { position:fixed; bottom:0; width:100%; background:#000; padding:12px; display:flex; gap:10px; border-top:2px solid #FFD700; }
  #inputBox input { flex:1; padding:14px; background:#111; border:2px solid #FFD700; border-radius:20px; color:#FFD700; text-align:right; }
  #inputBox button { background:#FFD700; color:#000; border:none; padding:14px; border-radius:20px; font-weight:bold; font-size:15px; cursor:pointer; }
.mic-btn.recording { background:red; color:#fff; animation:pulse 1s infinite; }
 @keyframes pulse { 0%{box-shadow:0 0 0 0 #ff0000} 100%{box-shadow:0 0 0 15px #ff000} }
  #modes { position:fixed; bottom:-500px; left:0; width:100%; background:#0a0a0a; border-top:3px solid #FFD700; border-radius:30px 30px 0 0; padding:15px 20px 25px; transition:0.4s; z-index:100; }
  #modes.show { bottom:0; }
.handle { width:50px; height:5px; background:#FFD700; border-radius:10px; margin:0 auto 15px; }
  #modes h3 { text-align:center; color:#FFD700; margin-bottom:20px; }
.mode-btn { border:2px solid #FFD700; border-radius:15px; padding:16px 20px; margin:12px 0; display:flex; justify-content:space-between; align-items:center; color:#FFD700; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="menu-btn" onclick="alert('القائمة الملكية')">☰</div>
  <h1>👑 Shadowking AI - 2.8T</h1>
</div>

<div class="welcome">
  مرحبا انا Shadowking AI. اسحب من تحت لاختيار المود<br>
  دوس على الميك 🎤 عشان تتكلم
</div>

<div id="chat"></div>

<div id="inputBox">
  <button class="mic-btn" onclick="startRecording()">🎤</button>
  <input id="msg" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter')send()">
  <button onclick="send()">إرسال</button>
</div>

<div id="modes">
  <div class="handle"></div>
  <h3>اختر المود</h3>
  <div class="mode-btn" onclick="setMode('')"><span>💬</span> دردشة عادية</div>
  <div class="mode-btn" onclick="setMode('[app]')"><span>📱</span> صنع تطبيق</div>
  <div class="mode-btn" onclick="setMode('[game]')"><span>🎮</span> صنع لعبة</div>
  <div class="mode-btn" onclick="setMode('[code]')"><span>💻</span> كتابة كود</div>
  <div class="mode-btn" onclick="goToAudio()"><span>🎛️</span> هندسة صوت</div>
</div>

<script>
let currentMode = '';
let recognition;

function startRecording(){
  const btn = document.querySelector('.mic-btn');
  if(!('webkitSpeechRecognition' in window)){ alert('المتصفح لا يدعم'); return; }
  recognition = new webkitSpeechRecognition();
  recognition.lang = 'ar-SA';
  recognition.onstart = () => btn.classList.add('recording');
  recognition.onresult = (e) => { document.getElementById('msg').value = e.results[0][0].transcript; send(); }
  recognition.onend = () => btn.classList.remove('recording');
  recognition.start();
}

function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ar-SA'; utter.rate = 1; utter.pitch = 1;
  speechSynthesis.speak(utter);
}

function setMode(m){currentMode = m; document.getElementById('msg').value=m+' '; document.getElementById('modes').classList.remove('show');}
function goToAudio(){ window.location.href = 'audio.html'; }

async function send(){
  let msg=document.getElementById('msg').value; if(!msg)return;
  let fullMsg = currentMode + msg;
  addMessage('انت', msg, false);
  document.getElementById('msg').value='';

  let res=await fetch('https://shadowking-ai.onrender.com/api/chat',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:fullMsg})
  });
  let data=await res.json();
  addMessage('الملك', data.reply, true);
  speak(data.reply);
}

function addMessage(sender, text, canSpeak){
  let chat = document.getElementById('chat');
  let btn = canSpeak? `<button class="play-btn" onclick="speak('${text.replace(/'/g, "\\'")}')">🔊</button>` : '';
  chat.innerHTML += `<div class="msg"><div><b>${sender}:</b> ${text}</div>${btn}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

let startY=0;
document.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;});
document.addEventListener('touchend',e=>{
  if(startY - e.changedTouches[0].clientY > 80 && startY > window.innerHeight-150){
    document.getElementById('modes').classList.add('show');
  }
});
document.getElementById('modes').onclick = ()=>document.getElementById('modes').classList.remove('show');
</script>
</body>
</html>
