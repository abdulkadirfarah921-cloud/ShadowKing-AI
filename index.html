<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadowKing AI</title>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: Arial; margin: 0; padding: 20px; }
    #chat { max-width: 700px; margin: auto; }
    input, button, select { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
    button { background: #7c3aed; color: white; cursor: pointer; }
    #output { margin-top: 20px; background: #1a1a1a; padding: 15px; border-radius: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="chat">
    <h1>👑 ShadowKing AI</h1>
    <select id="mode">
      <option value="chat">دردشة</option>
      <option value="learn">تعلم</option>
      <option value="web">برمجة</option>
    </select>
    <select id="lang">
      <option value="العربية">عربي</option>
      <option value="English">English</option>
    </select>
    <br>
    <input id="prompt" type="text" placeholder="اكتب سؤالك هنا..." style="width: 70%;">
    <button onclick="send()">ارسال</button>
    <div id="output"></div>
  </div>

<script>
const SERVER_URL = "https://ai-proxy-qnen.onrender.com"; // مهم جدا

async function send() {
  const prompt = document.getElementById('prompt').value;
  const mode = document.getElementById('mode').value;
  const lang = document.getElementById('lang').value;
  const output = document.getElementById('output');

  output.innerText = "جاري التفكير...";

  try {
    const res = await fetch(SERVER_URL + "/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({prompt, mode, lang})
    });
    const data = await res.json();
    output.innerText = data.text;
  } catch(e) {
    output.innerText = "خطأ بالاتصال: " + e.message;
  }
}
</script>
</body>
</html>
