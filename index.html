<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowKing AI Ultra 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Tajawal', sans-serif; }
body {
  background: #010108;
  background-image: radial-gradient(circle at 30% 40%, rgba(139, 92, 246, 0.7) 0%, transparent 60%),
                    radial-gradient(circle at 70% 60%, rgba(236, 72, 153, 0.6) 0%, transparent 60%);
  color: #fff; height: 100vh; display: flex; font-size: 18px;
}
.container { flex: 1; display: flex; flex-direction: column; padding: 20px; max-width: 1400px; margin: 0 auto; }
.header { text-align: center; padding: 30px 0; }
.crown { font-size: 100px; animation: glow 2s infinite alternate; filter: drop-shadow(0 0 50px #F59E0B); }
@keyframes glow { from {filter: drop-shadow(0 0 30px #F59E0B);} to {filter: drop-shadow(0 0 80px #8B5CF6);} }
.header h1 { font-size: 3em; font-weight: 900; background: linear-gradient(90deg, #8B5CF6, #EC4899, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.modes { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin: 25px 0; }
.mode-btn {
  padding: 22px; border-radius: 25px; background: rgba(139, 92, 246, 0.2);
  border: 3px solid rgba(139, 92, 246, 0.5); color: #fff; font-size: 20px; font-weight: 900;
  cursor: pointer; transition: 0.3s; backdrop-filter: blur(15px);
}
.mode-btn.active { background: linear-gradient(135deg, #8B5CF6, #EC4899); box-shadow: 0 0 40px rgba(139, 92, 246, 1); transform: scale(1.08); }
.mode-btn:hover { transform: translateY(-5px); }

.sub-modes { display: none; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 15px 0 25px 0; padding: 20px; background: rgba(10,10,25,0.8); border-radius: 20px; border: 2px solid rgba(236,72,153,0.4); }
.sub-modes.show { display: grid; animation: pop 0.4s ease; }

.chat-box { flex: 1; background: rgba(10, 10, 25, 0.8); border-radius: 35px; padding: 30px; overflow-y: auto; border: 3px solid rgba(139, 92, 246, 0.4); backdrop-filter: blur(20px); font-size: 19px; }
.msg { margin: 20px 0; padding: 22px 28px; border-radius: 28px; max-width: 88%; line-height: 1.9; animation: pop 0.3s ease; }
@keyframes pop { from {opacity:0; transform: translateY(20px);} to {opacity:1; transform: translateY(0);} }
.user { background: linear-gradient(135deg, #8B5CF6, #EC4899); margin-right: auto; font-weight: 800; }
.ai { background: rgba(59, 130, 246, 0.2); border: 2px solid rgba(59, 130, 246, 0.5); margin-left: auto; }

.input-area { display: flex; gap: 18px; padding: 25px 0; }
input { flex: 1; padding: 24px 30px; border-radius: 25px; border: 3px solid rgba(139, 92, 246, 0.6); background: rgba(10, 10, 25, 0.95); color: #fff; font-size: 20px; font-weight: 800; }
button.send { padding: 0 55px; border-radius: 25px; border: none; background: linear-gradient(135deg, #8B5CF6, #EC4899); color: #fff; font-weight: 900; font-size: 22px; cursor: pointer; }
button.send:hover { transform: translateY(-4px); box-shadow: 0 0 50px rgba(139, 92, 246, 1); }
</style>
</head>
<body>
<div class="container">
  <div class="header"><div class="crown">👑</div><h1>الذكاء الاصطناعي الملك</h1></div>
  
  <div class="modes">
    <button class="mode-btn active" onclick="setMode('chat', this)">💬 دردشة</button>
    <button class="mode-btn" onclick="setMode('app', this)">📱 صنع تطبيق</button>
    <button class="mode-btn" onclick="setMode('website', this)">🌐 صنع موقع</button>
    <button class="mode-btn" onclick="setMode('game3d', this)">🎮 اصنع لعبة 3D</button>
    <button class="mode-btn" onclick="setMode('video', this)">🎬 فيديو</button>
    <button class="mode-btn" onclick="setMode('image', this)">🖼️ صورة 4K</button>
    <button class="mode-btn" onclick="toggleLearn()">📚 تعلم</button>
  </div>

  <!-- قائمة التعلم -->
  <div class="sub-modes" id="learnMenu">
    <button class="mode-btn" onclick="setLearnMode('programming')">💻 البرمجة</button>
    <button class="mode-btn" onclick="setLearnMode('languages')">🌍 اللغات</button>
    <button class="mode-btn" onclick="setLearnMode('games')">🎯 صناعة الالعاب</button>
  </div>

  <!-- قائمة لغات البرمجة -->
  <div class="sub-modes" id="programmingMenu">
    <button class="mode-btn" onclick="selectLang('C++')">C++</button>
    <button class="mode-btn" onclick="selectLang('Lua')">Lua</button>
    <button class="mode-btn" onclick="selectLang('GDScript')">GDScript</button>
    <button class="mode-btn" onclick="selectLang('Python')">Python</button>
    <button class="mode-btn" onclick="selectLang('JavaScript')">JavaScript</button>
    <button class="mode-btn" onclick="selectLang('Java')">Java</button>
    <button class="mode-btn" onclick="selectLang('C#')">C#</button>
    <button class="mode-btn" onclick="selectLang('Go')">Go</button>
  </div>

  <!-- قائمة اللغات البشرية -->
  <div class="sub-modes" id="languagesMenu">
    <button class="mode-btn" onclick="selectHumanLang('en')">الانجليزية</button>
    <button class="mode-btn" onclick="selectHumanLang('tr')">التركية</button>
    <button class="mode-btn" onclick="selectHumanLang('fr')">الفرنسية</button>
    <button class="mode-btn" onclick="selectHumanLang('de')">المانية</button>
  </div>

  <div class="chat-box" id="chatBox"><div class="msg ai">مرحبا يا ملك 👑 اختار مود واكتب اللي بدك اياه</div></div>

  <div class="input-area">
    <button class="send" onclick="sendMsg()">ارسال</button>
    <input type="text" id="prompt" placeholder="مثال: اصنعلي تطبيق حاسبة">
  </div>
</div>
<script>
const SERVER_URL = "https://ai-proxy-qnen.onrender.com";
let currentMode = 'chat';
let learnSubMode = '';
const chatBox = document.getElementById('chatBox');

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sub-modes').forEach(m => m.classList.remove('show'));
  chatBox.innerHTML += `<div class="msg ai">تم تفعيل مود: ${btn.innerText}</div>`;
}

function toggleLearn() {
  currentMode = 'learn';
  document.getElementById('learnMenu').classList.toggle('show');
  chatBox.innerHTML += `<div class="msg ai">📚 اختار ايش بدك تتعلم يا ملك</div>`;
}

function setLearnMode(type) {
  document.querySelectorAll('.sub-modes').forEach(m => m.classList.remove('show'));
  if(type === 'programming') document.getElementById('programmingMenu').classList.add('show');
  if(type === 'languages') document.getElementById('languagesMenu').classList.add('show');
  if(type === 'games') chatBox.innerHTML += `<div class="msg ai">🎯 تمام. اكتب اسم اللعبة اللي بدك تتعلم تصنعها</div>`;
  learnSubMode = type;
}

function selectLang(lang) {
  currentMode = 'learn';
  chatBox.innerHTML += `<div class="msg ai">تم اختيار: ${lang} 💻 اكتب هسا "علمني اساسيات ${lang}"</div>`;
  document.getElementById('prompt').placeholder = `مثال: علمني ${lang} من الصفر`;
}

function selectHumanLang(lang) {
  currentMode = 'learn';
  chatBox.innerHTML += `<div class="msg ai">تم اختيار تعلم لغة: ${lang} 🌍 اكتب "علمني كلمات ${lang} الاساسية"</div>`;
}

async function sendMsg() {
  const prompt = document.getElementById('prompt').value;
  if(!prompt) return;
  chatBox.innerHTML += `<div class="msg user">${prompt}</div>`;
  document.getElementById('prompt').value = '';
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const res = await fetch(SERVER_URL + "/api/chat", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({prompt, mode: currentMode})});
    const data = await res.json();
    chatBox.innerHTML += `<div class="msg ai">${data.text}</div>`;
  } catch(e) { chatBox.innerHTML += `<div class="msg ai">خطأ في الاتصال بالملك</div>`; }
  chatBox.scrollTop = chatBox.scrollHeight;
}
document.getElementById('prompt').addEventListener('keypress', e => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
