<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowking AI 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
  body { margin:0; background:#000; color:#fff; overflow:hidden; height:100vh; }
  
  /* الهيدر */
.header { 
    display:flex; justify-content:space-between; align-items:center;
    padding:20px; border-bottom:2px solid #FFD700;
  }
.header h1 { 
    font-size:26px; font-weight:900; color:#FFD700;
    text-shadow:0 0 20px #FFD700; margin:0;
    display:flex; align-items:center; gap:8px;
  }
.menu-btn { 
    font-size:30px; color:#FFD700; cursor:pointer; padding:5px 10px;
    font-weight:900;
  }

  /* صندوق الترحيب */
.welcome-box {
    margin:20px; padding:18px;
    background: #111; border: 2px solid #FFD700;
    border-radius: 20px; text-align:center; font-size:15px;
    line-height:1.8; color:#fff;
  }

  #chat { height:40vh; overflow-y:auto; padding:15px 20px; }
.msg { background: #1a1a1a; padding:12px 18px; margin:10px 0; 
        border-radius:15px; border:1px solid #FFD70055; color:#FFD700; }
  
  /* صندوق الارسال */
  #inputBox { 
    position:fixed; bottom:0; width:100%; background: #000; 
    padding:12px 15px; display:flex; gap:10px; border-top:2px solid #FFD700; 
  }
  #inputBox input { 
    flex:1; padding:14px; border:2px solid #FFD700; border-radius:15px; 
    background:#111; color:#FFD700; outline:none; font-size:15px; text-align:right;
  }
  #inputBox button { 
    background:#FFD700; color:#000; border:none; padding:14px 22px; 
    border-radius:15px; font-weight:900; cursor:pointer; font-size:15px;
  }
  
  /* قائمة المودات من تحت */
  #modes { 
    position:fixed; bottom:-500px; left:0; width:100%; 
    background: #0a0a0a; transition:0.4s ease; 
    padding:15px 20px 25px; border-radius:30px 30px 0 0; 
    border-top:3px solid #FFD700; z-index:100;
  }
  #modes.show { bottom:0; }
  #modes.handle { 
    width:50px; height:5px; background:#FFD700; border-radius:10px; 
    margin:0 auto 15px; 
  }
  #modes h3 { text-align:center; color:#FFD700; margin-bottom:20px; font-size:20px; font-weight:900; }
.mode-btn { 
    background: #111; padding:16px 20px; margin:12px 0; border-radius:15px; 
    border:2px solid #FFD700; font-weight:700; font-size:16px; color:#FFD700;
    display:flex; justify-content:space-between; align-items:center;
    flex-direction: row-reverse; /* عشان الايقونة تجي يمين */
  }
.mode-btn:active { background:#FFD700; color:#000; }

  /* قائمة الاعدادات من اليسار */
  #settings { 
    position:fixed; top:0; left:-320px; width:300px; height:100%; 
    background: #0a0a0a; transition:0.4s; padding:25px; 
    border-right:3px solid #FFD700; z-index:100;
  }
  #settings.show { left:0; }
  #settings h3 { color:#FFD700; border-bottom:2px solid #FFD700; padding-bottom:15px; }
.setting-btn { 
    background:#111; padding:15px; margin:12px 0; border-radius:12px; 
    border:1px solid #FFD70055; font-weight:700; color:#FFD700;
  }
.setting-btn:active { background:#FFD700; color:#000; }
  
  #overlay { position:fixed; top:0; left:0; width:100%; height:100%; 
             background:#000cc; display:none; z-index:99;}
  #overlay.show { display:block; }
</style>
</head>
<body>

<div class="header">
  <h1>👑 Shadowking AI</h1>
  <div class="menu-btn" onclick="openSettings()">☰</div>
</div>

<div class="welcome-box">
  مرحبا انا Shadowking AI. اسحب من اليمين للإعدادات<br>
  ومن تحت لاختيار المود
</div>

<div id="chat"></div>

<div id="inputBox">
  <button onclick="send()">إرسال</button>
  <input id="msg" placeholder="اكتب رسالتك...">
</div>

<!-- قائمة المودات -->
<div id="modes">
  <div class="handle"></div>
  <h3>اختر المود 👑</h3>
  <div class="mode-btn" onclick="setMode('')">دردشة عادية <span>💬</span></div>
  <div class="mode-btn" onclick="setMode('[app]')">صنع تطبيق <span>📱</span></div>
  <div class="mode-btn" onclick="setMode('[game]')">صنع لعبة <span>🎮</span></div>
  <div class="mode-btn" onclick="setMode('[code]')">كتابة كود <span>💻</span></div>
</div>

<!-- قائمة الاعدادات -->
<div id="settings">
  <h3>⚙️ الاعدادات</h3>
  <div class="setting-btn" onclick="alert('قريبا')">🎨 الثيم</div>
  <div id="loginBtn" class="setting-btn" onclick="login()">🔑 تسجيل الدخول</div>
  <div id="logoutBtn" class="setting-btn" onclick="logout()" style="display:none;">🚪 تسجيل الخروج</div>
</div>
<div id="overlay" onclick="closeAll()"></div>

<script>
let startY = 0, startX = 0;
let isLoggedIn = localStorage.getItem('loggedIn') === 'true';

function updateButtons(){
  document.getElementById('loginBtn').style.display = isLoggedIn? 'none' : 'block';
  document.getElementById('logoutBtn').style.display = isLoggedIn? 'block' : 'none';
}
updateButtons();

function login(){ isLoggedIn=true; localStorage.setItem('loggedIn','true'); updateButtons(); closeAll(); }
function logout(){ isLoggedIn=false; localStorage.setItem('loggedIn','false'); updateButtons(); closeAll(); }
function openSettings(){ document.getElementById('settings').classList.add('show'); document.getElementById('overlay').classList.add('show'); }

document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  let endY = e.changedTouches[0].clientY;
  let endX = e.changedTouches[0].clientX;
  let diffY = startY - endY;
  let diffX = endX - startX;
  // من تحت لفوق
  if(diffY > 80 && startY > window.innerHeight - 150){ 
    document.getElementById('modes').classList.add('show'); 
    document.getElementById('overlay').classList.add('show'); 
  }
  // من اليسار لليمين
  if(diffX > 80 && startX < 50){ openSettings(); }
});
function closeAll(){ document.getElementById('modes').classList.remove('show'); document.getElementById('settings').classList.remove('show'); document.getElementById('overlay').classList.remove('show'); }
function setMode(mode){ document.getElementById('msg').value = mode + ' '; closeAll(); document.getElementById('msg').focus(); }

async function send(){
  let msg = document.getElementById('msg').value; if(!msg) return;
  document.getElementById('chat').innerHTML += `<div class="msg"><b>انت:</b> ${msg}</div>`;
  document.getElementById('msg').value = '';
  let res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message: msg})});
  let data = await res.json();
  document.getElementById('chat').innerHTML += `<div class="msg"><b>الملك:</b> ${data.reply}</div>`;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}
</script>
</body>
</html>
