<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Shadowking AI</title>
<style>
  body { margin:0; background:#0a0a0a; display:flex; justify-content:center; align-items:center; height:100vh; }
  .box { background:#111; border:2px solid #FFD700; padding:30px; border-radius:20px; box-shadow:0 0 30px #FFD700; width:90%; max-width:400px; }
  h1 { color:#FFD700; text-align:center; text-shadow:0 0 10px #FFD700; }
  .btn { width:100%; padding:15px; margin:10px 0; background:linear-gradient(90deg,#FFD700,#FFA500); border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; }
  input { width:100%; padding:12px; margin:8px 0; background:#222; border:1px solid #FFD700; border-radius:10px; color:#fff; }
  
  /* القائمة الجانبية */
 .menu-icon { position:fixed; top:20px; right:20px; font-size:30px; color:#FFD700; cursor:pointer; z-index:200; }
 .sidebar { position:fixed; top:0; right:-320px; width:320px; height:100%; background:#111; transition:0.4s; z-index:100; padding:20px; border-left:2px solid #FFD700; overflow-y:auto; }
 .sidebar.open { right:0; }
 .side-btn { width:100%; padding:15px; margin:10px 0; background:#1a1a1a; border:1px solid #FFD700; color:#FFD700; border-radius:12px; font-size:16px; text-align:right; cursor:pointer; }
</style>
</head>
<body>

<div class="menu-icon" onclick="sidebar.classList.toggle('open')">☰</div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">
  <h3 style="color:#FFD700">القائمة</h3>
  <button class="side-btn" onclick="loginGoogle()">1. تسجيل الدخول بجوجل</button>
  <button class="side-btn" onclick="alert('الاعدادات')">2. الإعدادات</button>
  <button class="side-btn" onclick="openLangs()">3. اللغات 🌍</button>
  <div id="langBox" style="display:none; margin-top:15px;"></div>
</div>

<!-- صندوق تسجيل الدخول -->
<div class="box">
  <h1>Shadowking AI</h1>
  <button class="btn" onclick="loginGoogle()">جوجل G</button>
  <button class="btn" onclick="alert('ايميل')">ايميل 📧</button>
  <input type="email" placeholder="الايميل">
  <input type="password" placeholder="كلمة السر">
  <button class="btn">تسجيل جديد</button>
  <button class="btn">تسجيل دخول</button>
</div>

<script>
  // اللغة التلقائية
  const lang = navigator.language;
  if(lang.startsWith('en')) document.documentElement.lang = 'en';
  
  // اللغات
  const languages = {"ar":"العربية","en":"English","tr":"Türkçe","fr":"Français","de":"Deutsch","es":"Español","hi":"हिन्दी","zh":"中文","ja":"日本語","ru":"Русский"};
  function openLangs(){
    document.getElementById('langBox').style.display='block';
    let html='';
    for(let code in languages){ html+=`<button class="side-btn" onclick="alert('${languages[code]}')">${languages[code]}</button>`; }
    document.getElementById('langBox').innerHTML=html;
  }
  function loginGoogle(){ alert("تسجيل جوجل"); }
</script>

</body>
</html>
