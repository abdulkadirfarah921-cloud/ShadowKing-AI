<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowking AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#050505; color:#fff; height:100vh; overflow:hidden;}
.header{padding:15px; text-align:center; border-bottom:2px solid #FFD700; background:#0a0a0a;}
.header h1{color:#FFD700; text-shadow:0 0 15px #FFD700; font-size:24px; font-weight:700;}
.menu-icon{position:absolute; right:15px; top:12px; font-size:28px; color:#FFD700; cursor:pointer;}

#chatBox{height:calc(100vh - 140px); overflow-y:auto; padding:20px;}
.msg{background:#1a1a1a; border:2px solid #FFD700; border-radius:18px; padding:14px 18px; margin:12px 0; max-width:85%; animation:slideIn 0.3s ease-out; white-space:pre-wrap; line-height:1.8; box-shadow:0 0 15px #FFD70022;}
.msg.you{margin-left:auto; background:linear-gradient(135deg,#FFD70033,#FFD70011); border-color:#FFD700;}
@keyframes slideIn{from{opacity:0; transform:translateY(20px) scale(0.95)} to{opacity:1; transform:translateY(0) scale(1)}}

.typing{border:2px dashed #FFD700; animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1} 50%{opacity:0.5}}

.cursor{display:inline-block; width:8px; height:20px; background:#FFD700; animation:blink 0.7s infinite; margin-right:5px;}
@keyframes blink{0%,50%{opacity:1} 51%,100%{opacity:0}}

.inputArea{position:fixed; bottom:0; width:100%; padding:12px; background:#0a0a0a; border-top:2px solid #FFD700; display:flex; gap:8px;}
.inputArea input{flex:1; padding:14px; background:#1a1a1a; border:2px solid #FFD700; border-radius:12px; color:#fff; outline:none; font-size:15px;}
.inputArea button{padding:0 22px; background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; border:none; border-radius:12px; font-weight:700; font-size:16px; cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <span class="menu-icon" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</span>
  <h1>Shadowking AI 👑</h1>
</div>

<div id="chatBox">
  <div class="msg">مرحبا انا Shadowking AI. اسحب من اليمين للإعدادات ومن تحت لاختيار المود</div>
</div>

<div class="inputArea">
  <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key=='Enter') sendMsg()">
  <button onclick="sendMsg()">إرسال</button>
</div>

<script>
  let currentMode = 'chat';

  async function sendMsg(){
    let txt = document.getElementById('userInput').value;
    if(txt=='') return;
    addMsg(txt, true);
    document.getElementById('userInput').value='';
    
    // نعمل رسالة "جاري التفكير" بانيميشن
    let typingId = addTypingMsg();

    try{
      const res = await fetch("https://oxy-qnen.onrender.com/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: `[${currentMode}] ` + txt})
      });
      const data = await res.json();
      let reply = data.reply || "مافي رد";
      
      // نمسح "جاري التفكير" ونكتب الرد بانيميشن تايب
      document.getElementById(typingId).remove();
      typeWriter(reply);
      
    }catch(e){
      document.getElementById(typingId).remove();
      addMsg("⚠️ السيرفر نايم. اعمل Manual Deploy");
    }
  }

  function addMsg(text, isYou=false){
    let id = 'msg_' + Date.now();
    document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg ${isYou?'you':''}">${text}</div>`;
    scrollDown();
    return id;
  }

  function addTypingMsg(){
    let id = 'typing_' + Date.now();
    document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg typing">👑 جاري التفكير<span class="cursor"></span></div>`;
    scrollDown();
    return id;
  }

  // انيميشن الكتابة حرف زي ChatGPT
  function typeWriter(text, i=0){
    let id = 'msg_' + Date.now();
    document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg"></div>`;
    let el = document.getElementById(id);
    let speed = 15; // كل ما قل الرقم كل ما كان اسرع
    
    function type(){
      if(i < text.length){
        el.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>';
        i++;
        setTimeout(type, speed);
        scrollDown();
      }else{
        el.innerHTML = text; // نشيل الكيرسر في الاخر
      }
    }
    type();
  }

  function scrollDown(){
    document.getElementById('chatBox').scrollTop = 99999;
  }
</script>

</body>
</html>
