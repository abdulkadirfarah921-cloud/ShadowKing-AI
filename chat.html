<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { apiKey: "AIzaSyAg9Hmv_DcMw2XdvNzr-F1B8cTC9aF-JjA", authDomain: "shadowking-ai.firebaseapp.com", projectId: "shadowking-ai", storageBucket: "shadowking-ai.firebasestorage.app", messagingSenderId: "934957850087", appId: "1:934957850087:web:cc4798c7fe35fb4f95b142" };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  let currentMode = 'chat';

  const AI_SERVER = "https://ai-proxy-qnen.onrender.com"; // سيرفرك

  window.selectMode = (btn, mode) => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = mode;
    let msg = "تم تفعيل مود: " + btn.innerText + " ✅";
    document.getElementById('chatBox').innerHTML = `<div class="message ai-msg">${msg}</div>`;
  }

  async function callAI(prompt) {
    const res = await fetch(`${AI_SERVER}/generate`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ prompt: prompt })
    });
    const data = await res.json();
    return data.text;
  }

  function downloadZip(filename, files) {
    let content = `Shadowking AI Generated\n========================\n\n`;
    for(const [name, code] of Object.entries(files)){
      content += `--- ملف: ${name} ---\n${code}\n\n`;
    }
    const blob = new Blob([content], {type: 'text/plain'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename + ".txt";
    link.click();
  }

  window.sendMessage = async () => {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML += `<div class="message user-msg">[${currentMode}] ${text}</div>`;
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;
    chatBox.innerHTML += `<div class="message ai-msg">جاري التوليد من السيرفر... 👑</div>`;

    if(currentMode === 'app'){
      const prompt = `انت مطور Flutter محترف. اكتب كود كامل لتطبيق: ${text}. ارجعلي الكود مقسم ب --- ملف: اسم الملف ---`;
      const code = await callAI(prompt);
      downloadZip(text.substring(0,10), { "main.dart": code });
      chatBox.innerHTML += `<div class="message ai-msg">تم ✅ نزل الملف. افتحه وشوف الكود</div>`;

    } else if(currentMode === 'game'){
      const prompt = `انت مطور العاب HTML5. اكتب كود لعبة 2D كاملة: ${text}. في ملف index.html واحد`;
      const code = await callAI(prompt);
      downloadZip(text.substring(0,10), { "index.html": code });
      chatBox.innerHTML += `<div class="message ai-msg">تم ✅ نزلت اللعبة. افتح index.html</div>`;

    } else {
      const code = await callAI(text);
      chatBox.innerHTML += `<div class="message ai-msg">${code}</div>`;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');
</script>
