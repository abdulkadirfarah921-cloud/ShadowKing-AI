<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowking AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#000; color:#fff; height:100vh; overflow:hidden;}
.header{padding:15px; text-align:center; border-bottom:2px solid #FFD700; background:#0a0a0a; position:relative;}
.header h1{color:#FFD700; text-shadow:0 0 15px #FFD700; font-size:24px;}
.back-btn{position:absolute; left:15px; top:12px; font-size:24px; color:#FFD700; cursor:pointer; display:none;}
#chatBox{height:calc(100vh - 140px); overflow-y:auto; padding:20px;}
.msg{background:#111; border:2px solid #FFD700; border-radius:18px; padding:14px; margin:12px 0; max-width:85%; animation:slideIn 0.3s; white-space:pre-wrap;}
.msg.you{margin-left:auto; background:#222;}
@keyframes slideIn{from{opacity:0; transform:translateY(20px)} to{opacity:1}}
.typing{border:2px dashed #FFD700;}.cursor{display:inline-block; width:8px; height:20px; background:#FFD700; animation:blink 0.7s infinite;} @keyframes blink{50%{opacity:0}}
.inputArea{position:fixed; bottom:0; width:100%; padding:12px; background:#0a0a0a; border-top:2px solid #FFD700; display:flex; gap:8px;}
.inputArea input{flex:1; padding:14px; background:#111; border:2px solid #FFD700; border-radius:12px; color:#fff; outline:none;}
.inputArea button{padding:0 22px; background:#FFD700; color:#000; border:none; border-radius:12px; font-weight:700; cursor:pointer;}
.bottomSheet{position:fixed; bottom:-400px; left:0; width:100%; background:#0a0a0a; transition:0.4s; z-index:100; border-top:2px solid #FFD700; border-radius:20px 20px 0 0; padding:20px;}
.bottomSheet.open{bottom:0;}.drag{width:50px; height:5px; background:#FFD700; border-radius:10px; margin:0 auto 15px;}
.side-btn{width:100%; padding:14px; margin:8px 0; background:#111; border:2px solid #FFD700; color:#FFD700; border-radius:10px; text-align:right; cursor:pointer; font-weight:700;}
#audioPage{display:none; padding:20px; height:calc(100vh - 60px); overflow-y:auto;}
.section{background:#111; border:2px solid #FFD700; border-radius:15px; padding:15px; margin:15px 0;}
.btn-gold{padding:12px; background:#FFD700; color:#000; border:none; border-radius:10px; font-weight:700; cursor:pointer; width:100%;}
.progress-bar{height:5px; background:#333; border-radius:5px;}.progress{height:100%; background:#FFD700; width:0%; border-radius:5px; transition:width 0.3s;}
</style>
</head>
<body>
<div class="header"><span class="back-btn" onclick="backToChat()">←</span><h1 id="pageTitle">👑 Shadowking AI</h1></div>
<div id="chatPage"><div id="chatBox"><div class="msg">مرحبا. اسحب من تحت لاختيار المود</div></div>
<div class="inputArea"><input type="text" id="userInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key=='Enter') sendMsg()"><button onclick="sendMsg()">إرسال</button></div></div>
<div id="audioPage"><h2 style="color:#FFD700; text-align:center;">🎵 استوديو الصوت</h2>
<div class="section"><h3>اصنع صوت بالذكاء الاصطناعي</h3><input type="text" id="audioPrompt" placeholder="مثال: صوت مطر" style="width:100%; padding:12px; background:#000; border:2px solid #FFD700; border-radius:10px; color:#fff; margin:10px 0;"><button class="btn-gold" onclick="generateAudio()">✨ صنع الصوت</button><div class="progress-bar"><div class="progress" id="audioProgress"></div></div><p id="audioStatus"></p></div>
<div class="section" id="resultSection" style="display:none;"><audio id="finalAudio" controls style="width:100%;"></audio><button class="btn-gold" onclick="downloadAudio()">⬇ تحميل</button></div></div>
<div class="bottomSheet" id="bottomSheet"><div class="drag" onclick="closeSheet()"></div><h3 style="color:#FFD700; text-align:center;">اختر المود الملكي</h3>
<button class="side-btn" onclick="selectMode('chat')">💬 دردشة</button><button class="side-btn" onclick="selectMode('app')">📱 صنع موقع</button><button class="side-btn" onclick="selectMode('game')">🎮 صنع لعبة</button><button class="side-btn" onclick="openAudioPage()">🎵 هندسة صوت</button></div>
<script>
  let currentMode = 'chat';
  const SERVER_URL = "https://ai-proxy-qnen.onrender.com";
  let startY = 0;
  document.addEventListener('touchstart', e=> startY = e.touches[0].clientY);
  document.addEventListener('touchend', e=> { let endY = e.changedTouches[0].clientY; if(startY > window.innerHeight - 100 && endY < startY - 50) document.getElementById('bottomSheet').classList.add('open'); });
  function closeSheet(){ document.getElementById('bottomSheet').classList.remove('open'); }
  function selectMode(mode){ currentMode = mode; closeSheet(); if(mode=='audio') openAudioPage(); else addMsg("✅ تم التحويل لمود: " + mode); }
  function openAudioPage(){ document.getElementById('chatPage').style.display = 'none'; document.getElementById('audioPage').style.display = 'block'; document.getElementById('pageTitle').innerText = 'هندسة الصوت 🎵'; document.querySelector('.back-btn').style.display = 'block'; closeSheet(); }
  function backToChat(){ document.getElementById('audioPage').style.display = 'none'; document.getElementById('chatPage').style.display = 'block'; document.getElementById('pageTitle').innerText = '👑 Shadowking AI'; document.querySelector('.back-btn').style.display = 'none'; }
  async function generateAudio(){ let prompt = document.getElementById('audioPrompt').value; if(prompt=='') return alert('اكتب وصف الصوت'); document.getElementById('audioStatus').innerText = 'جاري الصنع... 5 دقائق'; let progress = 0; let interval = setInterval(()=>{ progress += 2; document.getElementById('audioProgress').style.width = progress + '%'; if(progress >= 100) clearInterval(interval); }, 3000);
  try{ const res = await fetch(SERVER_URL + "/api/generate-audio", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({prompt: prompt})}); const data = await res.json(); clearInterval(interval); document.getElementById('audioProgress').style.width = '100%'; document.getElementById('audioStatus').innerText = '✅ تم'; document.getElementById('resultSection').style.display = 'block'; document.getElementById('finalAudio').src = data.audioUrl; }catch(e){ clearInterval(interval); document.getElementById('audioStatus').innerText = '❌ خطأ'; } }
  function downloadAudio(){ let a = document.createElement('a'); a.href = document.getElementById('finalAudio').src; a.download = 'shadowking_audio.mp3'; a.click(); alert('تم التحميل. احفظه في: /storage/emulated/0/مجلد اصوات مصنوعة باستخدام SHADOWKING AI'); }
  async function sendMsg(){ let txt = document.getElementById('userInput').value; if(txt=='') return; addMsg(txt, true); document.getElementById('userInput').value=''; let typingId = addTypingMsg(); try{ const res = await fetch(SERVER_URL + "/api/chat", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({message: `[${currentMode}] ` + txt})}); const data = await res.json(); document.getElementById(typingId).remove(); typeWriter(data.reply); }catch(e){ document.getElementById(typingId).remove(); addMsg("❌ Failed to fetch. اتأكد السيرفر صاحي"); } }
  function addMsg(text, isYou=false){ document.getElementById('chatBox').innerHTML += `<div class="msg ${isYou?'you':''}">${text}</div>`; scrollDown(); }
  function addTypingMsg(){ let id = 'typing_' + Date.now(); document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg typing">👑 جاري التفكير<span class="cursor"></span></div>`; scrollDown(); return id; }
  function typeWriter(text, i=0){ let id = 'msg_' + Date.now(); document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg"></div>`; let el = document.getElementById(id); function type(){ if(i < text.length){ el.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>'; i++; setTimeout(type, 15); scrollDown(); }else{ el.innerHTML = text; } type(); }
  function scrollDown(){ document.getElementById('chatBox').scrollTop = 99999; }
</script>
</body>
</html>
