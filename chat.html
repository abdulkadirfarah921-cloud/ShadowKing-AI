<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowking AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#050505; color:#fff; height:100vh; overflow:hidden;}
.header{padding:15px; text-align:center; border-bottom:2px solid #FFD700; background:#0a0a0a; box-shadow:0 0 20px #FFD70044; position:relative;}
.header h1{color:#FFD700; text-shadow:0 0 15px #FFD700; font-size:24px; font-weight:700;}
.back-btn{position:absolute; left:15px; top:12px; font-size:24px; color:#FFD700; cursor:pointer; display:none;}

#chatBox{height:calc(100vh - 140px); overflow-y:auto; padding:20px;}
.msg{background:#1a1a1a; border:2px solid #FFD700; border-radius:18px; padding:14px 18px; margin:12px 0; max-width:85%; animation:slideIn 0.3s ease-out; white-space:pre-wrap; line-height:1.8; box-shadow:0 0 15px #FFD70022;}
.msg.you{margin-left:auto; background:linear-gradient(135deg,#FFD70033,#FFD70011);}
@keyframes slideIn{from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)}}

.typing{border:2px dashed #FFD700; animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1} 50%{opacity:0.5}}
.cursor{display:inline-block; width:8px; height:20px; background:#FFD700; animation:blink 0.7s infinite;}
@keyframes blink{0%,50%{opacity:1} 51%,100%{opacity:0}}

.inputArea{position:fixed; bottom:0; width:100%; padding:12px; background:#0a0a0a; border-top:2px solid #FFD700; display:flex; gap:8px;}
.inputArea input{flex:1; padding:14px; background:#1a1a1a; border:2px solid #FFD700; border-radius:12px; color:#fff; outline:none; font-size:15px;}
.inputArea button{padding:0 22px; background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; border:none; border-radius:12px; font-weight:700; font-size:16px; cursor:pointer;}

/* صفحة هندسة الصوت */
#audioPage{display:none; padding:20px; height:calc(100vh - 60px); overflow-y:auto;}
.section{background:#1a1a1a; border:2px solid #FFD700; border-radius:15px; padding:15px; margin:15px 0;}
.section h3{color:#FFD700; margin-bottom:10px;}
.audio-track{background:#000; border:1px solid #FFD700; border-radius:10px; height:60px; margin:10px 0; position:relative; overflow:hidden;}
.waveform{height:100%; background:linear-gradient(90deg, #FFD700 0%, #FFA500 50%, #FFD700 100%); opacity:0.7; width:0%; transition:width 0.1s;}
.controls{display:flex; gap:10px; margin-top:15px;}
.btn-gold{padding:12px; background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; border:none; border-radius:10px; font-weight:700; cursor:pointer; flex:1;}
.btn-red{background:linear-gradient(135deg,#ff3333,#ff0000); color:#fff;}
.progress-bar{height:5px; background:#333; border-radius:5px; margin:10px 0;}
.progress{height:100%; background:#FFD700; width:0%; border-radius:5px; transition:width 0.3s;}
</style>
</head>
<body>

<div class="header">
  <span class="back-btn" onclick="backToChat()">←</span>
  <span class="menu-icon" onclick="alert('القائمة')">☰</span>
  <h1 id="pageTitle">Shadowking AI 👑</h1>
</div>

<!-- صفحة الشات العادية -->
<div id="chatPage">
  <div id="chatBox">
    <div class="msg">مرحبا انا Shadowking AI. اسحب من تحت لاختيار المود</div>
  </div>
  <div class="inputArea">
    <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key=='Enter') sendMsg()">
    <button onclick="sendMsg()">إرسال</button>
  </div>
</div>

<!-- صفحة هندسة الصوت -->
<div id="audioPage">
  <h2 style="color:#FFD700; text-align:center;">🎵 استوديو Shadowking للصوت</h2>
  
  <div class="section">
    <h3>1. اصنع صوت بالذكاء الاصطناعي</h3>
    <input type="text" id="audioPrompt" placeholder="اكتب وصف الصوت: مثال: صوت مطر مع رعد" style="width:100%; padding:12px; background:#000; border:2px solid #FFD700; border-radius:10px; color:#fff; margin:10px 0;">
    <button class="btn-gold" onclick="generateAudio()">✨ صنع الصوت بالـ AI</button>
    <div class="progress-bar"><div class="progress" id="audioProgress"></div></div>
    <p id="audioStatus" style="font-size:13px; color:#aaa;"></p>
  </div>

  <div class="section">
    <h3>2. هندسة الصوت - CapCut Audio</h3>
    <div id="tracks"></div>
    <div class="controls">
      <button class="btn-gold" onclick="addTrack()">+ اضافة تراك</button>
      <button class="btn-gold" onclick="playAudio()">▶ تشغيل</button>
      <button class="btn-gold" onclick="cutAudio()">✂ قص</button>
    </div>
  </div>

  <div class="section" id="resultSection" style="display:none;">
    <h3>3. النتيجة</h3>
    <audio id="finalAudio" controls style="width:100%;"></audio>
    <div class="controls">
      <button class="btn-gold" onclick="editAgain()">📝 تعديل مرة ثانية</button>
      <button class="btn-red" onclick="downloadAudio()">⬇ تحميل الصوت</button>
    </div>
  </div>
</div>

<script>
  let currentMode = 'chat';
  let audioFiles = [];

  // فتح صفحة هندسة الصوت
  function openAudioPage(){
    document.getElementById('chatPage').style.display = 'none';
    document.getElementById('audioPage').style.display = 'block';
    document.getElementById('pageTitle').innerText = 'هندسة الصوت 🎵';
    document.querySelector('.back-btn').style.display = 'block';
    addTrack();
  }
  function backToChat(){
    document.getElementById('audioPage').style.display = 'none';
    document.getElementById('chatPage').style.display = 'block';
    document.getElementById('pageTitle').innerText = 'Shadowking AI 👑';
    document.querySelector('.back-btn').style.display = 'none';
  }

  // صنع صوت بالذكاء الاصطناعي - بياخد 5 دقايق
  async function generateAudio(){
    let prompt = document.getElementById('audioPrompt').value;
    if(prompt=='') return alert('اكتب وصف الصوت');
    
    document.getElementById('audioStatus').innerText = '👑 جاري صنع الصوت... هذا قد يستغرق 5 دقائق';
    let progress = 0;
    let interval = setInterval(()=>{
      progress += 1.6;
      document.getElementById('audioProgress').style.width = progress + '%';
      if(progress >= 100) clearInterval(interval);
    }, 3000); // 5 دقايق = 300 ثانية / 100

    // هنا بنكلم السيرفر عشان يصنع الصوت
    try{
      const res = await fetch("https://oxy-qnen.onrender.com/api/generate-audio", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({prompt: prompt})
      });
      const data = await res.json();
      clearInterval(interval);
      document.getElementById('audioProgress').style.width = '100%';
      document.getElementById('audioStatus').innerText = '✅ تم صنع الصوت';
      
      addAudioToTrack(data.audioUrl);
      document.getElementById('resultSection').style.display = 'block';
      document.getElementById('finalAudio').src = data.audioUrl;

    }catch(e){
      clearInterval(interval);
      document.getElementById('audioStatus').innerText = '❌ خطأ: ' + e.message;
    }
  }

  function addTrack(){
    let trackId = 'track_' + Date.now();
    document.getElementById('tracks').innerHTML += `
      <div class="audio-track" id="${trackId}">
        <div class="waveform"></div>
      </div>
    `;
  }
  function addAudioToTrack(url){
    let waveforms = document.querySelectorAll('.waveform');
    if(waveforms.length > 0){
      waveforms[waveforms.length-1].style.width = '100%';
    }
    audioFiles.push(url);
  }
  function playAudio(){
    document.getElementById('finalAudio').play();
  }
  function cutAudio(){
    alert('تم القص. اسحب على الويف عشان تقص الجزء اللي بدك');
  }
  function editAgain(){
    document.getElementById('resultSection').style.display = 'none';
  }

  // التحميل لمجلد SHADOWKING AI
  function downloadAudio(){
    let a = document.createElement('a');
    a.href = document.getElementById('finalAudio').src;
    a.download = 'shadowking_audio_' + Date.now() + '.mp3';
    a.click();
    
    // تنبيه للمستخدم وين ينحفظ
    alert('✅ تم التحميل\n\nالمسار: /storage/emulated/0/مجلد اصوات مصنوعة باستخدام SHADOWKING AI\n\nلو المجلد مش موجود اعمله يدوي');
  }

  // كود الشات العادي مع اختيار المود
  async function sendMsg(){
    let txt = document.getElementById('userInput').value;
    if(txt=='') return;
    if(txt.toLowerCase().includes('هندسة صوت') || txt.toLowerCase().includes('audio')){
      openAudioPage();
      return;
    }
    addMsg(txt, true);
    document.getElementById('userInput').value='';
    let typingId = addTypingMsg();

    try{
      const res = await fetch("https://oxy-qnen.onrender.com/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: `[${currentMode}] ` + txt})
      });
      const data = await res.json();
      document.getElementById(typingId).remove();
      typeWriter(data.reply || "مافي رد");
    }catch(e){
      document.getElementById(typingId).remove();
      addMsg("❌ خطأ: " + e.message);
    }
  }
  function addMsg(text, isYou=false){
    let id = 'msg_' + Date.now();
    document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg ${isYou?'you':''}">${text}</div>`;
    scrollDown();
  }
  function addTypingMsg(){
    let id = 'typing_' + Date.now();
    document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg typing">👑 جاري التفكير<span class="cursor"></span></div>`;
    scrollDown(); return id;
  }
  function typeWriter(text, i=0){
    let id = 'msg_' + Date.now();
    document.getElementById('chatBox').innerHTML += `<div id="${id}" class="msg"></div>`;
    let el = document.getElementById(id); let speed = 10;
    function type(){
      if(i < text.length){
        el.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>';
        i++; setTimeout(type, speed); scrollDown();
      }else{ el.innerHTML = text; }
    }
    type();
  }
  function scrollDown(){
    document.getElementById('chatBox').scrollTop = 99999;
  }
</script>

</body>
</html>
