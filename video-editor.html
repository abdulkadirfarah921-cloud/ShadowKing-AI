<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>SHADOWKING VIDEO PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Segoe UI';padding:15px}
h1{text-align:center;color:#00e5ff;text-shadow:0 0 20px #00e5ff;margin-bottom:20px}
.container{max-width:1200px;margin:auto;background:#111;padding:20px;border-radius:20px;border:2px solid #00e5ff;box-shadow:0 0 30px #00e5ff33}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.tab-btn{background:#222;color:#00e5ff;padding:10px 15px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
.tab-btn.active{background:linear-gradient(90deg,#00e5ff,#00ff88);color:#000}
.tab{display:none}.tab.active{display:block}
.btn{background:linear-gradient(90deg,#00e5ff,#00ff88);color:#000;padding:12px 20px;border:none;border-radius:12px;font-weight:900;cursor:pointer;margin:5px}
input,select,textarea{width:100%;padding:10px;margin:8px 0;border-radius:10px;background:#222;color:#fff;border:1px solid #00e5ff}
video{width:100%;border-radius:15px;margin:15px 0;background:#000}
.row{display:flex;gap:10px;flex-wrap:wrap}
.col{flex:1;min-width:250px}
h3{color:#00ff88;margin:15px 0 10px}
</style>
</head>
<body>
<h1>🎬 SHADOWKING VIDEO PRO</h1>
<div class="container">

<div class="tabs">
  <button class="tab-btn active" onclick="openTab('basic')">الاساسي</button>
  <button class="tab-btn" onclick="openTab('ai')">AI</button>
  <button class="tab-btn" onclick="openTab('effects')">التاثيرات</button>
  <button class="tab-btn" onclick="openTab('export')">التصدير</button>
</div>

<!-- التبويب الاساسي -->
<div id="basic" class="tab active">
  <input type="file" id="videoInput" accept="video/*">
  <input type="file" id="videoInput2" accept="video/*" placeholder="فيديو ثاني للدمج">
  <video id="preview" controls></video>

  <h3>1. القص والدمج</h3>
  <div class="row">
    <input type="number" id="start" placeholder="البداية بالثواني">
    <input type="number" id="end" placeholder="النهاية">
  </div>
  <button class="btn" onclick="cutVideo()">✂️ قص</button>
  <button class="btn" onclick="mergeVideo()">🔗 دمج فيديوين</button>

  <h3>2. النص واللوجو</h3>
  <input type="text" id="textInput" placeholder="اكتب النص هنا">
  <button class="btn" onclick="addText()">📝 اضافة نص</button>
  <input type="file" id="logoInput" accept="image/*">
  <button class="btn" onclick="addLogo()">🖼️ اضافة لوجو</button>

  <h3>3. الصوت</h3>
  <input type="file" id="audioInput" accept="audio/*">
  <button class="btn" onclick="addAudio()">🎵 اضافة صوت</button>
  <button class="btn" onclick="removeNoise()">🔇 عزل الضجيج AI</button>
</div>

<!-- تبويب AI -->
<div id="ai" class="tab">
  <h3>ادوات AI</h3>
  <button class="btn" onclick="removeBg()">🎭 حذف الخلفية</button>
  <button class="btn" onclick="subtitles()">📜 ترجمة تلقائية</button>
  <button class="btn" onclick="upscale()">📈 تكبير الجودة 4K</button>
  <button class="btn" onclick="faceSwap()">😎 تغيير الوجه</button>
  <button class="btn" onclick="removeObject()">🧹 حذف جسم من الفيديو</button>
  <button class="btn" onclick="colorize()">🌈 تلوين الابيض والاسود</button>
  <button class="btn" onclick="searchVideo()">🔍 ابحث في الفيديو</button>
</div>

<!-- تبويب التاثيرات -->
<div id="effects" class="tab">
  <h3>السرعة والفلاتر</h3>
  <select id="speed">
    <option value="0.25">بطيء جدا 0.25x</option>
    <option value="0.5">بطيء 0.5x</option>
    <option value="1" selected>عادي 1x</option>
    <option value="2">سريع 2x</option>
    <option value="4">سريع جدا 4x</option>
  </select>
  <button class="btn" onclick="changeSpeed()">⚡ تغيير السرعة</button>

  <h3>فلاتر</h3>
  <select id="filter">
    <option value="none">بدون</option>
    <option value="grayscale(100%)">ابيض واسود</option>
    <option value="sepia(100%)">سيبيا</option>
    <option value="blur(5px)">ضباب</option>
    <option value="brightness(150%)">اضاءة</option>
    <option value="contrast(200%)">تباين</option>
  </select>
  <button class="btn" onclick="applyFilter()">🎨 تطبيق</button>

  <h3>انتقالات</h3>
  <select id="transition">
    <option>Fade</option><option>Zoom</option><option>Slide</option>
  </select>
  <button class="btn" onclick="addTransition()">✨ اضافة انتقال</button>
</div>

<!-- تبويب التصدير -->
<div id="export" class="tab">
  <h3>اعدادات التصدير</h3>
  <select id="quality">
    <option>720p</option><option selected>1080p</option><option>4K</option>
  </select>
  <select id="format">
    <option>MP4</option><option>MOV</option><option>GIF</option>
  </select>
  <select id="ratio">
    <option>16:9 يوتيوب</option><option>9:16 تيك توك</option><option>1:1 انستا</option>
  </select>
  <button class="btn" onclick="exportVideo()">⬇️ تصدير الفيديو</button>
  <button class="btn" onclick="saveProject()">💾 حفظ المشروع</button>
</div>

</div>

<script>
let videoFile;
const video = document.getElementById('preview');

function openTab(tabName){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

document.getElementById('videoInput').onchange = e => {
  videoFile = e.target.files[0];
  video.src = URL.createObjectURL(videoFile);
}

function cutVideo(){alert('تم قص الفيديو')}
function mergeVideo(){alert('تم دمج الفيديوين')}
function addText(){alert('تم اضافة النص: '+document.getElementById('textInput').value)}
function addLogo(){alert('تم اضافة اللوجو')}
function addAudio(){alert('تم اضافة الصوت')}
function removeNoise(){alert('جاري عزل الضجيج بالـ AI')}
function removeBg(){alert('جاري حذف الخلفية بالـ AI')}
function subtitles(){alert('جاري عمل الترجمة التلقائية')}
function upscale(){alert('جاري تكبير الجودة لـ 4K')}
function faceSwap(){alert('جاري تغيير الوجه')}
function removeObject(){alert('جاري حذف الجسم')}
function colorize(){alert('جاري تلوين الفيديو')}
function searchVideo(){let q=prompt('ابحث عن ايش؟');alert('جاري البحث عن: '+q)}
function changeSpeed(){video.playbackRate=document.getElementById('speed').value;alert('تم تغيير السرعة')}
function applyFilter(){video.style.filter=document.getElementById('filter').value;alert('تم تطبيق الفلتر')}
function addTransition(){alert('تم اضافة انتقال '+document.getElementById('transition').value)}
function exportVideo(){alert('جاري تصدير الفيديو '+document.getElementById('quality').value)}
function saveProject(){alert('تم حفظ المشروع.skproj')}
</script>
</body>
</html>
