<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>SHADOWKING VIDEO PRO ULTRA v9</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--neon:#00e5ff;--neon2:#00ff88;--glass:rgba(20,20,30,0.7)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:radial-gradient(circle at 50% 0%,#1a1a2e 0%,#000 100%);color:#fff;overflow-x:auto}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
.topbar{padding:12px 20px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--neon)44;position:sticky;top:0;z-index:100}
.logo{font-size:1.5em;font-weight:900;color:var(--neon)}
.container{max-width:1800px;margin:15px auto;padding:15px}
.main-grid{display:grid;grid-template-columns:1fr 400px;gap:15px}

.preview-area{background:var(--glass);border:1px solid var(--neon)44;border-radius:15px;padding:10px;position:relative}
video{width:100%;height:220px;object-fit:cover;border-radius:12px;background:#000;border:2px solid var(--neon)}
.sidebar{background:var(--glass);border:1px solid var(--neon)44;border-radius:15px;padding:15px;max-height:90vh;overflow-y:auto}
.card{background:rgba(0,0,0,0.4);border:1px solid var(--neon)33;border-radius:12px;padding:15px;margin-bottom:12px}
h3{color:var(--neon2);margin-bottom:10px;font-size:1em;border-right:3px solid var(--neon2);padding-right:10px}
.btn{width:100%;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:12px;border:none;border-radius:10px;font-weight:900;cursor:pointer;margin:5px 0;font-size:0.95em}
.btn-export{background:linear-gradient(90deg,#00ff88,#00e5ff);box-shadow:0 0 20px var(--neon2)}
select,input{width:100%;padding:10px;background:rgba(0,0,0,0.5);color:#fff;border:1px solid var(--neon);border-radius:8px;margin:5px 0}

/* ===== الازرار الثابتة الشغالة ===== */
.scroll-controls{
  position:fixed; /* ثابتين */
  right:25px;
  top:280px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:9999;
}
.scroll-btn{
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  color:#000;border:none;padding:18px 20px;border-radius:15px;
  font-size:2.2em;font-weight:900;cursor:pointer;
  box-shadow:0 0 30px var(--neon);
  user-select:none;
  transition:0.1s;
}
.scroll-btn:active{transform:scale(0.85);box-shadow:0 0 50px var(--neon2)}

/* ===== التايم لاين ===== */
.timeline-wrap{background:var(--glass);border:1px solid var(--neon)44;border-radius:15px;padding:10px;margin-top:15px;min-width:2000px}
.timeline-controls{display:flex;justify-content:space-between;margin-bottom:8px}
.zoom-btn{background:var(--neon);color:#000;border:none;padding:6px 12px;border-radius:8px;font-weight:900;cursor:pointer}
.time-ruler{height:20px;display:flex;font-size:0.8em;color:var(--neon);margin-bottom:5px;position:relative}
.timeline-track{height:50px;background:#050505;border-radius:10px;position:relative;overflow-x:auto;border:1px solid var(--neon)22}
.track-row{height:100%;position:relative;display:flex;align-items:center;min-width:10000px}
.clip-item{height:40px;background:linear-gradient(90deg,var(--neon),var(--neon2));border-radius:8px;margin:0 3px;padding:5px;min-width:120px;font-size:0.8em;display:flex;align-items:center}
.playhead{position:absolute;top:0;width:3px;height:100%;background:red;z-index:100}
.watermark{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.5);color:var(--neon);padding:5px 10px;border-radius:15px;font-size:0.7em}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="topbar"><div class="logo">🎬 SHADOWKING PRO ULTRA</div></div>

<!-- الازرار الثابتة -->
<div class="scroll-controls">
  <button class="scroll-btn" id="scrollLeft">◀️</button>
  <button class="scroll-btn" id="scrollRight">▶️</button>
</div>

<div class="container">
<div class="main-grid">

  <div>
    <div class="preview-area">
      <div class="watermark">SHADOWKING</div>
      <label class="btn" onclick="document.getElementById('videoInput').click()">📁 اضف فيديو</label>
      <input type="file" id="videoInput" accept="video/*" style="display:none">
      <video id="preview" controls></video>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-controls">
        <h3>📼 التايم لين</h3>
        <div>
          <button class="zoom-btn" onclick="zoomOut()">-</button>
          <span id="zoomLevel">100%</span>
          <button class="zoom-btn" onclick="zoomIn()">+</button>
        </div>
      </div>
      <div class="time-ruler" id="timeRuler"></div>
      <div class="timeline-track" id="timelineTrack">
        <div class="playhead" id="playhead"></div>
        <div class="track-row" id="trackRow">
          <div class="btn" style="width:60px" onclick="document.getElementById('videoInput').click()">+</div>
        </div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="card">
      <h3>القص والدمج</h3>
      <button class="btn" onclick="splitClip()">✂️ قص</button>
      <button class="btn" onclick="mergeVideo()">🔗 دمج</button>
    </div>
    <div class="card">
      <h3>⬇️ التصدير</h3>
      <select id="quality"><option>720p</option><option selected>1080p</option><option>4K</option></select>
      <select id="fps">
        <option>30 FPS</option><option>60 FPS</option><option>120 FPS</option>
        <option>144 FPS</option><option>240 FPS</option><option>360 FPS</option>
      </select>
      <button class="btn btn-export" onclick="exportVideo()">تصدير الفيديو</button>
    </div>
  </div>
</div>
</div>

<script>
// خلفية النيون
const canvas=document.getElementById('particles');const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let particles=[];for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-0.5)*0.4,dy:(Math.random()-0.5)*0.4})}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00e5ff22';particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1});requestAnimationFrame(animate)}animate();

const video = document.getElementById('preview');
const playhead = document.getElementById('playhead');
const trackRow = document.getElementById('trackRow');
let zoom = 1;
let scrollInterval = null;

// اضافة فيديو
document.getElementById('videoInput').onchange=e=>{
  const file = e.target.files[0];
  if(file){
    video.src = URL.createObjectURL(file);
    addClipToTimeline(file.name);
    generateTimeRuler();
  }
}

function addClipToTimeline(name){
  const clip = document.createElement('div');
  clip.className = 'clip-item';
  clip.innerHTML = `<span>${name}</span>`;
  trackRow.insertBefore(clip, trackRow.lastElementChild);
}

function zoomIn(){zoom+=0.2;trackRow.style.transform=`scaleX(${zoom})`;document.getElementById('zoomLevel').textContent=Math.round(zoom*100)+'%';generateTimeRuler()}
function zoomOut(){if(zoom>0.4){zoom-=0.2;trackRow.style.transform=`scaleX(${zoom})`;document.getElementById('zoomLevel').textContent=Math.round(zoom*100)+'%';generateTimeRuler()}}

function generateTimeRuler(){
  const ruler = document.getElementById('timeRuler');ruler.innerHTML = '';
  for(let i=0;i<=50;i++){
    const mark = document.createElement('div');
    mark.style.position='absolute';
    mark.style.left = (i*200*zoom)+'px';
    mark.textContent = `00:${i<10?'0'+i:i}`;
    ruler.appendChild(mark);
  }
}

// ===== كود الازرار كامل متكامل =====
function startScroll(direction){
  // direction: -1 يسار, 1 يمين
  scrollInterval = setInterval(()=>{
    window.scrollBy({left: direction * 60, behavior: 'auto'});
  }, 25);
}

function stopScroll(){
  clearInterval(scrollInterval);
}

// كمبيوتر
document.getElementById('scrollLeft').addEventListener('mousedown',()=>startScroll(-1));
document.getElementById('scrollLeft').addEventListener('mouseup',stopScroll);
document.getElementById('scrollLeft').addEventListener('mouseleave',stopScroll);

document.getElementById('scrollRight').addEventListener('mousedown',()=>startScroll(1));
document.getElementById('scrollRight').addEventListener('mouseup',stopScroll);
document.getElementById('scrollRight').addEventListener('mouseleave',stopScroll);

// موبايل
document.getElementById('scrollLeft').addEventListener('touchstart',()=>startScroll(-1));
document.getElementById('scrollLeft').addEventListener('touchend',stopScroll);
document.getElementById('scrollRight').addEventListener('touchstart',()=>startScroll(1));
document.getElementById('scrollRight').addEventListener('touchend',stopScroll);

// وظائف
function splitClip(){alert('قص عند '+video.currentTime.toFixed(1)+'s')}
function mergeVideo(){alert('تم الدمج')}

video.ontimeupdate = () => {
  if(video.duration){
    playhead.style.left = (video.currentTime / video.duration * 100) + '%';
  }
}

function exportVideo(){
  const q = document.getElementById('quality').value;
  const f = document.getElementById('fps').value;
  alert(`جاري التصدير: ${q} - ${f}\nSHADOWKING WATERMARK ACTIVE`);
}
</script>
</body>
</html>
