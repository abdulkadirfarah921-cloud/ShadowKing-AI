<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING VIDEO PRO</title>
<style>
:root{--neon:#00ff88;--neon2:#00e5ff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
body{background:#000;color:#fff;overflow:hidden}

/* نخليها بالعرض اجباري ونكبر الخط */
@media (orientation: portrait) {
  body {transform: rotate(90deg);transform-origin: left top;width: 100vh;height: 100vw;position: absolute;top: 100vw;left: 0;}
}

.topbar{background:#0a0a0a;height:60px;display:flex;align-items:center;padding:0 20px;border-bottom:3px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:20px;text-shadow:0 0 15px var(--neon)}
.export-btn{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:12px 25px;border-radius:15px;font-weight:900;font-size:15px;cursor:pointer}

.main{display:flex;height:calc(100vh - 60px - 80px)}
.sidebar{width:110px;background:#050505;border-left:3px solid var(--neon);padding:15px 8px;display:flex;flex-direction:column;gap:12px}
.tool{height:70px;background:#111;border:2px solid #333;border-radius:15px;color:#aaa;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;font-weight:700}
.tool.active{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border-color:var(--neon);box-shadow:0 0 20px var(--neon)}

.center{flex:1;display:flex;flex-direction:column;padding:15px;gap:15px}
.preview{flex:1;background:#0a0a0a;border:3px solid #333;border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative}
.preview video{width:100%;height:100%;object-fit:contain}
.upload-big{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:25px 40px;border-radius:20px;font-size:18px;font-weight:900;cursor:pointer}

.timeline{height:140px;background:#0a0a0a;border:2px solid #333;border-radius:15px;padding:10px}
.time{height:25px;color:#666;font-size:12px;display:flex;gap:80px;padding-right:10px}
.tracks{height:90px;background:#000;border-radius:10px;position:relative;overflow-x:auto}
.track{height:50px;background:linear-gradient(90deg,var(--neon),var(--neon2));border-radius:8px;position:absolute;top:20px;left:50px;width:250px;display:none;align-items:center;padding:0 15px;color:#000;font-weight:900}
.head{position:absolute;width:4px;height:100%;background:red;left:50px;box-shadow:0 0 10px red}

.controls{height:50px;display:flex;gap:15px;justify-content:center}
.btn{padding:15px 30px;border:none;border-radius:15px;font-weight:900;font-size:15px;cursor:pointer}
.play{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000}
.pause{background:linear-gradient(90deg,#00e5ff,#00aaff);color:#000}
.back{background:#ff0044;color:#fff}

.bottom{height:80px;background:#050505;border-top:3px solid var(--neon);display:flex;gap:10px;padding:10px}
.btool{flex:1;background:#111;border:2px solid #333;border-radius:15px;color:#aaa;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;font-weight:700}
.btool.active{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border-color:var(--neon)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎬 SHADOWKING VIDEO PRO</div>
  <button class="export-btn">تصدير 4K</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="tool active" onclick="document.getElementById('videoInput').click()">📁<br>رفع فيديو</div>
  </div>

  <div class="center">
    <div class="preview" id="preview">
      <button class="upload-big" onclick="document.getElementById('videoInput').click()">+ اضغط لاختيار فيديو MP4</button>
    </div>

    <div class="controls">
      <button class="btn play" onclick="play()">▶️ تشغيل</button>
      <button class="btn pause" onclick="pause()">⏸️ ايقاف</button>
      <button class="btn back" onclick="location.href='audio.html'">⬅️ رجوع</button>
    </div>

    <div class="timeline">
      <div class="time"><span>0:00</span><span>0:05</span><span>0:10</span><span>0:15</span><span>0:20</span></div>
      <div class="tracks">
        <div class="head" id="head"></div>
        <div class="track" id="track">الفيديو تبعك</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="btool active">📁<br>وسائط</div>
  <div class="btool">✨<br>فلاتر</div>
  <div class="btool">T<br>نص</div>
  <div class="btool">🔄<br>انتقال</div>
</div>

<input type="file" id="videoInput" accept="video/*" style="display:none">

<script>
let vid, playing=false, anim;

// لما تختار فيديو
document.getElementById('videoInput').onchange = e => {
  const file = e.target.files[0];
  if(!file) return;
  vid = document.createElement('video');
  vid.src = URL.createObjectURL(file);
  document.getElementById('preview').innerHTML = '';
  document.getElementById('preview').appendChild(vid);
  document.getElementById('track').style.display = 'flex';
  document.getElementById('track').innerText = file.name;
};

function play(){
  if(!vid) return alert('اختار فيديو اول من زر "رفع فيديو"');
  vid.play(); playing=true; moveHead();
}
function pause(){
  if(vid) vid.pause(); playing=false; cancelAnimationFrame(anim);
}
function moveHead(){
  if(!playing) return;
  let p = parseInt(document.getElementById('head').style.left) || 50;
  p += 4; if(p>600) p=50;
  document.getElementById('head').style.left = p+'px';
  anim = requestAnimationFrame(moveHead);
}
</script>
</body>
</html>
