<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING VIDEO PRO</title>
<style>
:root{--neon:#00ff88;--neon2:#00e5ff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
body{background:#000;color:#fff;overflow:hidden}
@media (orientation: portrait) {
  body {transform: rotate(90deg);transform-origin: left top;width: 100vh;height: 100vw;position: absolute;top: 100vw;left: 0;}
}

.topbar{height:55px;background:#0a0a0a;display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--neon)}
.logo{color:var(--neon);font-weight:900;font-size:16px}
.export{margin-right:auto;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:10px 20px;border:none;border-radius:12px;font-weight:900;font-size:13px}

.container{display:flex;height:calc(100vh - 135px)}
.sidebar{width:90px;background:#050505;border-left:2px solid var(--neon);padding:10px;display:flex;flex-direction:column;gap:10px}
.tool{height:65px;background:#111;border:2px solid #333;border-radius:12px;color:#aaa;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;cursor:pointer;font-weight:700}
.tool.active{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000}

.center{flex:1;display:flex;flex-direction:column;padding:10px;gap:10px}
.preview{height:45%;background:#0a0a0a;border:2px solid #333;border-radius:15px;display:flex;align-items:center;justify-content:center;overflow:hidden} /* ثبتنا الارتفاع */
.preview video{max-width:100%;max-height:100%;object-fit:contain} /* ما يكبرش عن المربع */
.upload-big{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none;padding:20px 30px;border-radius:15px;font-size:15px;font-weight:900}

.controls{height:50px;display:flex;gap:10px;justify-content:center}
.btn{padding:12px 25px;border:none;border-radius:12px;font-weight:900;font-size:13px}
.play{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000}
.pause{background:#00e5ff;color:#000}
.stop{background:#ff0044;color:#fff}

.timeline{height:120px;background:#0a0a0a;border:2px solid #333;border-radius:15px;padding:8px}
.time{display:flex;justify-content:space-between;color:#666;font-size:11px}
.tracks{height:80px;background:#000;border-radius:10px;margin-top:5px;position:relative}
.track{height:45px;background:linear-gradient(90deg,var(--neon),var(--neon2));border-radius:8px;position:absolute;top:15px;left:30px;width:200px;display:none;align-items:center;padding:0 12px;color:#000;font-weight:900;font-size:11px}
.head{position:absolute;width:3px;height:100%;background:red;left:30px;box-shadow:0 0 10px red}

.bottom{height:70px;background:#050505;border-top:2px solid var(--neon);display:flex;gap:8px;padding:8px}
.btool{flex:1;background:#111;border:2px solid #333;border-radius:12px;color:#aaa;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;cursor:pointer}
.btool.active{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎬 SHADOWKING VIDEO PRO</div>
  <button class="export" onclick="alert('تصدير 4K قريبا')">تصدير 4K</button>
</div>

<div class="container">
  <div class="sidebar">
    <div class="tool active" onclick="document.getElementById('videoInput').click()">📁<br>وسائط</div>
    <div class="tool" onclick="alert('قريبا: نص')">T<br>نص</div>
    <div class="tool" onclick="alert('قريبا: فلاتر')">✨<br>فلاتر</div>
  </div>

  <div class="center">
    <div class="preview" id="preview">
      <button class="upload-big" onclick="document.getElementById('videoInput').click()">+ اضغط لاختيار فيديو</button>
    </div>

    <div class="controls">
      <button class="btn play" id="playBtn">▶️ تشغيل</button>
      <button class="btn pause" id="pauseBtn">⏸️ ايقاف</button>
      <button class="btn stop" id="stopBtn">⏹️ اعادة</button>
    </div>

    <div class="timeline">
      <div class="time"><span>0:00</span><span>0:05</span><span>0:10</span><span>0:15</span><span>0:20</span></div>
      <div class="tracks">
        <div class="head" id="head"></div>
        <div class="track" id="track"></div>
      </div>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="btool active" onclick="document.getElementById('videoInput').click()">📁<br>رفع</div>
  <div class="btool" onclick="alert('قريبا: قص')">✂️<br>قص</div>
  <div class="btool" onclick="alert('قريبا: انتقال')">🔄<br>انتقال</div>
  <div class="btool" onclick="alert('قريبا: صوت')">🎵<br>صوت</div>
</div>

<input type="file" id="videoInput" accept="video/*" style="display:none">

<script>
let vid, playing=false, anim, duration=0;

document.getElementById('videoInput').onchange = e => {
  const file = e.target.files[0]; if(!file) return;
  vid = document.createElement('video');
  vid.src = URL.createObjectURL(file);
  vid.onloadedmetadata = () => {duration = vid.duration;}
  document.getElementById('preview').innerHTML = '';
  document.getElementById('preview').appendChild(vid);
  document.getElementById('track').style.display = 'flex';
  document.getElementById('track').innerText = file.name;
};

document.getElementById('playBtn').onclick = () => {
  if(!vid) return alert('اختار فيديو اول');
  vid.play(); playing=true; moveHead();
};
document.getElementById('pauseBtn').onclick = () => {
  if(vid) vid.pause(); playing=false; cancelAnimationFrame(anim);
};
document.getElementById('stopBtn').onclick = () => {
  if(vid) {vid.pause(); vid.currentTime = 0;}
  playing=false; cancelAnimationFrame(anim);
  document.getElementById('head').style.left = '30px';
};

function moveHead(){
  if(!playing) return;
  let progress = (vid.currentTime / duration) * 500;
  document.getElementById('head').style.left = (30 + progress) + 'px';
  if(vid.currentTime >= duration) {playing=false; cancelAnimationFrame(anim);}
  anim = requestAnimationFrame(moveHead);
}
</script>
</body>
</html>
