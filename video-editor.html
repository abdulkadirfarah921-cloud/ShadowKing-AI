<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محر الفيديو SHADOWKING</title>
<style>
body{background:#000;color:#fff;font-family:'Segoe UI';margin:0;padding:20px}
h1{text-align:center;color:#00e5ff;text-shadow:0 0 20px #00e5ff}
.container{max-width:900px;margin:auto;background:#111;padding:20px;border-radius:20px;border:2px solid #00e5ff}
.btn{background:linear-gradient(90deg,#00e5ff,#00ff88);color:#000;padding:12px 20px;border:none;border-radius:12px;font-weight:900;cursor:pointer;margin:5px}
input,select{width:100%;padding:10px;margin:10px 0;border-radius:10px;background:#222;color:#fff;border:1px solid #00e5ff}
video{width:100%;border-radius:15px;margin:15px 0}
.row{display:flex;gap:10px}
</style>
</head>
<body>
<h1>🎬 محر الفيديو PRO</h1>
<div class="container">
  <input type="file" id="videoInput" accept="video/*">
  <video id="preview" controls></video>

  <h3>1. القص</h3>
  <div class="row">
    <input type="number" id="start" placeholder="البداية بالثواني">
    <input type="number" id="end" placeholder="النهاية بالثواني">
  </div>
  <button class="btn" onclick="cutVideo()">✂️ قص الفيديو</button>

  <h3>2. السرعة</h3>
  <select id="speed">
    <option value="0.5">بطيء 0.5x</option>
    <option value="1" selected>عادي 1x</option>
    <option value="1.5">سريع 1.5x</option>
    <option value="2">سريع جدا 2x</option>
  </select>
  <button class="btn" onclick="changeSpeed()">⚡ تغيير السرعة</button>

  <h3>3. التأثيرات</h3>
  <select id="filter">
    <option value="none">بدون</option>
    <option value="grayscale(100%)">ابيض واسود</option>
    <option value="sepia(100%)">سيبيا</option>
    <option value="blur(5px)">ضباب</option>
    <option value="brightness(150%)">اضاءة</option>
  </select>
  <button class="btn" onclick="applyFilter()">🎨 تطبيق فلتر</button>

  <h3>4. استخراج الصوت</h3>
  <button class="btn" onclick="extractAudio()">🎵 استخراج MP3</button>

  <h3>5. تحميل</h3>
  <button class="btn" onclick="downloadVideo()">⬇️ تحميل الفيديو</button>
</div>

<script>
let videoFile;
const video = document.getElementById('preview');

document.getElementById('videoInput').onchange = e => {
  videoFile = e.target.files[0];
  video.src = URL.createObjectURL(videoFile);
}

function cutVideo(){
  alert('تم تحديد القص من '+document.getElementById('start').value+' الى '+document.getElementById('end').value+' ثانية');
}

function changeSpeed(){
  video.playbackRate = document.getElementById('speed').value;
  alert('تم تغيير السرعة الى '+video.playbackRate+'x');
}

function applyFilter(){
  video.style.filter = document.getElementById('filter').value;
  alert('تم تطبيق الفلتر');
}

function extractAudio(){
  alert('جاري استخراج الصوت... ارفع الفيديو على سيرفر الـ AI عشان نستخرجو');
}

function downloadVideo(){
  alert('اضغط كليك يمين على الفيديو > حفظ الفيديو باسم');
}
</script>
</body>
</html>
