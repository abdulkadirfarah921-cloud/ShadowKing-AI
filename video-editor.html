<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING VIDEO PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--neon:#00e5ff;--neon2:#00ff88;--bg:#050505;--glass:rgba(20,20,30,0.6);--text:#fff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:radial-gradient(circle at 50% 0%,#1a1a2e 0%,#000 100%);color:var(--text);min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--neon)44}
.logo{font-size:1.5em;font-weight:900;color:var(--neon);text-shadow:0 0 20px var(--neon)}
.container{max-width:1400px;margin:20px auto;padding:20px}
.main-grid{display:grid;grid-template-columns:1fr 350px;gap:20px}
.preview-area{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--neon)44;border-radius:20px;padding:15px;position:relative}
video{width:100%;border-radius:15px;background:#000;border:2px solid var(--neon)}
.sidebar{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--neon)44;border-radius:20px;padding:15px}
.tabs{display:flex;gap:8px;margin-bottom:15px}
.tab-btn{background:rgba(0,229,255,0.1);color:var(--neon);padding:10px 15px;border:1px solid var(--neon);border-radius:12px;cursor:pointer;font-weight:700}
.tab-btn.active{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;border:none}
.tab{display:none}.tab.active{display:block}
.card{background:rgba(0,0,0,0.3);border:1px solid var(--neon)33;border-radius:15px;padding:15px;margin-bottom:15px}
h3{color:var(--neon2);margin-bottom:12px;border-right:3px solid var(--neon2);padding-right:8px}
.btn{width:100%;background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:12px;border:none;border-radius:10px;font-weight:900;cursor:pointer;margin:5px 0}
.file-label{background:rgba(0,229,255,0.1);padding:10px;border-radius:10px;border:1px dashed var(--neon);cursor:pointer;text-align:center;margin:5px 0}
input[type="file"]{display:none}
.timeline{background:rgba(0,0,0,0.6);border-radius:15px;padding:15px;margin-top:20px;border:1px solid var(--neon)44}
.track{height:50px;background:rgba(0,229,255,0.1);border:1px solid var(--neon)33;border-radius:8px;margin:8px 0;display:flex;align-items:center;padding:0 10px}
.clip{background:linear-gradient(90deg,var(--neon),var(--neon2));padding:8px 15px;border-radius:6px;margin:0 5px;font-weight:700;color:#000}

/* العلامة المائية الصغيرة */
.watermark{
  position:absolute;bottom:15px;right:15px;
  background:rgba(0,0,0,0.4);color:var(--neon);
  padding:5px 12px;border-radius:20px;font-weight:700;
  font-size:0.75em;z-index:10;backdrop-filter:blur(8px);
  border:1px solid var(--neon)44;opacity:0.6;
}

/* شاشة الختام */
.outro{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(135deg,#000 0%,#1a1a2e 100%);
  display:none;z-index:20;border-radius:15px;
  flex-direction:column;justify-content:center;align-items:center;
  animation:fadeIn 0.5s
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.outro-logo{font-size:2.5em;font-weight:900;color:var(--neon);text-shadow:0 0 30px var(--neon);margin-bottom:20px}
.outro-text{font-size:1.2em;color:var(--neon2)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🎬 SHADOWKING VIDEO PRO</div>
</div>

<div class="container">
<div class="main-grid">

  <div>
    <div class="preview-area">
      <!-- العلامة المائية طول الفيديو -->
      <div class="watermark">SHADOWKING</div>

      <!-- شاشة الختام -->
      <div class="outro" id="outro">
        <div class="outro-logo">🎬 SHADOWKING</div>
        <div class="outro-text">تم المونتاج بواسطة SHADOWKING VIDEO PRO</div>
        <div class="outro-text" style="font-size:0.9em;margin-top:10px;opacity:0.7">Subscribe © 2026</div>
      </div>

      <label class="file-label" onclick="document.getElementById('videoInput').click()">📁 اختر الفيديو</label>
      <input type="file" id="videoInput" accept="video/*">
      <video id="preview" controls></video>
    </div>

    <div class="timeline">
      <h3>📼 التايم لاين</h3>
      <div class="track">🎥 فيديو 1 <div class="clip" id="mainClip">مقطعك</div></div>
      <div class="track">🎬 ختام <div class="clip" id="outroClip">SHADOWKING OUTRO</div></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="tabs">
      <button class="tab-btn active" onclick="openTab('tools')">ادوات</button>
      <button class="tab-btn" onclick="openTab('export')">تصدير</button>
    </div>

    <div id="tools" class="tab active">
      <div class="card">
        <h3>1. اضافة فيديو حقوق</h3>
        <label class="file-label" onclick="document.getElementById('logoVideo').click()">📹 اختر فيديو اللوجو</label>
        <input type="file" id="logoVideo" accept="video/*">
        <small>ده الفيديو اللي رح يطلع اخر شي</small>
      </div>
    </div>

    <div id="export" class="tab">
      <div class="card">
        <h3>⬇️ التصدير</h3>
        <select id="quality"><option>720p</option><option selected>1080p</option><option>4K</option></select>
        <button class="btn" onclick="exportVideo()">تصدير مع الختام</button>
      </div>
    </div>

  </div>
</div>
</div>

<script>
const video = document.getElementById('preview');
const outro = document.getElementById('outro');
let logoVideoFile = null;

// رفع الفيديو الاساسي
document.getElementById('videoInput').onchange=e=>{
  video.src = URL.createObjectURL(e.target.files[0]);
  document.getElementById('mainClip').textContent = 'فيديوك';
}

// رفع فيديو اللوجو للحقوق
document.getElementById('logoVideo').onchange=e=>{
  logoVideoFile = e.target.files[0];
  document.getElementById('outroClip').textContent = 'فيديو حقوقك';
  alert('✅ تم اضافة فيديو الختام');
}

// وقت ما الفيديو يقرب يخلص نظهر الختام
video.ontimeupdate = () => {
  if(video.duration && video.currentTime >= video.duration - 0.5){
    outro.style.display = 'flex';
  }
}
video.onplay = () => {outro.style.display = 'none'}

// التصدير
function exportVideo(){
  alert('⬇️ جاري التصدير: فيديوك + علامة SHADOWKING + مقطع الختام 3 ثواني');
  outro.style.display = 'flex';
  setTimeout(()=>{outro.style.display = 'none'}, 3000);
}

function openTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById(t).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
