<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>SHADOWKING VIDEO PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--neon:#00e5ff;--neon2:#00ff88;--bg:#050505;--glass:rgba(20,20,30,0.7);--text:#fff}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:#050505;color:var(--text);padding:15px}
h1{text-align:center;color:var(--neon);text-shadow:0 0 20px var(--neon);margin-bottom:15px}

.container{max-width:1400px;margin:auto}

/* المعاينة */
.preview-area{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--neon)44;border-radius:20px;padding:15px;margin-bottom:15px}
video{width:100%;border-radius:15px;background:#000;border:2px solid var(--neon)}

/* التايم لاين الاحترافي */
.timeline-wrap{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--neon)44;border-radius:20px;padding:15px}
.timeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.timeline-header h3{color:var(--neon2)}
.time-ruler{height:30px;background:#111;border-radius:8px;margin-bottom:10px;position:relative;border:1px solid var(--neon)33}
.time-marker{position:absolute;top:0;height:100%;width:2px;background:var(--neon2);left:50%}
.time-labels{display:flex;justify-content:space-between;font-size:0.8em;color:var(--neon);padding:0 5px}

.tracks{overflow-x:auto}
.track{
  height:60px;background:rgba(0,0,0,0.4);border:1px solid var(--neon)22;
  border-radius:10px;margin:8px 0;display:flex;align-items:center;
  position:relative;min-width:800px
}
.track-label{
  width:120px;background:linear-gradient(90deg,var(--neon),var(--neon2));
  color:#000;padding:5px 10px;border-radius:8px;margin:0 10px;font-weight:900;
  text-align:center;flex-shrink:0
}
.track-content{flex:1;height:100%;position:relative;display:flex;align-items:center;gap:5px;padding:5px}

.clip{
  height:45px;background:linear-gradient(90deg,var(--neon),var(--neon2));
  border-radius:8px;padding:5px 10px;color:#000;font-weight:700;
  cursor:grab;display:flex;align-items:center;gap:5px;
  box-shadow:0 0 10px var(--neon);min-width:100px;position:relative;
  user-select:none;
}
.clip:active{cursor:grabbing}
.clip img{height:100%;border-radius:4px}
.playhead{
  position:absolute;top:0;width:3px;height:100%;background:red;z-index:100;
  left:50%;pointer-events:none;box-shadow:0 0 10px red
}

.btn{background:linear-gradient(90deg,var(--neon),var(--neon2));color:#000;padding:10px 18px;border:none;border-radius:10px;font-weight:900;cursor:pointer;margin:5px}
input[type="file"]{display:none}
.file-label{background:rgba(0,229,255,0.1);padding:10px 20px;border-radius:10px;border:1px dashed var(--neon);cursor:pointer}
.hint{font-size:0.85em;color:var(--neon2);text-align:center;margin-top:10px}
</style>
</head>
<body>
<h1>🎬 SHADOWKING VIDEO PRO</h1>
<div class="container">

<!-- المعاينة -->
<div class="preview-area">
  <label class="file-label" onclick="document.getElementById('videoInput').click()">📁 اختر الفيديو</label>
  <input type="file" id="videoInput" accept="video/*">
  <video id="preview" controls></video>
</div>

<!-- التايم لاين -->
<div class="timeline-wrap">
  <div class="timeline-header">
    <h3>📼 التايم لاين</h3>
    <button class="btn" onclick="addClip()">+ اضافة مقطع</button>
  </div>

  <div class="time-ruler">
    <div class="time-labels">
      <span>00:00</span><span>00:05</span><span>00:10</span><span>00:15</span><span>00:20</span>
    </div>
    <div class="time-marker"></div>
    <div class="playhead" id="playhead"></div>
  </div>

  <div class="tracks" id="tracks">
    <!-- مسار الفيديو -->
    <div class="track">
      <div class="track-label">🎥 فيديو 1</div>
      <div class="track-content" id="video-track">
        <div class="clip" draggable="true">مقطع 1</div>
      </div>
    </div>

    <!-- مسار الصوت -->
    <div class="track">
      <div class="track-label">🎵 صوت 1</div>
      <div class="track-content" id="audio-track">
        <div class="clip">موسيقى</div>
      </div>
    </div>

    <!-- مسار النص -->
    <div class="track">
      <div class="track-label">📝 نص</div>
      <div class="track-content" id="text-track">
        <div class="clip">عنوان</div>
      </div>
    </div>
  </div>

  <p class="hint">اسحب المقاطع يمين وشمال - Space تشغيل - Ctrl+Z تراجع</p>
</div>

</div>

<script>
const video = document.getElementById('preview');
const playhead = document.getElementById('playhead');

// رفع الفيديو
document.getElementById('videoInput').onchange = e => {
  video.src = URL.createObjectURL(e.target.files[0]);
}

// تحريك مؤشر التشغيل مع الفيديو
video.ontimeupdate = () => {
  let percent = (video.currentTime / video.duration) * 100;
  playhead.style.left = percent + '%';
}

// السحب والافلات للمقاطع
let dragged;
document.querySelectorAll('.clip').forEach(clip=>{
  clip.addEventListener('dragstart', e=>{dragged = clip})
document.querySelectorAll('.track-content').forEach(track=>{
  track.addEventListener('dragover', e=>e.preventDefault())
  track.addEventListener('drop', e=>{
    e.preventDefault();
    track.appendChild(dragged);
  })
})

// اضافة مقطع جديد
function addClip(){
  const newClip = document.createElement('div');
  newClip.className = 'clip';
  newClip.draggable = true;
  newClip.textContent = 'مقطع جديد';
  document.getElementById('video-track').appendChild(newClip);
}

// اختصارات
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();video.paused?video.play():video.pause()}
  if(e.ctrlKey&&e.key==='z'){alert('↩️ تراجع')}
})
</script>
</body>
</html>
